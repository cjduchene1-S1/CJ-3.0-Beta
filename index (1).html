<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CJ 4.0 — Stryker Territory OS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#080C14;--surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.07);
    --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
    --gold:#F5A623;--gold2:#FFD166;--teal:#00D4FF;--green:#00E676;
    --red:#FF5252;--orange:#FF9500;--purple:#BF5AF2;
    --text:#F0F4FF;--text2:#8899AA;--text3:#4A5568;
    --nav-h:60px;--header-h:64px;
  }
  html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:rgba(255,255,255,0.02)}
  ::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}

  /* Glass card */
  .glass{background:var(--surface);border:1px solid var(--border);border-radius:16px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
  .glass:hover{border-color:var(--border2)}
  .glass2{background:var(--surface2);border:1px solid var(--border2);border-radius:12px}

  /* Glow effects */
  .glow-gold{box-shadow:0 0 30px rgba(245,166,35,0.12)}
  .glow-teal{box-shadow:0 0 30px rgba(0,212,255,0.12)}
  .glow-green{box-shadow:0 0 20px rgba(0,230,118,0.10)}

  /* Animations */
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
  @keyframes scanLine{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
  .fade-up{animation:fadeUp .35s cubic-bezier(.16,1,.3,1) both}
  .pulse{animation:pulse 2s ease-in-out infinite}

  /* Nav */
  .nav-btn{position:relative;padding:8px 14px;border:none;background:transparent;color:var(--text2);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border-radius:8px;transition:all .2s;white-space:nowrap;letter-spacing:.3px;display:flex;align-items:center;gap:6px}
  .nav-btn:hover{color:var(--text);background:rgba(255,255,255,0.05)}
  .nav-btn.active{color:var(--gold);background:rgba(245,166,35,0.1);box-shadow:0 0 20px rgba(245,166,35,0.12)}
  .nav-btn.active::after{content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:60%;height:2px;background:var(--gold);border-radius:2px}

  /* Inputs */
  .inp{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 14px;width:100%;outline:none;font-family:'Inter',sans-serif;font-size:13px;transition:border .2s}
  .inp:focus{border-color:var(--gold);background:rgba(255,255,255,0.07)}
  .inp::placeholder{color:var(--text3)}
  select.inp option{background:#111827;color:#fff}
  textarea.inp{resize:vertical;min-height:80px}

  /* Buttons */
  .btn{padding:9px 18px;border-radius:10px;font-family:'Inter',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .2s;border:none;display:inline-flex;align-items:center;gap:6px}
  .btn-gold{background:linear-gradient(135deg,#F5A623,#FFD166);color:#0a0a0a}
  .btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(245,166,35,.35)}
  .btn-outline{background:transparent;color:var(--gold);border:1px solid rgba(245,166,35,.4)}
  .btn-outline:hover{background:rgba(245,166,35,.08);border-color:var(--gold)}
  .btn-ghost{background:rgba(255,255,255,.05);color:var(--text2);border:1px solid var(--border)}
  .btn-ghost:hover{background:rgba(255,255,255,.08);color:var(--text)}
  .btn-red{background:rgba(255,82,82,.15);color:var(--red);border:1px solid rgba(255,82,82,.3)}
  .btn-red:hover{background:rgba(255,82,82,.25)}
  .btn-teal{background:rgba(0,212,255,.1);color:var(--teal);border:1px solid rgba(0,212,255,.3)}
  .btn-teal:hover{background:rgba(0,212,255,.18)}

  /* Badges */
  .badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;letter-spacing:.3px}
  .badge-gold{background:rgba(245,166,35,.15);color:var(--gold);border:1px solid rgba(245,166,35,.3)}
  .badge-green{background:rgba(0,230,118,.12);color:var(--green);border:1px solid rgba(0,230,118,.25)}
  .badge-red{background:rgba(255,82,82,.12);color:var(--red);border:1px solid rgba(255,82,82,.25)}
  .badge-orange{background:rgba(255,149,0,.12);color:var(--orange);border:1px solid rgba(255,149,0,.25)}
  .badge-blue{background:rgba(0,122,255,.12);color:#4DA3FF;border:1px solid rgba(0,122,255,.25)}
  .badge-gray{background:rgba(255,255,255,.07);color:var(--text2);border:1px solid var(--border)}
  .badge-teal{background:rgba(0,212,255,.1);color:var(--teal);border:1px solid rgba(0,212,255,.25)}
  .badge-purple{background:rgba(191,90,242,.1);color:var(--purple);border:1px solid rgba(191,90,242,.25)}

  /* Progress */
  .prog{background:rgba(255,255,255,.07);border-radius:20px;height:4px;overflow:hidden}
  .prog-fill{background:linear-gradient(90deg,var(--gold),var(--gold2));height:100%;border-radius:20px;transition:width .6s cubic-bezier(.16,1,.3,1)}
  .prog-teal .prog-fill{background:linear-gradient(90deg,var(--teal),#00A8CC)}
  .prog-green .prog-fill{background:linear-gradient(90deg,var(--green),#00BF59)}

  /* Table */
  table{width:100%;border-collapse:collapse}
  th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border)}
  td{padding:11px 14px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(255,255,255,0.02)}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
  .modal{background:#0F1623;border:1px solid var(--border2);border-radius:20px;padding:28px;max-width:660px;width:92%;max-height:88vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.6)}

  /* Stat card */
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;transition:border .2s}
  .stat:hover{border-color:var(--border2)}

  /* Section title */
  .stitle{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.3px}
  .slabel{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text2)}

  /* Tray diagram styles */
  .instrument-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;transition:all .2s;cursor:pointer}
  .instrument-card:hover{border-color:rgba(0,212,255,.35);background:rgba(0,212,255,.04);transform:translateY(-2px)}
  .instrument-card.selected{border-color:var(--teal);background:rgba(0,212,255,.07)}

  /* Case card */
  .case-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;transition:border .2s}
  .case-card:hover{border-color:var(--border2)}
  .case-card.mako{border-left:3px solid var(--teal)}
  .case-card.standard{border-left:3px solid var(--gold)}
  .case-card.urgent{border-left:3px solid var(--red)}

  /* Surgeon profile card */
  .surgeon-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;transition:all .2s;cursor:pointer}
  .surgeon-card:hover{border-color:rgba(245,166,35,.3);box-shadow:0 8px 30px rgba(0,0,0,.3)}

  /* Inventory */
  .inv-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;background:var(--surface);border:1px solid var(--border);margin-bottom:8px;transition:border .2s}
  .inv-row:hover{border-color:var(--border2)}
  .inv-critical{border-color:rgba(255,82,82,.4)!important;background:rgba(255,82,82,.04)!important}
  .inv-warning{border-color:rgba(255,149,0,.4)!important;background:rgba(255,149,0,.04)!important}

  /* Scan line overlay */
  .scanline{position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:1000}

  /* Chat */
  .chat-user{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0a0a;border-radius:18px 18px 4px 18px;padding:10px 16px;max-width:76%;align-self:flex-end;font-weight:500;font-size:14px}
  .chat-bot{background:var(--surface2);color:var(--text);border-radius:18px 18px 18px 4px;padding:10px 16px;max-width:76%;align-self:flex-start;border:1px solid var(--border);font-size:14px;line-height:1.6}

  /* Quick chip buttons */
  .chip{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text2);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
  .chip:hover{background:rgba(245,166,35,.1);border-color:rgba(245,166,35,.4);color:var(--gold)}

  /* OR timeline dot */
  .timeline-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px}
</style>
</head>
<body>
<div class="scanline"></div>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ── Utilities ────────────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2,10);
const today = () => new Date();
const fmtDate = d => d ? new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';
const fmtDateShort = d => d ? new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '—';
const fmtTime = d => d ? new Date('2000-01-01T'+d).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true}) : '—';
const daysUntil = d => Math.ceil((new Date(d) - new Date()) / 86400000);

function useLS(key, def) {
  const [val, setVal] = useState(() => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch(e){ return def; } });
  const set = useCallback(v => { setVal(v); try { localStorage.setItem(key, JSON.stringify(typeof v==='function'?v(val):v)); } catch(e){} }, [key]);
  return [val, set];
}

// ── SVG Icons (no emojis) ────────────────────────────────────────────────────

    inventory: <><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></>,

    alert: <><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,
    check: <><polyline points="20 6 9 17 4 12"/></>,

    trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></>,
    close: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
    search: <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
    send: <><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></>,
    ct: <><circle cx="12" cy="12" r="10"/><path d="M8.56 2.75c4.37 6.03 6.02 9.42 8.03 17.72m2.54-15.38c-3.72 4.35-8.94 5.66-16.88 5.85m19.5 1.9c-3.5-3.32-8.56-5-14.7-5"/></>,
    clipboard: <><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></>,

// ── DATA ─────────────────────────────────────────────────────────────────────
const DATA = {
  trainingModules: [
    { id:'m1', title:'Joint Anatomy & Physiology', cat:'Clinical', dur:'45 min', qCount:6,
      desc:'Structure and function of hip and knee joints, common pathologies, and indications for replacement.',
      content:`The hip is a ball-and-socket joint (femoral head + acetabulum). The knee is a hinge joint with complex ligamentous support. Osteoarthritis (OA) is the #1 indication — cartilage breakdown causes bone-on-bone pain, stiffness, and loss of function. Other indications: RA, avascular necrosis, post-traumatic arthritis. Understanding X-ray findings (joint space narrowing, osteophytes, subchondral sclerosis) helps you connect clinical need to product solutions.`,
      quiz:[
        {q:'The hip joint is classified as:',opts:['Hinge','Ball-and-socket','Saddle','Pivot'],correct:1,exp:'The hip is a ball-and-socket joint allowing multiaxial movement between the femoral head and acetabulum.'},
        {q:'Most common indication for joint replacement:',opts:['Rheumatoid arthritis','Fracture','Osteoarthritis','Gout'],correct:2,exp:'Osteoarthritis (cartilage breakdown) is the leading indication for THA and TKA.'},
        {q:'Primary stabilizer of the knee:',opts:['Meniscus','ACL/PCL + collateral ligaments','Patella','Bursa'],correct:1,exp:'The cruciate and collateral ligaments are the primary stabilizers of the knee.'},
        {q:'Avascular necrosis (AVN) refers to:',opts:['Bone infection','Death of bone due to loss of blood supply','Cartilage overgrowth','Nerve damage'],correct:1,exp:'AVN occurs when blood supply to bone is disrupted — a common indication for hip replacement.'},
        {q:'Medial compartment of the knee is:',opts:['Outer leg side','Inner (big-toe side)','Behind the knee','Above the patella'],correct:1,exp:'Medial = toward midline; medial compartment OA is the most common type.'},
        {q:'NOT a typical symptom of end-stage knee OA:',opts:['Night pain','Crepitus','Increased range of motion','Stiffness after rest'],correct:2,exp:'End-stage OA causes decreased ROM, not increased, due to bone spurs and joint space loss.'},
      ]},
    { id:'m2', title:'Mako SmartRobotics System', cat:'Technology', dur:'60 min', qCount:6,
      desc:'CT-based 3D planning, AccuStop haptic technology, clinical data, and your role in Mako cases.',
      content:`Mako uses CT-based 3D planning + robotic arm guidance. Key components: (1) CT scan → patient-specific 3D model, (2) Pre-op plan reviewed with surgeon, (3) Intraoperative robotic arm with AccuStop haptic boundaries, (4) Real-time bone resection and positioning data. Cleared for PKA, TKA, and THA. Published data shows improved positioning accuracy vs. manual. Your role: confirm CT plan loaded, manage implant logistics, support surgeon workflow.`,
      quiz:[
        {q:'Imaging used for Mako pre-op planning:',opts:['MRI','X-ray only','CT scan','Ultrasound'],correct:2,exp:'Mako uses CT scans to create a 3D patient-specific model.'},
        {q:'AccuStop technology:',opts:['Controls robot speed','Creates haptic boundaries preventing over-resection','Cleans the implant','Tracks blood loss'],correct:1,exp:'AccuStop uses haptic feedback to keep the saw blade within planned bone boundaries.'},
        {q:'Mako FDA-cleared procedures:',opts:['PKA only','TKA only','PKA, TKA, and THA','THA and TKA only'],correct:2,exp:'Mako is cleared for partial knee, total knee, and total hip arthroplasty.'},
        {q:'Your primary role during a Mako case:',opts:['Operate the robotic arm','Make implant decisions','Support surgeon, manage implant/instrument logistics','Read CT scan'],correct:2,exp:'ASR supports the surgeon, manages instruments/implants, and ensures workflow runs smoothly.'},
        {q:'"Mako takes too long" objection — best response:',opts:['Agree and move on','Share learning curve data — time normalizes by ~20 cases','Dismiss the concern','Offer a discount'],correct:1,exp:'Published data shows OR time normalizes after the learning curve.'},
        {q:'The 3D plan created before a Mako case is called:',opts:['Surgical blueprint','RIO plan','Pre-operative patient-specific plan','CT report'],correct:2,exp:'Each patient gets a customized pre-operative plan reviewed by the surgeon.'},
      ]},
    { id:'m3', title:'Total Hip Arthroplasty (THA)', cat:'Clinical', dur:'50 min', qCount:6,
      desc:'THA procedure steps, implant components, surgical approaches, and OR role.',
      content:`THA replaces femoral head and acetabular surface. Components: (1) Acetabular cup shell + liner, (2) Femoral stem + head. Approaches: posterior (most common), anterolateral, DAA (growing). Fixation: cementless press-fit (most common) vs cemented. Key metrics: leg length, offset, cup inclination ~40°, anteversion ~15-20°. Your role: know sizes, have backups ready, track trialing, anticipate surgeon needs.`,
      quiz:[
        {q:'NOT a THA component:',opts:['Acetabular shell','Femoral stem','Tibial tray','Femoral head'],correct:2,exp:'Tibial tray is a knee component. THA includes cup shell, liner, femoral stem, and head.'},
        {q:'Direct anterior approach (DAA) advantage:',opts:['Most common approach','Avoids cutting major muscles','Longest recovery','Only for revisions'],correct:1,exp:'DAA goes between muscle planes rather than cutting them — potentially faster recovery.'},
        {q:'Ideal acetabular cup inclination:',opts:['10-15°','20-25°','40°','60°'],correct:2,exp:'"Safe zone" for cup inclination is approximately 40° (±10°).'},
        {q:'Press-fit fixation means:',opts:['Using cement','Screwing the implant in','Impacting so bone grows onto porous surface','Gluing with adhesive'],correct:2,exp:'Cementless/press-fit implants have porous coating allowing bone ingrowth for long-term fixation.'},
        {q:'As an ASR during THA you should:',opts:['Stand as close to the field as possible','Know implant sizes and have backups ready','Ask questions during critical steps','Leave during incision'],correct:1,exp:'Anticipating needs — knowing sizes, having backups — is key to OR support.'},
        {q:'Leg length discrepancy after THA most commonly caused by:',opts:['Wrong implant material','Incorrect stem seating or head length selection','Patient weight','Anesthesia type'],correct:1,exp:'Improper stem seating or wrong head length causes leg length changes.'},
      ]},
    { id:'m4', title:'Total Knee Arthroplasty (TKA)', cat:'Clinical', dur:'50 min', qCount:6,
      desc:'TKA procedure, implant components, CR vs PS designs, and OR responsibilities.',
      content:`TKA replaces femoral condyles, tibial plateau, and patellar surface. Components: (1) Femoral component, (2) Tibial tray + poly insert, (3) Patellar button. CR vs PS: PS sacrifices PCL using post/cam mechanism. Goals: mechanical axis alignment, balanced gaps, correct ligament tension. Your role: organize trays in correct order, know sizing, track lot numbers, communicate with scrub tech.`,
      quiz:[
        {q:'In CR TKA, which ligament is preserved:',opts:['ACL','PCL','MCL','LCL'],correct:1,exp:'CR implants retain the posterior cruciate ligament for rollback and stability.'},
        {q:'Poly insert sits between:',opts:['Femoral component and patella','Tibial tray and femoral component','Tibia and femur directly','Patella and tibial tray'],correct:1,exp:'Poly insert articulates between tibial tray (below) and femoral component (above).'},
        {q:'Proper TKA alignment measured along:',opts:['Anatomic axis','Mechanical axis','Sagittal plane only','Patient height'],correct:1,exp:'Mechanical axis (femoral head to ankle) should pass through the knee center.'},
        {q:'PS TKA differs from CR by:',opts:['No tibial component','Post and cam instead of PCL','Smaller size','No polyethylene'],correct:1,exp:'PS designs sacrifice PCL and use tibial post/femoral cam for posterior stability.'},
        {q:'Lot number documentation is important because:',opts:['Surgeons require it for payment','Enables product tracking and recall notification','Optional','Only for instruments'],correct:1,exp:'FDA-required for implantable devices — enables traceability.'},
        {q:'Gap balancing in TKA refers to:',opts:['Matching left and right sizes','Equal flexion/extension gaps with proper ligament tension','Balancing blood loss','Sizing the femoral component'],correct:1,exp:'Surgeons balance flexion/extension gaps for stability throughout ROM.'},
      ]},
    { id:'m5', title:'Partial Knee Arthroplasty (PKA)', cat:'Clinical', dur:'35 min', qCount:5,
      desc:'Unicompartmental replacement — indications, advantages, and Mako precision.',
      content:`PKA replaces only the damaged knee compartment. Advantages: preserves natural ligaments, less bone removal, faster recovery. Indication: isolated compartmental OA with intact ACL. Mako excels here — robotic precision ensures accurate placement in smaller footprint. Medial PKA most common. Contraindicated in: inflammatory arthritis, severe deformity, multi-compartment disease.`,
      quiz:[
        {q:'PKA is indicated when:',opts:['All compartments damaged','Only one compartment with intact ACL','Patient is very young','Patient has RA'],correct:1,exp:'PKA requires isolated compartmental disease with intact ACL and no inflammatory arthritis.'},
        {q:'Most common PKA compartment:',opts:['Lateral','Patellofemoral','Medial','All equally'],correct:2,exp:'Medial compartment OA is most common.'},
        {q:'Key PKA advantage over TKA:',opts:['Less expensive','Preserves natural ligaments and less bone','Lasts longer','No anesthesia'],correct:1,exp:'PKA preserves ACL, PCL, and other compartments — often more natural feel and faster recovery.'},
        {q:'Mako value for PKA:',opts:['Eliminates need for surgeon','Precision for accurate placement in small space','Cheaper','PKA only done with Mako'],correct:1,exp:'Robotic precision is especially valuable in PKA where accuracy in a confined area is critical.'},
        {q:'Contraindication for PKA:',opts:['Age 65','BMI 28','Intact ACL','Inflammatory arthritis'],correct:3,exp:'Inflammatory arthritis causes multi-compartment disease — contraindicates PKA.'},
      ]},
    { id:'m6', title:'OR Navigation & Professional Conduct', cat:'Professional', dur:'40 min', qCount:6,
      desc:'OR etiquette, sterile field rules, surgical team dynamics, and vendor professionalism.',
      content:`The OR is sterile and high-stakes. Rules: (1) Never break sterile field, (2) Scrub in only when credentialed, (3) Speak only when necessary during critical steps, (4) Anticipate needs — don't wait, (5) Know tray layout before case starts, (6) Arrive 45-60 min early. Surgical team: Attending surgeon, resident/fellow, scrub tech (sterile field), circulating nurse (outside), anesthesiologist. Your scrub tech and circulator relationships are crucial — they influence surgeon preferences.`,
      quiz:[
        {q:'Arrive before a case to:',opts:['Watch preceding surgery','Set up instruments, confirm sizes, and prepare','Socialize with staff','Wait outside until called'],correct:1,exp:'Arriving 45-60 min early shows professionalism and reduces delays.'},
        {q:'If you contaminate the sterile field:',opts:['Pretend it did not happen','Immediately notify scrub tech or surgeon','Cover it quickly','Leave the room'],correct:1,exp:'Always report contamination immediately — patient safety is paramount.'},
        {q:'Who manages supplies from outside sterile field:',opts:['Scrub tech','Surgeon','Circulating nurse','Anesthesiologist'],correct:2,exp:'The circulator works outside the sterile field and passes items in.'},
        {q:'Building OR staff relationships is important because:',opts:['They make purchasing decisions','They influence surgeon opinion and ease your access','Required by law','They control scheduling only'],correct:1,exp:'OR staff relationships are foundational — they influence surgeon preferences and daily success.'},
        {q:'During a critical surgical step you should:',opts:['Ask about next case scheduling','Stay quiet unless specifically asked','Check your phone','Offer suggestions'],correct:1,exp:'Silence during critical moments shows respect and professionalism.'},
        {q:'Hospital credentialing before entering OR is:',opts:['Optional','Required — cannot enter without it','Only needed for management reps','Only for first visit'],correct:1,exp:'Every facility requires vendor credentialing compliance before OR access.'},
      ]},
    { id:'m7', title:'Sales Excellence & Consultative Selling', cat:'Sales', dur:'55 min', qCount:6,
      desc:'Consultative framework, value selling, objection handling, and surgeon partnerships.',
      content:`Framework: (1) Research — know your surgeon and their patient mix, (2) Open — earn the right to a conversation, (3) Discover — ask clinical and business questions, (4) Present — tie solution to specific need, (5) Handle objections, (6) Close — ask for next step, (7) Follow through. Common objections: "Happy with current vendor," "Price too high," "Mako takes too long." Your value = clinical support + reliability + education + problem solving.`,
      quiz:[
        {q:'First priority in consultative selling:',opts:['Pitch your product','Understand the customer needs','Discuss price','Schedule a demo'],correct:1,exp:'Consultative selling starts with understanding — ask before presenting.'},
        {q:'"We are happy with our current vendor" — best response:',opts:['Accept and leave','Acknowledge loyalty, ask what ideal looks like to uncover gaps','Immediately pitch price','Criticize the competitor'],correct:1,exp:'Acknowledge the relationship, then ask open-ended questions to discover unmet needs.'},
        {q:'Best close in surgical sales:',opts:['Hard pressure close','Ask for specific next step — trial case, in-service, meeting','Offer biggest discount','Wait for them to call'],correct:1,exp:'In surgical sales the close is asking for a specific next step.'},
        {q:'Most valuable thing beyond product:',opts:['Free lunches','Reliability, clinical expertise, and problem-solving','Golf outings','Bigger instrument sets'],correct:1,exp:'Surgeons value reps who are reliable, knowledgeable, and solve problems.'},
        {q:'Tracking every sales interaction is important because:',opts:['Manager requires it','Identifies patterns, follow-up opportunities, account trends','Not necessary with good memory','Only for new accounts'],correct:1,exp:'Consistent tracking reveals patterns and ensures timely follow-up.'},
        {q:"Surgeon's key influencers include:",opts:['Only the surgeon','OR staff, office manager, scheduler, hospital admin','Only hospital admin','Only scrub tech'],correct:1,exp:'Success requires building relationships across the full care team.'},
      ]},
    { id:'m8', title:'Territory Management & Account Planning', cat:'Sales', dur:'45 min', qCount:5,
      desc:'Prioritizing accounts, building a territory plan, and Mako growth strategy.',
      content:`Account tiering: Tier 1 (high volume, high Mako potential), Tier 2 (medium volume, growth opportunity), Tier 3 (low volume or currently inaccessible). North Texas key systems: HCA, Baylor Scott & White, Methodist, UT Southwestern, Texas Health, Medical City. Focus activities: surgeon lunches/in-services, OR staff relationship building, hospital administration meetings, competitive account targeting. Track every interaction in CRM.`,
      quiz:[
        {q:'Tier 1 accounts are characterized by:',opts:['Low volume but easy access','High volume and high Mako conversion potential','New accounts with no history','Small independent hospitals'],correct:1,exp:'Tier 1 accounts are your highest-priority, highest-potential targets.'},
        {q:'Wednesday morning is best used for:',opts:['Cold calling new surgeons','Hospital admin and supply chain meetings','OR coverage only','Administrative paperwork'],correct:1,exp:'Mid-week morning is ideal for admin/supply chain relationship building.'},
        {q:'Identifying a Mako conversion target starts with:',opts:['Calling the hospital','Researching their current case mix and volume','Sending product literature','Asking your manager'],correct:1,exp:'Know their current approach before making contact — targeted outreach is more effective.'},
        {q:'The most important metric for a new ASR in Month 1:',opts:['Closed revenue','Number of new CRM contacts and cases covered','Social media posts','Office visits only'],correct:1,exp:'In Month 1, building your contact base and case coverage reputation is foundational.'},
        {q:'Health system consolidation in North Texas affects you because:',opts:['It reduces competition','Contract changes at acquiring systems can affect product access','It has no impact on field reps','It only matters for management'],correct:1,exp:'When independent hospitals join BSW, HCA, or Methodist, purchasing contracts and vendor access change.'},
      ]},
    { id:'m9', title:'Instrument Tray Management & Inventory', cat:'Operations', dur:'40 min', qCount:5,
      desc:'Loaner trays, consignment, inventory audits, and sterile processing workflows.',
      content:`Loaner trays: Stryker supplies instrument sets to hospitals for individual cases. Your responsibility: (1) Confirm tray arrival and sterile processing 24h before case, (2) Audit tray contents pre-case, (3) Return tray same day or per facility agreement. Consignment: implants stored at the facility for immediate use. Audit consignment monthly — verify counts, check expirations, initiate restocking. Build relationships with SPD (sterile processing dept) — they control tray availability.`,
      quiz:[
        {q:'Before a case, your primary tray responsibility is:',opts:['Just show up on time','Confirm arrival, sterile processing, and audit contents 24h prior','Leave tray with hospital staff','Deliver tray day before without checking'],correct:1,exp:'Confirming tray arrival and sterile processing 24h prior prevents case-day surprises.'},
        {q:'Consignment inventory should be audited:',opts:['Never — hospital does it','Quarterly minimum','Monthly minimum with proactive restocking','Only when running low'],correct:2,exp:'Monthly audits catch shortages and expirations before they become problems.'},
        {q:'SPD (Sterile Processing Dept) relationship matters because:',opts:['They control product pricing','They control tray processing speed and availability','Not important for reps','Only matters for large facilities'],correct:1,exp:'SPD controls whether your trays are sterile and available on time.'},
        {q:'A missing instrument discovered after the case starts:',opts:['Is not your problem','Requires immediately notifying the surgeon and sourcing a replacement ASAP','Can be ignored','Should be documented later'],correct:1,exp:'Notify immediately and source a replacement — patient safety and case flow depend on it.'},
        {q:'Lot number tracking is required because:',opts:['Stryker requires it for billing','FDA requires implant traceability and recall notification','It is optional','Only required for Mako cases'],correct:1,exp:'FDA mandates tracking of all implantable devices for traceability and recall purposes.'},
      ]},
    { id:'m10', title:'Competitive Landscape: Robotics', cat:'Strategy', dur:'35 min', qCount:5,
      desc:'Zimmer Biomet ROSA, Smith & Nephew CORI, DePuy — how Mako competes and wins.',
      content:`Key competitors: (1) Zimmer Biomet ROSA — image-free robotics for TKA, also THA. (2) Smith & Nephew CORI — handheld robotic, no CT required, faster setup. (3) DePuy Synthes VELYS — CT-optional, TKA focused. Mako advantages: CT-based 3D planning (more precise pre-op visualization), AccuStop haptic boundaries, broadest cleared indications (PKA+TKA+THA), largest installed base, deepest clinical evidence base. Competitive messaging: robustness of data, 3 indications, established training ecosystem, Stryker support network.`,
      quiz:[
        {q:'Zimmer Biomet ROSA uses:',opts:['CT-based planning like Mako','Image-free approach for TKA','Only for partial knee','No robotic arm'],correct:1,exp:'ROSA primarily uses image-free planning, which is a key differentiator vs. Mako CT-based precision.'},
        {q:'Smith & Nephew CORI differentiator:',opts:['Largest installed base','Handheld robotic with no CT required','Most clinical data','Only FDA-cleared for THA'],correct:1,exp:'CORI is a handheld device requiring no CT, which means faster setup but less pre-op 3D planning.'},
        {q:'Mako primary competitive advantage vs. image-free systems:',opts:['Lower cost','CT-based 3D visualization and patient-specific pre-op plan','Faster setup time','Smaller system footprint'],correct:1,exp:'CT-based planning allows surgeon to visualize the specific patient anatomy before entering the OR.'},
        {q:'Mako FDA clearances include:',opts:['TKA only','TKA and THA','PKA, TKA, and THA','PKA and TKA only'],correct:2,exp:'Three cleared indications — broadest of any robotic system currently on the market.'},
        {q:'When a surgeon says they are trialing a competitor robot:',opts:['Walk away','Offer to bring in Mako data and arrange a surgeon-to-surgeon reference call','Tell them they are making a mistake','Lower your price'],correct:1,exp:'Respond with data and peer references — surgeons trust other surgeons over sales reps.'},
      ]},
  ],

  chatKnowledge: [
    {keys:['mako','robot','accustop','haptic'], response:'Mako SmartRobotics uses CT-based 3D pre-operative planning and a robotic arm with AccuStop haptic boundaries that prevent over-resection of bone. It is FDA-cleared for PKA, TKA, and THA. Your role in Mako cases: confirm the CT plan is loaded pre-op, manage implant/instrument logistics, support the surgeon\'s workflow, and document accurately post-case.'},
    {keys:['tka','total knee','knee replacement','triathlon'], response:'Total knee arthroplasty replaces the femoral condyles, tibial plateau, and often the patella. Key components: femoral component, tibial tray + poly insert, patellar button. CR (cruciate-retaining) preserves the PCL; PS (posterior-stabilized) uses a post/cam. Your OR role: organize trays in surgical order, track trialing sequence, document lot numbers, anticipate sizing changes.'},
    {keys:['tha','total hip','hip replacement','accolade'], response:'Total hip arthroplasty replaces the femoral head and acetabular surface. Components: cup shell + liner, femoral stem + head. Approaches: posterior (most common), DAA (growing). Your role: know implant sizes, have backups staged, track trial and final implants, maintain awareness of sterile field boundaries.'},
    {keys:['pka','partial knee','unicompartmental'], response:'Partial knee arthroplasty replaces only the damaged compartment. Mako precision is especially valuable here — accurate placement in a smaller surgical footprint. Indication: isolated compartmental OA with intact ACL. Contraindicated in inflammatory arthritis or multi-compartment disease.'},
    {keys:['credentiali','reptrax','vendormate','intellicentrics'], response:'Hospital credentialing is required at every facility before OR access. Common platforms: Reptrax, Vendormate (now symplr), Intellicentrics. Requirements typically include: background check, drug screen, immunizations, HIPAA training, and facility-specific modules. Check expiration dates — let credentials lapse and you lose access.'},
    {keys:['or etiquette','sterile','scrub tech','circulator'], response:'Key OR rules: never break the sterile field, arrive 45-60 min early, speak only when necessary during critical steps, anticipate needs before being asked. Build relationships with your scrub tech and circulator — they influence surgeon opinion and control your workflow. Always report sterile field breaks immediately.'},
    {keys:['inventory','consignment','tray','loaner'], response:'Consignment management is a core responsibility. Audit monthly — verify counts, check expirations, initiate restocking before hitting critical levels. For loaner trays: confirm arrival and sterile processing 24h prior, audit contents pre-case, return same day. Build relationships with SPD — they control tray availability.'},
    {keys:['surgeon preference','approach','posterior','anterior'], response:'Every surgeon has documented preferences beyond what is on their card. Track: preferred approach, fixation type (cemented vs cementless), sizing tendencies (do they trial up or down?), how they want instruments handed off, tolerance for OR communication. Your preference cards should be updated after every case.'},
    {keys:['competitor','rosa','cori','depuy','zimmer'], response:'Key competitors: Zimmer ROSA (image-free TKA/THA), Smith & Nephew CORI (handheld, no CT), DePuy VELYS (CT-optional TKA). Mako advantages: CT-based 3D precision, three cleared indications (PKA+TKA+THA), largest installed base, deepest clinical evidence. When a surgeon is trialing a competitor: respond with data and arrange a peer surgeon reference call.'},
    {keys:['dallas','north texas','dfw','baylor','ut southwestern','methodist','hca'], response:'North Texas key health systems: HCA Healthcare (DFW), Baylor Scott & White, Methodist Health System, UT Southwestern Medical Center, Texas Health Resources, Medical City Healthcare, Cook Children\'s (Fort Worth). Health system consolidation is accelerating — independent hospitals joining BSW, HCA, or Methodist affects contract access. Know the purchasing structure at each system.'},
    {keys:['90 day','first 90','plan','onboard'], response:'First 90 days: Days 1-30: master tray knowledge, shadow every case, build surgeon preference database, introduce yourself to all OR staff and SPD. Days 31-60: own inventory management proactively, start anticipating surgeon needs, be the rep\'s eyes and ears. Days 61-90: run solo cases with full accuracy, build genuine OR staff trust, surface competitive intelligence to the rep.'},
    {keys:['call','on call','available','schedule'], response:'On call means available — not sort-of available. Keep your bag packed every night, know the hospital layout before urgent calls, maintain an after-hours contact list at every facility. A call case at 10 PM or 6 AM is not an exception — it\'s the job. Document everything after late cases before going to sleep.'},
    {keys:['morning','day start','prep','before case'], response:'Day prep starts the night before: pull OR schedule, review surgeon preferences, confirm CT plans for Mako cases, check consignment levels. Arrive 45-60 min early, go to SPD first, audit your tray, introduce yourself to scrub tech and circulator. For Mako cases: confirm the plan is loaded and the robotic system is powered on before patient entry.'},
    {keys:['objection','push back','competitor happy','too long'], response:'Common objections: "We\'re happy with current vendor" → acknowledge loyalty, ask what ideal looks like. "Mako takes too long" → learning curve data shows OR time normalizes by ~20 cases. "I don\'t need a robot" → Mako doesn\'t replace skill, it enhances reproducibility — data shows reduced outlier rates even for experienced surgeons. "Data isn\'t mature" → Mako cleared since 2006 (PKA), 10+ years of peer-reviewed data.'},
  ],

// ── Components ────────────────────────────────────────────────────────────────
const GlassCard = ({children, className='', style={}}) => (
  <div className={`glass ${className}`} style={{padding:20,...style}}>{children}</div>
);

const Stat = ({label, value, sub, color='var(--gold)', icon}) => (
  <div className="stat">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
      <div style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'.8px',color:'var(--text2)'}}>{label}</div>
      {icon && <div style={{opacity:.6}}><Icon n={icon} s={16} c={color}/></div>}
    </div>
    <div style={{fontSize:28,fontWeight:800,color,lineHeight:1}}>{value}</div>
    {sub && <div style={{fontSize:11,color:'var(--text2)',marginTop:6}}>{sub}</div>}
  </div>
);

const SectionTitle = ({title, icon, sub, action}) => (
  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
    <div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        {icon && <Icon n={icon} s={18} c='var(--gold)'/>}
        <div className="stitle">{title}</div>
      </div>
      {sub && <div style={{fontSize:13,color:'var(--text2)',marginTop:4}}>{sub}</div>}
    </div>
    {action}
  </div>
);

const Modal = ({title, onClose, children, wide=false}) => (
  <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal fade-up" style={{maxWidth:wide?860:660}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:22,paddingBottom:16,borderBottom:'1px solid var(--border)'}}>
        <div style={{fontWeight:800,fontSize:18,color:'var(--text)'}}>{title}</div>
        <button onClick={onClose} style={{background:'rgba(255,255,255,.07)',border:'1px solid var(--border)',color:'var(--text2)',width:32,height:32,borderRadius:8,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon n='close' s={14}/></button>
      </div>
      {children}
    </div>
  </div>
);

const Pill = ({children, active, onClick, color='var(--gold)'}) => (
  <button onClick={onClick} style={{padding:'6px 14px',borderRadius:20,border:`1px solid ${active?color:'var(--border)'}`,background:active?`rgba(245,166,35,.1)`:'transparent',color:active?color:'var(--text2)',fontSize:12,fontWeight:600,cursor:'pointer',transition:'all .2s'}}>{children}</button>
);

// ── HEADER ────────────────────────────────────────────────────────────────────
function Header({user}) {
  const [time, setTime] = useState(new Date());
  useEffect(()=>{ const t=setInterval(()=>setTime(new Date()),1000); return()=>clearInterval(t); },[]);
  const dayInRole = Math.ceil((new Date()-new Date(user.startDate||'2026-03-04'))/86400000);
  return (
    <header style={{background:'rgba(8,12,20,0.95)',borderBottom:'1px solid var(--border)',backdropFilter:'blur(20px)',padding:'0 24px',height:'var(--header-h)',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,zIndex:100}}>
      <div style={{display:'flex',alignItems:'center',gap:16}}>
        <div style={{background:'linear-gradient(135deg,#F5A623,#FFD166)',color:'#0a0a0a',fontWeight:900,fontSize:12,padding:'5px 12px',borderRadius:8,letterSpacing:'.5px'}}>CJ 4.0</div>
        <div style={{width:1,height:28,background:'var(--border)'}}/>
        <div>
          <div style={{fontWeight:700,fontSize:14,letterSpacing:'-.2px'}}>Stryker Territory OS</div>
          <div style={{fontSize:11,color:'var(--text2)'}}>Joint Replacement · North Texas</div>
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:20}}>
        <div style={{textAlign:'right'}}>
          <div style={{fontWeight:700,color:'var(--gold)',fontSize:15,fontVariantNumeric:'tabular-nums'}}>{time.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</div>
          <div style={{fontSize:11,color:'var(--text2)'}}>{time.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div>
        </div>
        <div style={{width:1,height:28,background:'var(--border)'}}/>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{user.name||'CJ'}</div>
          <div style={{fontSize:11,color:'var(--text2)'}}>Day <span style={{color:'var(--gold)',fontWeight:700}}>{dayInRole}</span> in role</div>
        </div>
      </div>
    </header>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function Dashboard({contacts,credentials,trainingProgress,user,cases,inventory}) {
  const d = today();
  const rep = DATA.reportTemplates[d.getDay()];
  const totalMods = DATA.trainingModules.length;
  const completed = Object.values(trainingProgress).filter(v=>v?.completed).length;
  const pct = Math.round(completed/totalMods*100);
  const expiringCreds = credentials.filter(c=>c.status==='expiring'||c.status==='pending');
  const upcomingCases = cases.filter(c=>c.status==='upcoming').slice(0,3);
  const criticalInv = inventory.filter(i=>i.status==='critical');
  const lowInv = inventory.filter(i=>i.status==='low');
  const dayInRole = Math.ceil((new Date()-new Date(user.startDate||'2026-03-04'))/86400000);

  return (
    <div className="fade-up" style={{padding:24,maxWidth:1280,margin:'0 auto'}}>
      {/* Morning Brief */}
      <div className="glass glow-gold" style={{padding:24,marginBottom:24,borderColor:'rgba(245,166,35,.2)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}}>
          <div>
            <div style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'1px',color:'var(--gold)',marginBottom:4}}>Today's Morning Brief</div>
            <div style={{fontSize:18,fontWeight:800}}>{d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
          </div>
          <span className="badge badge-gold">{rep.focus}</span>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:10}}>
          {rep.actions.map((a,i)=>(
            <div key={i} style={{display:'flex',alignItems:'flex-start',gap:10,padding:'10px 14px',background:'rgba(245,166,35,.06)',borderRadius:10,border:'1px solid rgba(245,166,35,.12)'}}>
              <div style={{width:20,height:20,borderRadius:'50%',background:'rgba(245,166,35,.2)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1}}>
                <span style={{fontSize:11,fontWeight:800,color:'var(--gold)'}}>{i+1}</span>
              </div>
              <span style={{fontSize:13,color:'var(--text)',lineHeight:1.4}}>{a}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Stats row */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24}}>
        <Stat label="Day in Role" value={dayInRole} sub={`Month ${Math.ceil(dayInRole/30)} of 6`} icon="clock"/>
        <Stat label="Training" value={`${completed}/${totalMods}`} sub={`${pct}% complete`} color="var(--teal)" icon="training"/>
        <Stat label="Active Credentials" value={credentials.filter(c=>c.status==='active').length} sub={`${expiringCreds.length} need attention`} color={expiringCreds.length>0?'var(--orange)':'var(--green)'} icon="creds"/>
        <Stat label="Credential Alerts" value={expiringCreds.length} sub={expiringCreds.length>0?expiringCreds[0].facility:'All clear'} color={expiringCreds.length>0?'var(--red)':'var(--green)'} icon="alert"/>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:20}}>
        {/* Upcoming Cases */}
        <div className="glass" style={{padding:20}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
            <Icon n='schedule' s={16} c='var(--teal)'/>
            <div style={{fontWeight:700,fontSize:14}}>Upcoming Cases</div>
          </div>
          {upcomingCases.length===0 && <div style={{color:'var(--text2)',fontSize:13}}>No upcoming cases logged.</div>}
          {upcomingCases.map(c=>(
            <div key={c.id} style={{marginBottom:12,paddingBottom:12,borderBottom:'1px solid var(--border)'}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                <span style={{fontSize:13,fontWeight:600}}>{c.surgeon.split(' ').slice(-1)[0]}</span>
                <span className={`badge ${c.type==='mako'?'badge-teal':'badge-gold'}`} style={{fontSize:10}}>{c.type==='mako'?'MAKO':'STD'}</span>
              </div>
              <div style={{fontSize:12,color:'var(--text2)'}}>{c.procedure}</div>
              <div style={{fontSize:11,color:'var(--text2)',marginTop:3}}>{fmtDateShort(c.date)} · {fmtTime(c.time)} · {c.facility.split(' ').slice(0,2).join(' ')}</div>
              {c.type==='mako' && c.ctStatus!=='loaded' && (
                <div style={{fontSize:11,color:'var(--orange)',marginTop:4,display:'flex',alignItems:'center',gap:4}}>
                  <Icon n='alert' s={11} c='var(--orange)'/> CT: {c.ctStatus==='pending'?'Pending upload':c.ctStatus==='not_ordered'?'NOT ORDERED':'—'}
                </div>
              )}
            </div>
          ))}
        </div>

        {/* Training Progress */}
        <div className="glass" style={{padding:20}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
            <Icon n='training' s={16} c='var(--gold)'/>
            <div style={{fontWeight:700,fontSize:14}}>Training Progress</div>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
              <span style={{fontSize:12,color:'var(--text2)'}}>Overall Completion</span>
              <span style={{fontSize:12,fontWeight:700,color:'var(--gold)'}}>{pct}%</span>
            </div>
            <div className="prog" style={{height:6}}>
              <div className="prog-fill" style={{width:`${pct}%`}}/>
            </div>
          </div>
          {DATA.trainingModules.slice(0,5).map(m=>{
            const done = trainingProgress[m.id]?.completed;
            return (
              <div key={m.id} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                <div style={{width:16,height:16,borderRadius:'50%',border:`2px solid ${done?'var(--green)':'var(--border)'}`,background:done?'rgba(0,230,118,.15)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  {done && <Icon n='check' s={9} c='var(--green)' stroke={3}/>}
                </div>
                <div style={{fontSize:12,color:done?'var(--text2)':'var(--text)',textDecoration:done?'line-through':'none'}}>{m.title}</div>
              </div>
            );
          })}
        </div>

        {/* Inventory Alerts + Credential Alerts */}
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div className="glass" style={{padding:20}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
              <Icon n='inventory' s={16} c='var(--red)'/>
              <div style={{fontWeight:700,fontSize:14}}>Inventory Alerts</div>
            </div>
            {criticalInv.length===0 && lowInv.length===0 && <div style={{fontSize:12,color:'var(--green)',display:'flex',alignItems:'center',gap:6}}><Icon n='check' s={12} c='var(--green)'/>All levels OK</div>}
            {[...criticalInv,...lowInv].slice(0,4).map(i=>(
              <div key={i.id} style={{display:'flex',gap:10,alignItems:'flex-start',marginBottom:8}}>
                <span className={`badge ${i.status==='critical'?'badge-red':'badge-orange'}`} style={{fontSize:10,flexShrink:0,marginTop:1}}>{i.status==='critical'?'CRITICAL':'LOW'}</span>
                <div style={{fontSize:12,lineHeight:1.4}}>{i.item.length>45?i.item.slice(0,42)+'...':i.item}</div>
              </div>
            ))}
          </div>
          <div className="glass" style={{padding:20}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
              <Icon n='alert' s={16} c='var(--orange)'/>
              <div style={{fontWeight:700,fontSize:14}}>Credential Alerts</div>
            </div>
            {expiringCreds.length===0 && <div style={{fontSize:12,color:'var(--green)',display:'flex',alignItems:'center',gap:6}}><Icon n='check' s={12} c='var(--green)'/>All credentials active</div>}
            {expiringCreds.map(c=>(
              <div key={c.id} style={{marginBottom:8}}>
                <div style={{fontSize:12,fontWeight:600}}>{c.facility.split(' ').slice(0,3).join(' ')}</div>
                <div style={{fontSize:11,color:c.status==='expiring'?'var(--orange)':'var(--text2)'}}>
                  {c.status==='expiring'?`Expires ${fmtDateShort(c.expiry)}`:'Pending approval'}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── SCHEDULE ──────────────────────────────────────────────────────────────────
function Schedule({cases, setCases}) {
  const [view, setView] = useState('upcoming');
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const [detail, setDetail] = useState(null);
  const blank = {date:'',time:'',surgeon:'',facility:'',or:'',procedure:'',type:'standard',implantSystem:'',ctStatus:'na',ctNotes:'',repNote:'',status:'upcoming',postCaseNotes:''};
  const [form, setForm] = useState(blank);
  const f = k=>e=>setForm(p=>({...p,[k]:e.target.value}));

  const filtered = useMemo(()=>{
    if(view==='upcoming') return cases.filter(c=>c.status==='upcoming').sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
    if(view==='completed') return cases.filter(c=>c.status==='completed').sort((a,b)=>b.date.localeCompare(a.date));
    return cases.sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  },[cases,view]);

  const save=()=>{
    if(!form.surgeon||!form.date) return;
    if(editId) setCases(p=>p.map(c=>c.id===editId?{...c,...form}:c));
    else setCases(p=>[...p,{id:uid(),...form}]);
    setShowForm(false); setEditId(null); setForm(blank);
  };
  const del=id=>setCases(p=>p.filter(c=>c.id!==id));
  const markComplete=id=>{ setCases(p=>p.map(c=>c.id===id?{...c,status:'completed'}:c)); setDetail(null); };
  const openEdit=c=>{ setForm({...blank,...c}); setEditId(c.id); setShowForm(true); };

  const ctColor = s => s==='loaded'?'var(--green)':s==='pending'?'var(--orange)':s==='not_ordered'?'var(--red)':'var(--text2)';
  const ctLabel = s => s==='loaded'?'CT Loaded':s==='pending'?'CT Pending':s==='not_ordered'?'CT NOT Ordered':s==='na'?'N/A':'—';

  return (
    <div className="fade-up" style={{padding:24,maxWidth:1280,margin:'0 auto'}}>
      <SectionTitle title="Case Schedule" icon="schedule" sub="Upcoming OR cases, CT scan status, and post-case notes"
        action={<button className="btn btn-gold" onClick={()=>{setForm(blank);setEditId(null);setShowForm(true);}}><Icon n='plus' s={14}/>Add Case</button>}/>

      <div style={{display:'flex',gap:8,marginBottom:20}}>
        {['upcoming','completed','all'].map(v=><Pill key={v} children={v.charAt(0).toUpperCase()+v.slice(1)+' ('+(v==='upcoming'?cases.filter(c=>c.status==='upcoming').length:v==='completed'?cases.filter(c=>c.status==='completed').length:cases.length)+')'} active={view===v} onClick={()=>setView(v)}/>)}
      </div>

      {/* CT Alert Banner */}
      {view!=='completed' && cases.filter(c=>c.status==='upcoming'&&c.type==='mako'&&c.ctStatus==='not_ordered').length>0 && (
        <div style={{background:'rgba(255,82,82,.08)',border:'1px solid rgba(255,82,82,.3)',borderRadius:12,padding:'12px 16px',marginBottom:16,display:'flex',alignItems:'center',gap:10}}>
          <Icon n='alert' s={18} c='var(--red)'/>
          <div>
            <span style={{fontWeight:700,color:'var(--red)'}}>CT Scan Action Required — </span>
            <span style={{fontSize:13,color:'var(--text)'}}>
              {cases.filter(c=>c.status==='upcoming'&&c.type==='mako'&&c.ctStatus==='not_ordered').map(c=>`${c.surgeon} (${fmtDateShort(c.date)})`).join(', ')} has not ordered CT scan.
            </span>
          </div>
        </div>
      )}

      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        {filtered.length===0 && <div className="glass" style={{padding:30,textAlign:'center',color:'var(--text2)'}}>No cases in this view.</div>}
        {filtered.map(c=>(
          <div key={c.id} className={`case-card ${c.type} fade-up`} onClick={()=>setDetail(c)} style={{cursor:'pointer'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:16}}>
              <div style={{display:'flex',gap:20,flexWrap:'wrap'}}>
                {/* Date/Time */}
                <div style={{minWidth:110}}>
                  <div style={{fontSize:11,color:'var(--text2)',marginBottom:3,textTransform:'uppercase',letterSpacing:'.5px'}}>Date & Time</div>
                  <div style={{fontWeight:700,fontSize:14}}>{fmtDate(c.date)}</div>
                  <div style={{fontSize:13,color:'var(--text2)'}}>{fmtTime(c.time)} · {c.or}</div>
                </div>
                {/* Surgeon & Facility */}
                <div style={{flex:1,minWidth:200}}>
                  <div style={{fontSize:11,color:'var(--text2)',marginBottom:3,textTransform:'uppercase',letterSpacing:'.5px'}}>Surgeon & Location</div>
                  <div style={{fontWeight:700,fontSize:14}}>{c.surgeon}</div>
                  <div style={{fontSize:12,color:'var(--text2)'}}>{c.facility}</div>
                </div>
                {/* Procedure */}
                <div style={{minWidth:160}}>
                  <div style={{fontSize:11,color:'var(--text2)',marginBottom:3,textTransform:'uppercase',letterSpacing:'.5px'}}>Procedure</div>
                  <div style={{fontWeight:600,fontSize:14}}>{c.procedure}</div>
                  <div style={{fontSize:12,color:'var(--text2)'}}>{c.implantSystem}</div>
                </div>
                {/* CT Status */}
                {c.type==='mako' && (
                  <div style={{minWidth:130}}>
                    <div style={{fontSize:11,color:'var(--text2)',marginBottom:3,textTransform:'uppercase',letterSpacing:'.5px'}}>CT Scan</div>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <Icon n='ct' s={14} c={ctColor(c.ctStatus)}/>
                      <span style={{fontSize:13,fontWeight:600,color:ctColor(c.ctStatus)}}>{ctLabel(c.ctStatus)}</span>
                    </div>
                    {c.ctNotes && <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>{c.ctNotes.slice(0,40)}{c.ctNotes.length>40?'...':''}</div>}
                  </div>
                )}
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:8,alignItems:'flex-end'}}>
                <span className={`badge ${c.type==='mako'?'badge-teal':c.type==='urgent'?'badge-red':'badge-gold'}`}>
                  {c.type==='mako'?'MAKO':c.type==='urgent'?'URGENT':'STANDARD'}
                </span>
                <span className={`badge ${c.status==='completed'?'badge-green':'badge-gray'}`}>{c.status}</span>
                <div style={{display:'flex',gap:6}}>
                  <button className="btn btn-ghost" style={{padding:'5px 10px',fontSize:11}} onClick={e=>{e.stopPropagation();openEdit(c)}}><Icon n='edit' s={11}/>Edit</button>
                  <button className="btn btn-red" style={{padding:'5px 10px',fontSize:11}} onClick={e=>{e.stopPropagation();del(c.id)}}><Icon n='trash' s={11}/></button>
                </div>
              </div>
            </div>
            {c.repNote && <div style={{marginTop:10,padding:'8px 12px',background:'rgba(245,166,35,.06)',borderRadius:8,fontSize:12,color:'var(--text2)',borderLeft:'2px solid var(--gold)'}}>
              <Icon n='alert' s={11} c='var(--gold)'/> {c.repNote}
            </div>}
          </div>
        ))}
      </div>

      {/* Case Detail Modal */}
      {detail && (
        <Modal title={`${detail.procedure} — ${detail.surgeon}`} onClose={()=>setDetail(null)} wide>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
            {[['Date',fmtDate(detail.date)],['Time',fmtTime(detail.time)],['Facility',detail.facility],['OR Room',detail.or],['Procedure',detail.procedure],['Implant System',detail.implantSystem]].map(([k,v])=>(
              <div key={k}><div style={{fontSize:11,color:'var(--text2)',marginBottom:3}}>{k}</div><div style={{fontSize:14,fontWeight:600}}>{v||'—'}</div></div>
            ))}
          </div>
          {detail.type==='mako' && (
            <div style={{background:'rgba(0,212,255,.06)',border:'1px solid rgba(0,212,255,.2)',borderRadius:12,padding:16,marginBottom:20}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                <Icon n='robot' s={16} c='var(--teal)'/>
                <span style={{fontWeight:700,color:'var(--teal)'}}>Mako Case Details</span>
                <span className={`badge ${detail.ctStatus==='loaded'?'badge-green':detail.ctStatus==='not_ordered'?'badge-red':'badge-orange'}`}>{ctLabel(detail.ctStatus)}</span>
              </div>
              <div style={{fontSize:13,color:'var(--text)',lineHeight:1.6}}>{detail.ctNotes||'No CT notes entered.'}</div>
            </div>
          )}
          {detail.repNote && <div style={{background:'rgba(245,166,35,.07)',border:'1px solid rgba(245,166,35,.2)',borderRadius:10,padding:14,marginBottom:16,fontSize:13,color:'var(--text)'}}>
            <strong style={{color:'var(--gold)'}}>Rep Note: </strong>{detail.repNote}
          </div>}
          <div style={{marginBottom:16}}>
            <label style={{fontSize:11,color:'var(--text2)',display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:'.5px'}}>Post-Case Notes</label>
            <textarea className="inp" rows={3} value={detail.postCaseNotes||''} onChange={e=>setDetail({...detail,postCaseNotes:e.target.value})} placeholder="What was used, how case went, surgeon feedback..."/>
          </div>
          <div style={{display:'flex',gap:10}}>
            {detail.status==='upcoming' && <button className="btn btn-gold" onClick={()=>{setCases(p=>p.map(c=>c.id===detail.id?{...c,status:'completed',postCaseNotes:detail.postCaseNotes}:c));setDetail(null);}}>Mark Completed</button>}
            <button className="btn btn-outline" onClick={()=>{setCases(p=>p.map(c=>c.id===detail.id?{...detail}:c));setDetail(null);}}>Save Notes</button>
            <button className="btn btn-ghost" onClick={()=>setDetail(null)}>Close</button>
          </div>
        </Modal>
      )}

      {/* Add/Edit Case Modal */}
      {showForm && (
        <Modal title={editId?'Edit Case':'Add Case'} onClose={()=>{setShowForm(false);setEditId(null);}} wide>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            {[['date','Date','date'],['time','Time','time'],['surgeon','Surgeon Name','text'],['facility','Facility','text'],['or','OR Room','text'],['procedure','Procedure','text'],['implantSystem','Implant System','text']].map(([k,l,t])=>(
              <div key={k}><label style={{fontSize:11,color:'var(--text2)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>{l}</label>
                <input className="inp" type={t} value={form[k]} onChange={f(k)} placeholder={l}/></div>
            ))}
            <div><label style={{fontSize:11,color:'var(--text2)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>Case Type</label>
              <select className="inp" value={form.type} onChange={f('type')}>
                {['standard','mako','urgent'].map(t=><option key={t} value={t}>{t.charAt(0).toUpperCase()+t.slice(1)}</option>)}
              </select></div>
            {form.type==='mako' && <>
              <div><label style={{fontSize:11,color:'var(--text2)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>CT Scan Status</label>
                <select className="inp" value={form.ctStatus} onChange={f('ctStatus')}>
                  {['not_ordered','pending','loaded','na'].map(s=><option key={s} value={s}>{ctLabel(s)}</option>)}
                </select></div>
              <div style={{gridColumn:'span 2'}}><label style={{fontSize:11,color:'var(--text2)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>CT / Plan Notes</label>
                <textarea className="inp" rows={2} value={form.ctNotes} onChange={f('ctNotes')} placeholder="CT plan details, sizing notes..."/></div>
            </>}
            <div style={{gridColumn:'span 2'}}><label style={{fontSize:11,color:'var(--text2)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>Rep Note / Action Required</label>
              <input className="inp" value={form.repNote} onChange={f('repNote')} placeholder="Any flags or reminders for this case..."/></div>
          </div>
          <div style={{display:'flex',gap:10,marginTop:20}}>
            <button className="btn btn-gold" onClick={save}>Save Case</button>
            <button className="btn btn-ghost" onClick={()=>{setShowForm(false);setEditId(null);}}>Cancel</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── SURGEONS (Enhanced CRM) ───────────────────────────────────────────────────
function Surgeons({surgeons, setSurgeons}) {
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');
  const [detail, setDetail] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const [actType, setActType] = useState('Case');
  const [actNote, setActNote] = useState('');
  const [showTemplate, setShowTemplate] = useState(null);

  const blank = {name:'',hospital:'',specialty:'',relationship:'cold',phone:'',email:'',lastContact:'',nextFollowUp:'',
    preferences:{approach:'',fixation:'',implantBrand:'',sizing:'',OR_habits:'',patientTypes:'',makoUser:false,makoNotes:''},
    activities:[]};
  const [form, setForm] = useState(blank);
  const f = k=>e=>setForm(p=>({...p,[k]:e.target.value}));
  const fp = k=>e=>setForm(p=>({...p,preferences:{...p.preferences,[k]:e.target.value}}));

  const filtered = surgeons.filter(s=>{
    const m = !search || s.name.toLowerCase().includes(search.toLowerCase())||s.hospital.toLowerCase().includes(search.toLowerCase());
    const r = filter==='all'||s.relationship===filter;
    return m&&r;
  });

  const relColor = {cold:'var(--text2)',warm:'var(--gold)',hot:'var(--red)',partner:'var(--green)'};

  const logActivity = id => {
    if(!actNote.trim()) return;
    setSurgeons(p=>p.map(s=>s.id===id?{...s,lastContact:new Date().toISOString().slice(0,10),activities:[{id:uid(),type:actType,date:new Date().toISOString(),note:actNote},...(s.activities||[])]}:s));
    const updated = surgeons.find(s=>s.id===id);
    if(updated) setDetail({...updated,lastContact:new Date().toISOString().slice(0,10),activities:[{id:uid(),type:actType,date:new Date().toISOString(),note:actNote},...(updated.activities||[])]});
    setActNote('');
  };

  const save=()=>{
    if(!form.name) return;
    if(editId) setSurgeons(p=>p.map(s=>s.id===editId?{...s,...form}:s));
    else setSurgeons(p=>[...p,{id:uid(),...form}]);
    setShowForm(false); setEditId(null); setForm(blank);
  };
  const del=id=>{ setSurgeons(p=>p.filter(s=>s.id!==id)); if(detail?.id===id) setDetail(null); };
  const openEdit=s=>{ setForm({...blank,...s,preferences:{...blank.preferences,...s.preferences}}); setEditId(s.id); setShowForm(true); };

  const getTemplate = s => {
    const t = DATA.followUpTemplates[0];
    return t.template.replace('[SURGEON_NAME]',s.name).replace('[FACILITY]',s.hospital).replace('[PROCEDURE]','[Procedure]').replace('[CUSTOM_NOTE]','[Your note here]').replace('[ISSUE_NOTE]','').replace('[NEXT_CASE_DATE]','[Next case date]').replace('[CT_CONFIRM_DATE]','[Date]');
  };

  return (
    <div className="fade-up" style={{padding:24,maxWidth:1280,margin:'0 auto'}}>
      <SectionTitle title="Surgeon Profiles & CRM" icon="crm" sub="Preferences, relationship tracking, and activity history"
        action={<button className="btn btn-gold" onClick={()=>{setForm(blank);setEditId(null);setShowForm(true);}}><Icon n='plus' s={14}/>Add Surgeon</button>}/>

      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
        <Stat label="Total Surgeons" value={surgeons.length} icon="crm"/>
        <Stat label="Mako Users" value={surgeons.filter(s=>s.preferences?.makoUser).length} color="var(--teal)" icon="robot"/>
        <Stat label="Hot / Partner" value={surgeons.filter(s=>['hot','partner'].includes(s.relationship)).length} color="var(--green)" icon="star"/>
        <Stat label="Due for Follow-up" value={surgeons.filter(s=>s.nextFollowUp&&daysUntil(s.nextFollowUp)<=3).length} color="var(--orange)" icon="clock"/>
      </div>

      {/* Follow-up alerts */}
      {surgeons.filter(s=>s.nextFollowUp&&daysUntil(s.nextFollowUp)<=3).length>0 && (
        <div style={{background:'rgba(255,149,0,.07)',border:'1px solid rgba(255,149,0,.25)',borderRadius:12,padding:'12px 16px',marginBottom:16,display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          <div style={{fontSize:12,fontWeight:600,color:'var(--orange)',marginRight:4,display:'flex',alignItems:'center',gap:6}}><Icon n='phone' s={13} c='var(--orange)'/>Follow-ups Due:</div>
          {surgeons.filter(s=>s.nextFollowUp&&daysUntil(s.nextFollowUp)<=3).map(s=>(
            <button key={s.id} onClick={()=>setDetail(s)} className="chip">{s.name} · {fmtDateShort(s.nextFollowUp)}</button>
          ))}
        </div>
      )}

      {/* Search + Filter */}
      <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
        <div style={{position:'relative',flex:1,minWidth:200}}>
          <div style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)'}}><Icon n='search' s={14} c='var(--text2)'/></div>
          <input className="inp" style={{paddingLeft:36}} placeholder="Search surgeons..." value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <div style={{display:'flex',gap:6}}>
          {['all','cold','warm','hot','partner'].map(r=><Pill key={r} children={r.charAt(0).toUpperCase()+r.slice(1)} active={filter===r} onClick={()=>setFilter(r)}/>)}
        </div>
      </div>

      {/* Surgeon Cards Grid */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:16}}>
        {filtered.map(s=>(
          <div key={s.id} className="surgeon-card" onClick={()=>setDetail(s)}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
              <div>
                <div style={{fontWeight:800,fontSize:15}}>{s.name}</div>
                <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>{s.specialty}</div>
                <div style={{fontSize:12,color:'var(--text2)'}}>{s.hospital}</div>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:6,alignItems:'flex-end'}}>

          </div>

          <div style={{marginTop:20,paddingTop:16,borderTop:'1px solid var(--border)'}}>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
              {[['approach','Preferred Approach'],['fixation','Fixation Preference'],['implantBrand','Implant Brand / System'],['sizing','Sizing Tendency'],['OR_habits','OR Habits / Communication Style'],['patientTypes','Typical Patient Profile'],['makoNotes','Mako Notes']].map(([k,l])=>(
                <div key={k} style={{gridColumn:['OR_habits','makoNotes'].includes(k)?'span 2':'auto'}}>
                  <label style={{fontSize:10,color:'var(--text2)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>{l}</label>
                  <input className="inp" value={form.preferences?.[k]||''} onChange={fp(k)} placeholder={l}/>
                </div>
              ))}

                </select></div>
            </div>
          </div>

          <div style={{display:'flex',gap:10,marginTop:20}}>
            <button className="btn btn-gold" onClick={save}>Save Profile</button>
            <button className="btn btn-ghost" onClick={()=>{setShowForm(false);setEditId(null);}}>Cancel</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

    };
    return <div style={{textAlign:'center',padding:'10px 0'}}>{shapes[instrument.cat]||shapes['Trialing']}</div>;
  };

  return (
    <div className="fade-up" style={{padding:24,maxWidth:1280,margin:'0 auto'}}>

// ── INVENTORY ─────────────────────────────────────────────────────────────────
function Inventory({inventory, setInventory}) {
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const blank = {item:'',account:'',qty:0,par:2,expiry:'',status:'ok',notes:''};
  const [form, setForm] = useState(blank);
  const f = k=>e=>setForm(p=>({...p,[k]:e.target.value}));

  const filtered = inventory.filter(i=>{
    const m = !search||i.item.toLowerCase().includes(search.toLowerCase())||i.account.toLowerCase().includes(search.toLowerCase());
    const s = filter==='all'||i.status===filter;
    return m&&s;
  });

  const autoStatus = (qty,par) => +qty===0?'critical':+qty<+par?'low':'ok';

  const save=()=>{
    const status = autoStatus(form.qty,form.par);
    const item = {...form, qty:+form.qty, par:+form.par, status};
    if(editId) setInventory(p=>p.map(i=>i.id===editId?{...i,...item}:i));
    else setInventory(p=>[...p,{id:uid(),...item}]);
    setShowForm(false); setEditId(null); setForm(blank);
  };
  const del=id=>setInventory(p=>p.filter(i=>i.id!==id));
  const openEdit=i=>{ setForm({...blank,...i}); setEditId(i.id); setShowForm(true); };

  const critical = inventory.filter(i=>i.status==='critical');
  const low = inventory.filter(i=>i.status==='low');

  return (
    <div className="fade-up" style={{padding:24,maxWidth:1280,margin:'0 auto'}}>
      <SectionTitle title="Inventory Tracker" icon="inventory" sub="Consignment levels, expiration dates, and restock alerts"
        action={<button className="btn btn-gold" onClick={()=>{setForm(blank);setEditId(null);setShowForm(true);}}><Icon n='plus' s={14}/>Add Item</button>}/>

      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
        <Stat label="Total Items" value={inventory.length} icon="inventory"/>
        <Stat label="Critical" value={critical.length} color="var(--red)" sub={critical.length>0?'Order immediately':'All clear'} icon="alert"/>
        <Stat label="Low Stock" value={low.length} color="var(--orange)" sub={low.length>0?'Below par level':'All clear'} icon="alert"/>
        <Stat label="Accounts Stocked" value={[...new Set(inventory.map(i=>i.account))].length} color="var(--teal)" icon="hospital"/>
      </div>

      {/* Alerts */}
      {critical.length>0 && (

            <span className={`badge ${i.status==='critical'?'badge-red':i.status==='low'?'badge-orange':'badge-green'}`} style={{minWidth:70,justifyContent:'center'}}>
