  // ─── CHATBOT KNOWLEDGE BASE ──────────────────────────────────────────────
  chatKnowledge: [
    { keys: ['mako', 'robot', 'robotic'], response: 'Mako SmartRobotics uses CT-based 3D planning + a haptic-guided robotic arm to assist surgeons in joint replacement. It\'s FDA-cleared for PKA, TKA, and THA. Your role: ensure CT scans are planned before cases, support intraoperative workflow, and help grow utilization at Mako-enabled facilities. Key talk track: precision, personalized planning, and patient outcomes data.' },
    { keys: ['credential', 'credentialing', 'reptrax', 'vendormate', 'intellicentrics', 'compliance'], response: 'Hospital credentialing is mandatory for OR access. Key platforms in North Texas: Reptrax (Symplr), Vendormate, and Intellicentrics. Required documents usually include: background check, drug screen, immunization records (flu, Hep B, MMR, TB), HIPAA training, liability insurance certificate, and product training certs. Set 60-day renewal reminders and keep digital backups of all documents.' },
    { keys: ['tha', 'total hip', 'hip replacement', 'hip'], response: 'THA components: acetabular shell + liner, femoral stem, femoral head. Common approaches: posterior (most common), anterolateral, direct anterior (DAA). Your OR role: know implant sizes, have backup trays ready, track lot numbers, anticipate surgeon needs. Key metrics surgeons care about: leg length equality, cup inclination (~40°), and offset restoration.' },
    { keys: ['tka', 'total knee', 'knee replacement', 'knee'], response: 'TKA replaces femoral condyles, tibial plateau, and optionally the patella. Components: femoral component, tibial tray, poly insert, ± patellar button. CR vs PS design difference: CR retains PCL; PS uses post/cam mechanism. Your role: organize trays in order, know sizing, track trialing, document lot numbers. Goal: proper alignment along the mechanical axis with balanced gaps.' },
    { keys: ['partial knee', 'pka', 'unicompartmental', 'uni'], response: 'PKA (partial knee arthroplasty) replaces only the damaged compartment — most commonly medial. Indication: isolated compartmental OA with intact ACL. Advantages over TKA: preserves natural ligaments, less bone removal, often faster recovery. Mako is especially valuable for PKA due to the precision required for a smaller implant in a confined space.' },
    { keys: ['objection', 'objections', 'pushback', 'competing', 'competitor'], response: 'Common objections and responses: (1) "Happy with current vendor" → Acknowledge, then ask "What would ideal look like?" (2) "Mako takes too long" → Share learning curve data — times normalize quickly. (3) "Price is too high" → Pivot to total cost of care; Mako reduces revisions. (4) "Don\'t want to change" → Ask about their biggest OR frustration and tie Mako to solving it. Never badmouth competitors — use data instead.' },
    { keys: ['territory', 'dallas', 'north texas', 'dfw', 'market'], response: 'North Texas is one of the fastest-growing healthcare markets in the US. Key health systems: HCA, Baylor Scott & White, Methodist, UT Southwestern, Texas Health Resources. DFW suburbs (Plano, Frisco, McKinney, Allen, Mansfield) are high-growth targets. Tier your accounts: Tier 1 (protect), Tier 2 (grow), Tier 3 (target). Focus Mako conversations at facilities with the robot installed but underutilizing it.' },
    { keys: ['manager', 'report', 'cody', 'chanel', 'weekly report'], response: 'Your weekly manager report to Cody Crocker and Chanel Derr should include: (1) Cases covered this week + key wins, (2) New surgeon/admin contacts made, (3) Mako utilization updates, (4) Pipeline/opportunities, (5) Challenges needing support, (6) Ideas for Mako growth in the territory. Send every Sunday. Be concise, data-driven, and proactive about requesting help when needed.' },
    { keys: ['scrub tech', 'or staff', 'nurse', 'circulator', 'or etiquette'], response: 'Building strong OR staff relationships is as important as surgeon relationships. Tips: (1) Learn everyone\'s name and use it, (2) Bring food/snacks occasionally, (3) Help where appropriate without stepping on toes, (4) Respect the hierarchy, (5) Be reliable — if you say you\'ll do something, do it. The scrub tech and circulator influence surgeon preferences and your OR access.' },
    { keys: ['first 6 months', 'new rep', 'onboarding', 'success'], response: 'First 6-month blueprint: Month 1 — complete credentialing at all facilities, learn product line, shadow cases. Month 2 — begin supporting cases independently, build OR relationships. Month 3 — start independent case coverage, identify Mako growth opportunities. Month 4 — expand surgeon contacts, begin consultative sales calls. Month 5 — drive measurable territory growth. Month 6 — full territory management, performance review prep. Track every interaction in CRM.' },
    { keys: ['study', 'learn', 'training', 'module', 'quiz'], response: 'The Training Hub has 10 modules covering anatomy, Mako, THA/TKA/PKA, OR protocols, sales skills, territory management, credentialing, and competitive intelligence. Each module has quizzes to test retention. Recommended study schedule: 1 module per week minimum. Review quiz misses — those gaps will show up in real OR situations. Video resources are linked in each module.' },
    { keys: ['call', 'cold call', 'office visit', 'drop in'], response: 'Office call tips: (1) Research the practice and surgeon before going in, (2) Bring value — clinical article, product info, or lunch, (3) Build a relationship with the front desk first, (4) Keep it short — 5-10 min is ideal, (5) Always leave with a next step, (6) Friday afternoon and mid-morning (9-11 AM) are often the best windows. Log every visit in CRM immediately.' },
    { keys: ['crm', 'contact', 'track', 'log', 'notes'], response: 'Use the CRM for every surgeon, OR nurse, scrub tech, administrator, and scheduler you meet. Log: name, title, hospital, phone, email, relationship stage (cold/warm/hot/partner), last contact, next follow-up, and notes. Patterns you\'ll see over time: who responds to what, best contact times, relationship trajectory. CRM discipline separates top performers from average reps.' },
    { keys: ['anatomy', 'hip', 'knee', 'joint', 'bone'], response: 'For joint anatomy, refer to Module 1 in the Training Hub. Key points: Hip = ball-and-socket (femoral head + acetabulum), Knee = hinge joint (femoral condyles + tibial plateau + patella). OA (osteoarthritis = cartilage breakdown) is the primary indication for replacement. Understanding anatomy helps you have meaningful clinical conversations with surgeons.' },
    { keys: ['motivation', 'hard', 'tough', 'difficult', 'discouraged', 'tired'], response: 'Medical device sales is one of the most rewarding and challenging careers in healthcare. The first 6 months are the hardest — you\'re building from zero. Stay consistent: show up early, follow through on every commitment, keep learning, and track your progress. Your managers Cody and Chanel have been where you are. Use them. The reps who succeed are the ones who outwork, out-learn, and out-follow-up everyone else. You\'ve got this.' },
    { keys: ['insurance', 'liability', 'coverage'], response: 'Vendor liability insurance certificates are required for hospital credentialing. Stryker provides coverage for employees — confirm with your HR/operations team that your certificate is current and uploaded to all your credentialing platforms. Typical requirement: $1M-$2M general liability. Keep a digital copy of your current certificate.' }

    .quiz-opt{border:1px solid #3d3d3d;border-radius:8px;padding:10px 14px;cursor:pointer;transition:all .2s;text-align:left;background:#2a2a2a;color:#fff;width:100%}
    .quiz-opt:hover{border-color:#FFC72C;background:rgba(255,199,44,.08)}
    .quiz-opt.correct{background:rgba(34,197,94,.2);border-color:#22c55e;color:#4ade80}
    .quiz-opt.wrong{background:rgba(239,68,68,.2);border-color:#ef4444;color:#f87171}
    th{background:#2a2a2a;padding:10px 14px;text-align:left;font-weight:600;color:#FFC72C;font-size:13px}
    td{padding:10px 14px;border-bottom:1px solid #2a2a2a;font-size:13px;vertical-align:top}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#232323}
    table{width:100%;border-collapse:collapse;background:#1e1e1e;border-radius:10px;overflow:hidden}
    .section-title{font-size:22px;font-weight:800;color:#FFC72C;margin-bottom:16px;display:flex;align-items:center;gap:10px}
    .maintenance-banner{background:#1a1a00;border:1px solid #FFC72C;color:#FFC72C;text-align:center;padding:6px;font-size:12px;font-weight:600}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const DATA = window.CJ_DATA;

// ── Utilities ──────────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2,10);
const today = () => new Date();
const fmtDate = d => d ? new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';
const fmtDateShort = d => d ? new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '—';
const daysUntil = d => Math.ceil((new Date(d) - new Date()) / 86400000);
const ls = (k,v) => { try { if(v===undefined) return JSON.parse(localStorage.getItem(k)); localStorage.setItem(k,JSON.stringify(v)); } catch(e){} };

function useLS(key, def) {
  const [val, setVal] = useState(() => ls(key) ?? def);
  const set = useCallback(v => { setVal(v); ls(key, v); }, [key]);
  return [val, set];
}

// ── Small UI Components ────────────────────────────────────────────────────
const StatCard = ({label,value,sub,icon,color}) => (
  <div className="stat-card">
    <div style={{fontSize:24,marginBottom:4}}>{icon}</div>
    <div style={{fontSize:28,fontWeight:800,color:color||'#FFC72C'}}>{value}</div>
    <div style={{fontSize:13,color:'#aaa',marginTop:2}}>{label}</div>
    {sub && <div style={{fontSize:11,color:'#666',marginTop:4}}>{sub}</div>}
  </div>
);

const Modal = ({title,onClose,children}) => (
  <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <h2 style={{fontWeight:800,fontSize:20,color:'#FFC72C'}}>{title}</h2>
        <button onClick={onClose} style={{background:'none',border:'none',color:'#aaa',fontSize:22,cursor:'pointer'}}>✕</button>
      </div>
      {children}
    </div>
  </div>
);

const Badge = ({type,text}) => <span className={`badge badge-${type}`}>{text}</span>;

const ProgressBar = ({pct}) => (
  <div className="prog"><div className="prog-fill" style={{width:`${Math.min(pct,100)}%`}}/></div>
);

// ── HEADER ─────────────────────────────────────────────────────────────────
function Header({user}) {
  const [time, setTime] = useState(new Date());
  useEffect(()=>{ const t=setInterval(()=>setTime(new Date()),1000); return()=>clearInterval(t); },[]);
  const h=time.getHours(), m=time.getMinutes();
  const isMaint = h===1 && m<30;
  return (
    <div>
      {isMaint && <div className="maintenance-banner">⚙️  MAINTENANCE WINDOW ACTIVE (1:00–1:30 AM CT) — System optimizing for tomorrow. Back shortly.</div>}
      <header style={{background:'linear-gradient(135deg,#111 0%,#1a1a00 100%)',borderBottom:'2px solid #FFC72C',padding:'12px 24px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <div style={{background:'#FFC72C',color:'#111',fontWeight:900,fontSize:14,padding:'6px 12px',borderRadius:8,letterSpacing:1}}>CJ 3.0 BETA</div>
          <div>
            <div style={{fontWeight:700,fontSize:16}}>Stryker ASR Agent</div>
            <div style={{fontSize:11,color:'#888'}}>Joint Replacement · North Texas Territory</div>
          </div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontWeight:700,color:'#FFC72C',fontSize:15}}>{time.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</div>
          <div style={{fontSize:11,color:'#888'}}>{time.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</div>
          <div style={{fontSize:11,color:'#555'}}>Rep: {user.name} · Day {Math.ceil((new Date()-new Date(user.startDate))/86400000)} in role</div>
        </div>
      </header>
    </div>
  );
}

// ── NAVIGATION ─────────────────────────────────────────────────────────────
const TABS = [
  {id:'dashboard',label:'📊 Dashboard'},
  {id:'training',label:'🎓 Training'},
  {id:'intel',label:'📰 Intel Report'},
  {id:'roadmap',label:'🗓 6-Month Plan'},
  {id:'metrics',label:'📈 Metrics'},
  {id:'creds',label:'📋 Credentialing'},
  {id:'crm',label:'👥 CRM'},
  {id:'team',label:'🤝 Team Hub'},
  {id:'report',label:'📤 Manager Report'},
  {id:'chat',label:'💬 Assistant'},
];

function Nav({active,setActive}) {
  return (
    <div style={{background:'#161616',borderBottom:'1px solid #2d2d2d',overflowX:'auto',display:'flex',padding:'0 16px'}}>
      {TABS.map(t=>(
        <button key={t.id} className={`tab-btn ${active===t.id?'active':''}`}
          style={{padding:'14px 16px',background:'none',border:'none',color:active===t.id?'#FFC72C':'#888',fontWeight:600,fontSize:13,cursor:'pointer'}}
          onClick={()=>setActive(t.id)}>{t.label}</button>
      ))}
    </div>
  );
}

// ── DASHBOARD ──────────────────────────────────────────────────────────────
function Dashboard({contacts,credentials,trainingProgress,user}) {
  const d = today();
  const rep = DATA.reportTemplates[d.getDay()];
  const totalMods = DATA.trainingModules.length;
  const completed = Object.values(trainingProgress).filter(v=>v?.completed).length;
  const expiring = credentials.filter(c=>c.status==='expiring'||c.status==='expired').length;
  const dayNum = Math.ceil((new Date()-new Date(user.startDate))/86400000);
  const monthNum = Math.min(6,Math.ceil(dayNum/30));

  return (
    <div className="fade-in" style={{padding:24,maxWidth:1200,margin:'0 auto'}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:16,marginBottom:24}}>
        <StatCard label="Day in Role" value={dayNum} icon="📅" sub={`Month ${monthNum} of 6`}/>
        <StatCard label="Training Complete" value={`${completed}/${totalMods}`} icon="🎓" sub={`${Math.round(completed/totalMods*100)}% done`}/>
        <StatCard label="CRM Contacts" value={contacts.length} icon="👥" sub="Total logged"/>
        <StatCard label="Credential Alerts" value={expiring} icon="⚠️" color={expiring>0?'#f97316':'#22c55e'} sub={expiring>0?'Needs attention':'All clear'}/>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:20}}>
        <div>
          <div className="card glow" style={{marginBottom:20}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
              <div>
                <div style={{color:'#FFC72C',fontWeight:800,fontSize:16}}>☀️ Today's Morning Brief</div>
                <div style={{color:'#666',fontSize:12}}>Auto-generated · {d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})} · Released 6:00 AM CT</div>
              </div>
              <span className="badge badge-y">{rep.focus}</span>
            </div>
            <div style={{borderLeft:'3px solid #FFC72C',paddingLeft:16,marginBottom:14}}>
              <div style={{color:'#aaa',fontSize:13,fontWeight:600,marginBottom:4}}>🤖 MAKO INSIGHT</div>
              <p style={{fontSize:14,lineHeight:1.6,color:'#ddd'}}>{rep.makoHighlight}</p>
            </div>
            <div style={{borderLeft:'3px solid #444',paddingLeft:16,marginBottom:14}}>
              <div style={{color:'#aaa',fontSize:13,fontWeight:600,marginBottom:4}}>📈 MARKET INSIGHT</div>
              <p style={{fontSize:14,lineHeight:1.6,color:'#ddd'}}>{rep.marketInsight}</p>
            </div>
            <div style={{borderLeft:'3px solid #3b82f6',paddingLeft:16}}>
              <div style={{color:'#aaa',fontSize:13,fontWeight:600,marginBottom:4}}>📍 TERRITORY FOCUS</div>
              <p style={{fontSize:14,lineHeight:1.6,color:'#ddd'}}>{rep.territory}</p>
            </div>
          </div>

          <div className="card">
            <div style={{color:'#FFC72C',fontWeight:800,fontSize:15,marginBottom:12}}>⚡ Today's Action Items</div>
            {rep.action.map((a,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:i<rep.action.length-1?'1px solid #2d2d2d':''}}>
                <div style={{width:22,height:22,borderRadius:'50%',border:'2px solid #FFC72C',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,color:'#FFC72C',flexShrink:0}}>{i+1}</div>
                <span style={{fontSize:14,color:'#ddd'}}>{a}</span>
              </div>
            ))}
          </div>
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div className="card">
            <div style={{color:'#FFC72C',fontWeight:700,fontSize:15,marginBottom:12}}>📚 Training Progress</div>
            <ProgressBar pct={completed/totalMods*100}/>
            <div style={{fontSize:13,color:'#aaa',marginTop:8}}>{completed} of {totalMods} modules complete</div>
            {DATA.trainingModules.filter(m=>!trainingProgress[m.id]?.completed).slice(0,3).map(m=>(
              <div key={m.id} style={{marginTop:8,padding:'8px',background:'#2a2a2a',borderRadius:8,fontSize:13}}>
                <span style={{fontSize:16,marginRight:6}}>{m.icon}</span>{m.title}
              </div>
            ))}
          </div>

          <div className="card">
            <div style={{color:'#FFC72C',fontWeight:700,fontSize:15,marginBottom:10}}>🏥 Credential Alerts</div>
            {credentials.filter(c=>c.status!=='active').length===0
              ? <div style={{color:'#22c55e',fontSize:13}}>✅ All credentials current!</div>
              : credentials.filter(c=>c.status!=='active').map(c=>(
                <div key={c.id} style={{marginBottom:8,padding:'8px',background:'#2a2a2a',borderRadius:8}}>
                  <div style={{fontSize:13,fontWeight:600}}>{c.hospital}</div>
                  <div style={{fontSize:11,color:'#888',marginTop:2}}>{c.platform} · <span style={{color:c.status==='expired'?'#ef4444':'#f97316'}}>{c.status.toUpperCase()}</span></div>
                  {c.expDate && <div style={{fontSize:11,color:'#666'}}>{daysUntil(c.expDate)} days</div>}
                </div>
              ))
            }
          </div>

          <div className="card">
            <div style={{color:'#FFC72C',fontWeight:700,fontSize:15,marginBottom:10}}>⚙️ System Status</div>
            <div style={{fontSize:13,color:'#aaa',marginBottom:6}}>Next maintenance: <span style={{color:'#FFC72C'}}>1:00–1:30 AM CT</span></div>
            <div style={{fontSize:12,color:'#666'}}>Daily reports release at 6:00 AM CT. Team reports every Sunday.</div>
            <div style={{marginTop:10,padding:'8px',background:'#0a1a0a',borderRadius:8,border:'1px solid #1a3a1a'}}>
              <div style={{color:'#22c55e',fontSize:12,fontWeight:700}}>● All Systems Operational</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── TRAINING ───────────────────────────────────────────────────────────────
function Training({trainingProgress,setTrainingProgress}) {
  const [selected,setSelected]=useState(null);
  const [quiz,setQuiz]=useState(null);
  const [qIdx,setQIdx]=useState(0);
  const [ans,setAns]=useState(null);
  const [score,setScore]=useState(0);
  const [quizDone,setQuizDone]=useState(false);
  const [view,setView]=useState('modules'); // 'modules','module','quiz'

  const prog = mod => trainingProgress[mod.id] || {};
  const pct = () => DATA.trainingModules.filter(m=>trainingProgress[m.id]?.completed).length / DATA.trainingModules.length * 100;

  const startQuiz = mod => {
    setQuiz(mod);
    setQIdx(0);
    setAns(null);
    setScore(0);
    setQuizDone(false);
    setView('quiz');
  };

  const handleAns = (mod, idx) => {
    if(ans!==null) return;
    setAns(idx);
    if(idx === quiz.quiz[qIdx].correct) setScore(s=>s+1);
    setTimeout(()=>{
      if(qIdx+1 >= quiz.quiz.length) {
        setQuizDone(true);
        const pctScore = (score+(idx===quiz.quiz[qIdx].correct?1:0)) / quiz.quiz.length * 100;
        if(pctScore>=70) {
          setTrainingProgress(prev=>({...prev,[quiz.id]:{...prev[quiz.id],completed:true,score:pctScore,date:new Date().toISOString()}}));
        }
      } else {
        setQIdx(q=>q+1);
        setAns(null);
      }
    }, 1400);
  };

  const finalScore = () => score / quiz.quiz.length * 100;

  if(view==='quiz' && quiz) {
    const q = quiz.quiz[qIdx];
    return (
      <div className="fade-in" style={{padding:24,maxWidth:700,margin:'0 auto'}}>
        <button className="btn-o" onClick={()=>setView('module')} style={{marginBottom:20}}>← Back to Module</button>
        {!quizDone ? (
          <div className="card">
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
              <div style={{color:'#FFC72C',fontWeight:700}}>{quiz.icon} {quiz.title} — Quiz</div>
              <div style={{fontSize:13,color:'#888'}}>Q{qIdx+1}/{quiz.quiz.length}</div>
            </div>
            <ProgressBar pct={(qIdx/quiz.quiz.length)*100}/>
            <div style={{fontSize:16,fontWeight:600,margin:'20px 0 16px',lineHeight:1.5}}>{q.q}</div>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {q.opts.map((o,i)=>(
                <button key={i} className={`quiz-opt ${ans!==null?(i===q.correct?'correct':ans===i?'wrong':''):''}`}
                  onClick={()=>handleAns(quiz,i)}>{o}</button>
              ))}
            </div>
            {ans!==null && <div style={{marginTop:16,padding:14,background:'#1a2a1a',border:'1px solid #2a4a2a',borderRadius:8,fontSize:13,color:'#aaa',lineHeight:1.5}}>
              💡 {q.exp}
            </div>}
          </div>
        ) : (
          <div className="card" style={{textAlign:'center'}}>
            <div style={{fontSize:48,marginBottom:12}}>{finalScore()>=70?'🏆':'📚'}</div>
            <div style={{fontSize:24,fontWeight:800,color:finalScore()>=70?'#22c55e':'#f97316',marginBottom:8}}>
              {Math.round(finalScore())}%
            </div>
            <div style={{fontSize:16,color:'#ddd',marginBottom:20}}>
              {finalScore()>=70?'Module Passed! Well done.':'Keep studying — try again.'}
            </div>
            <div style={{color:'#888',fontSize:13,marginBottom:20}}>{score} of {quiz.quiz.length} correct</div>
            <div style={{display:'flex',gap:12,justifyContent:'center'}}>
              <button className="btn-y" onClick={()=>{setView('module');setSelected(quiz)}}>Back to Module</button>
              {finalScore()<70 && <button className="btn-o" onClick={()=>startQuiz(quiz)}>Retry Quiz</button>}
            </div>
          </div>
        )}
      </div>
    );
  }

  if(view==='module' && selected) {
    const p = prog(selected);
    return (
      <div className="fade-in" style={{padding:24,maxWidth:800,margin:'0 auto'}}>
        <button className="btn-o" onClick={()=>setView('modules')} style={{marginBottom:20}}>← All Modules</button>
        <div className="card" style={{marginBottom:20}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}}>
            <div>
              <div style={{fontSize:28,marginBottom:6}}>{selected.icon}</div>
              <div style={{fontSize:22,fontWeight:800,marginBottom:4}}>{selected.title}</div>
              <div style={{color:'#888',fontSize:13}}>{selected.category} · {selected.duration}</div>
            </div>
            {p.completed && <Badge type="g" text="✓ Completed"/>}
          </div>
          <p style={{marginTop:16,lineHeight:1.7,color:'#ccc',fontSize:14}}>{selected.content}</p>
          <div style={{marginTop:20,display:'flex',gap:12,flexWrap:'wrap'}}>
            <button className="btn-y" onClick={()=>startQuiz(selected)}>
              {p.completed?'Retake Quiz':'Take Quiz'}
            </button>
            {p.completed && <div style={{color:'#22c55e',fontSize:13,display:'flex',alignItems:'center',gap:6}}>
              ✅ Last score: {Math.round(p.score)}% · {fmtDateShort(p.date)}
            </div>}
          </div>
        </div>
        <div className="card">
          <div style={{color:'#FFC72C',fontWeight:700,fontSize:15,marginBottom:14}}>🎬 Video Resources</div>
          {selected.videos.map((v,i)=>(
            <a key={i} href={v.url} target="_blank" rel="noopener noreferrer"
              style={{display:'flex',alignItems:'center',gap:10,padding:'10px',background:'#2a2a2a',borderRadius:8,marginBottom:8,textDecoration:'none',color:'#ddd',fontSize:14}}>
              <span style={{fontSize:20}}>▶️</span><span>{v.title}</span>
              <span style={{marginLeft:'auto',fontSize:11,color:'#666'}}>External Link →</span>
            </a>
          ))}
        </div>
      </div>
    );
  }

  // Module list
  const cats = [...new Set(DATA.trainingModules.map(m=>m.category))];
  return (
    <div className="fade-in" style={{padding:24,maxWidth:1100,margin:'0 auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div className="section-title">🎓 Training Hub</div>
        <div style={{textAlign:'right'}}>
          <div style={{color:'#FFC72C',fontWeight:700,fontSize:18}}>{Math.round(pct())}%</div>
          <div style={{fontSize:12,color:'#888'}}>Overall completion</div>
        </div>
      </div>
      <div style={{marginBottom:20}}>
        <ProgressBar pct={pct()}/>
      </div>
      {cats.map(cat=>(
        <div key={cat} style={{marginBottom:28}}>
          <div style={{color:'#888',fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:12}}>{cat}</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:14}}>
            {DATA.trainingModules.filter(m=>m.category===cat).map(m=>{
              const p=prog(m);
              return (
                <div key={m.id} className="card" style={{cursor:'pointer',position:'relative'}}
                  onClick={()=>{setSelected(m);setView('module')}}>
                  {p.completed && <div style={{position:'absolute',top:12,right:12}}><Badge type="g" text="✓"/></div>}
                  <div style={{fontSize:28,marginBottom:8}}>{m.icon}</div>
                  <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>{m.title}</div>
                  <div style={{color:'#888',fontSize:12,marginBottom:12}}>{m.duration} · {m.quiz.length} questions</div>
                  <p style={{fontSize:13,color:'#aaa',lineHeight:1.5}}>{m.description}</p>
                  {p.completed && <div style={{marginTop:12,fontSize:12,color:'#22c55e'}}>Score: {Math.round(p.score)}%</div>}
                </div>
              );
            })}
          </div>
        </div>
      ))}
      <div style={{marginTop:24,padding:16,background:'#1a1a00',border:'1px solid #3d3d00',borderRadius:10,fontSize:13,color:'#aaa'}}>
        ⚖️ <strong style={{color:'#FFC72C'}}>Confidentiality Notice:</strong> All training content is derived from publicly available information.
        Always defer to your Stryker onboarding materials, manager guidance, and official Stryker training for product specifications and compliance requirements.
      </div>
    </div>
  );
}

// ── INDUSTRY INTEL ─────────────────────────────────────────────────────────
function IntelReport() {
  const d = today();
  const rep = DATA.reportTemplates[d.getDay()];
  const [archiveDay,setArchiveDay]=useState(null);

  const archiveDays = [0,1,2,3,4,5,6].map(i=>{
    const dt = new Date(); dt.setDate(dt.getDate()-i);
    return {dt, rep: DATA.reportTemplates[dt.getDay()]};
  });

  const shown = archiveDay !== null ? archiveDays[archiveDay] : {dt:d,rep};

  return (
    <div className="fade-in" style={{padding:24,maxWidth:1100,margin:'0 auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12,marginBottom:20}}>
        <div>
          <div className="section-title">📰 Industry Intel Report</div>
          <div style={{color:'#666',fontSize:13}}>Released daily at 6:00 AM CT · North Texas / Mako Focus</div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {archiveDays.map((a,i)=>(
            <button key={i} onClick={()=>setArchiveDay(i===archiveDay?null:i)}
              className={i===(archiveDay??0)?'btn-y':'btn-o'}
              style={{fontSize:11,padding:'6px 10px'}}>
              {i===0?'Today':i===1?'Yesterday':a.dt.toLocaleDateString('en-US',{weekday:'short'})}
            </button>
          ))}
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:20}}>
        <div>
          <div className="card" style={{marginBottom:16}}>
            <div style={{display:'flex',justify:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:8}}>
              <div>
                <div style={{color:'#FFC72C',fontWeight:800,fontSize:18}}>{shown.dt.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</div>
                <div style={{color:'#888',fontSize:13}}>Focus: {shown.rep.focus}</div>
              </div>
              <Badge type="y" text="INTEL"/>
            </div>

// ── 6-MONTH ROADMAP ────────────────────────────────────────────────────────
function Roadmap({user,trainingProgress}) {
  const [milestoneNotes,setMilestoneNotes]=useLS('cj_milestoneNotes',{});
  const [selectedMonth,setSelectedMonth]=useState(null);
  const [note,setNote]=useState('');
  const dayNum = Math.ceil((new Date()-new Date(user.startDate))/86400000);
  const currentMonth = Math.min(6,Math.ceil(dayNum/30));

  return (
    <div className="fade-in" style={{padding:24,maxWidth:1000,margin:'0 auto'}}>
      <div className="section-title">🗓 6-Month Success Roadmap</div>
      <div style={{marginBottom:20,color:'#888',fontSize:14}}>
        Day <strong style={{color:'#FFC72C'}}>{dayNum}</strong> in role · Currently in <strong style={{color:'#FFC72C'}}>Month {currentMonth}</strong>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginBottom:24}}>
        {DATA.milestones.map(m=>{
          const done = m.month < currentMonth;
          const active = m.month === currentMonth;
          return (
            <div key={m.month} className="card" style={{borderColor:active?m.color:'#2d2d2d',cursor:'pointer',opacity:done?0.7:1}}
              onClick={()=>{setSelectedMonth(m.month);setNote(milestoneNotes[m.month]||'')}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                <div style={{color:m.color,fontWeight:800,fontSize:16}}>Month {m.month}</div>
                {done && <Badge type="g" text="✓ Done"/>}
                {active && <Badge type="y" text="ACTIVE"/>}
              </div>
              <div style={{fontWeight:700,fontSize:15,marginBottom:10,color:m.color}}>{m.title}</div>
              {m.goals.map((g,i)=>(
                <div key={i} style={{fontSize:12,color:'#aaa',padding:'4px 0',borderBottom:'1px solid #2a2a2a',display:'flex',gap:6}}>
                  <span style={{color:done?'#22c55e':active?m.color:'#555'}}>{done?'✓':active?'→':'○'}</span>{g}
                </div>
              ))}
              {milestoneNotes[m.month] && <div style={{marginTop:10,padding:8,background:'#2a2a2a',borderRadius:6,fontSize:12,color:'#aaa'}}>{milestoneNotes[m.month]}</div>}
            </div>
          );
        })}
      </div>

      {selectedMonth && (
        <Modal title={`Month ${selectedMonth} Notes`} onClose={()=>setSelectedMonth(null)}>
          <textarea className="inp" rows={5} value={note} onChange={e=>setNote(e.target.value)}
            placeholder="Add personal notes, achievements, or reflections for this month..."/>
          <div style={{marginTop:12,display:'flex',gap:10}}>
            <button className="btn-y" onClick={()=>{setMilestoneNotes(prev=>({...prev,[selectedMonth]:note}));setSelectedMonth(null);}}>Save Notes</button>
            <button className="btn-o" onClick={()=>setSelectedMonth(null)}>Cancel</button>
          </div>
        </Modal>
      )}

      <div className="card" style={{background:'#1a1a00',borderColor:'#3d3d00'}}>
        <div style={{color:'#FFC72C',fontWeight:700,fontSize:14,marginBottom:10}}>💡 First 6 Months Success Tips</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          {[
            'Treat every OR case as an opportunity to learn, not just cover',
            'Build relationships with OR staff before you need them to like you',
            'Log EVERY interaction in CRM — your memory is not as good as a database',
            'Ask your full sales reps for coaching constantly — they know the territory',
            'Never miss a credentialing deadline — it will cost you cases',
            'Send your weekly report EVERY Sunday — consistency builds trust',
            'Study your competition — know what your surgeons are currently using',
            'Be 30 min early to every case — preparation is professionalism',
          ].map((t,i)=>(
            <div key={i} style={{fontSize:13,color:'#ccc',padding:10,background:'#111',borderRadius:8,border:'1px solid #2d2d00'}}>
              <span style={{color:'#FFC72C',fontWeight:700}}>#{i+1}</span> {t}

          ))}

      </div>
    </div>

}

// ── CREDENTIALING ──────────────────────────────────────────────────────────
function Credentialing({credentials,setCredentials}) {
  const [showForm,setShowForm]=useState(false);
  const [editId,setEditId]=useState(null);
  const [form,setForm]=useState({hospital:'',platform:'Reptrax',status:'active',expDate:'',docs:'',notes:''});
  const f = k => e => setForm(prev=>({...prev,[k]:e.target.value}));

  const save = () => {
    if(!form.hospital) return;
    const entry={id:editId||uid(),...form,docs:form.docs.split('\n').filter(Boolean)};
    if(editId) setCredentials(prev=>prev.map(c=>c.id===editId?entry:c));
    else setCredentials(prev=>[...prev,entry]);
    setShowForm(false);setEditId(null);setForm({hospital:'',platform:'Reptrax',status:'active',expDate:'',docs:'',notes:''});
  };

  const openEdit = c => {
    setForm({...c,docs:Array.isArray(c.docs)?c.docs.join('\n'):c.docs||''});
    setEditId(c.id);setShowForm(true);
  };

  const del = id => setCredentials(prev=>prev.filter(c=>c.id!==id));

  const statusColor = s => ({active:'#22c55e',expiring:'#f97316',expired:'#ef4444',pending:'#3b82f6'}[s]||'#888');

  const expiring = credentials.filter(c=>{
    if(!c.expDate) return false;
    return daysUntil(c.expDate) <= 60;
  });

  return (
    <div className="fade-in" style={{padding:24,maxWidth:1100,margin:'0 auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div className="section-title">📋 Hospital Credentialing</div>
        <button className="btn-y" onClick={()=>setShowForm(true)}>+ Add Facility</button>
      </div>

      {expiring.length>0 && (
        <div style={{background:'#2a1000',border:'1px solid #f97316',borderRadius:10,padding:14,marginBottom:20}}>
          <div style={{color:'#f97316',fontWeight:700,marginBottom:8}}>⚠️ Attention Required ({expiring.length} facilities)</div>
          {expiring.map(c=>(
            <div key={c.id} style={{fontSize:13,color:'#ccc',marginBottom:4}}>
              • <strong>{c.hospital}</strong> — {c.platform} — Expires {fmtDate(c.expDate)} ({daysUntil(c.expDate)} days)
            </div>
          ))}
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:16}}>
        {credentials.map(c=>(
          <div key={c.id} className="card" style={{borderLeft:`4px solid ${statusColor(c.status)}`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
              <div>
                <div style={{fontWeight:700,fontSize:14}}>{c.hospital}</div>
                <div style={{fontSize:12,color:'#888',marginTop:2}}>{c.platform}</div>
              </div>
              <span className="badge" style={{background:statusColor(c.status),color:'#fff'}}>{c.status.toUpperCase()}</span>
            </div>
            {c.expDate && (
              <div style={{fontSize:13,color:daysUntil(c.expDate)<=30?'#ef4444':daysUntil(c.expDate)<=60?'#f97316':'#888',marginBottom:8}}>
                📅 Expires: {fmtDate(c.expDate)} ({daysUntil(c.expDate)} days)
              </div>
            )}
            <div style={{marginBottom:10}}>
              {(Array.isArray(c.docs)?c.docs:c.docs?.split('\n')||[]).map((d,i)=>(
                <span key={i} style={{display:'inline-block',background:'#2a2a2a',color:'#ccc',fontSize:11,padding:'2px 8px',borderRadius:12,margin:'2px'}}>{d}</span>
              ))}
            </div>
            {c.notes && <div style={{fontSize:12,color:'#888',marginBottom:10}}>{c.notes}</div>}
            <div style={{display:'flex',gap:8}}>
              <button className="btn-o" style={{fontSize:12,padding:'6px 12px'}} onClick={()=>openEdit(c)}>Edit</button>
              <button className="btn-r" style={{fontSize:12,padding:'6px 12px'}} onClick={()=>del(c.id)}>Remove</button>
            </div>
          </div>
        ))}
        {credentials.length===0 && <div style={{color:'#555',fontSize:14}}>No credentials logged yet. Add your first facility.</div>}
      </div>

      {showForm && (
        <Modal title={editId?'Edit Credential':'Add Facility Credential'} onClose={()=>{setShowForm(false);setEditId(null);}}>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <div><label style={{fontSize:12,color:'#888',display:'block',marginBottom:4}}>Hospital / Facility</label>
              <input className="inp" value={form.hospital} onChange={f('hospital')} placeholder="e.g. Baylor Scott & White Medical Center"/></div>
            <div><label style={{fontSize:12,color:'#888',display:'block',marginBottom:4}}>Credentialing Platform</label>
              <select className="inp" value={form.platform} onChange={f('platform')}>
                {['Reptrax','Vendormate','Intellicentrics','Symplr','Other'].map(p=><option key={p}>{p}</option>)}
              </select></div>
            <div><label style={{fontSize:12,color:'#888',display:'block',marginBottom:4}}>Status</label>
              <select className="inp" value={form.status} onChange={f('status')}>
                {['active','expiring','expired','pending'].map(s=><option key={s}>{s}</option>)}
              </select></div>
            <div><label style={{fontSize:12,color:'#888',display:'block',marginBottom:4}}>Expiration Date</label>
              <input className="inp" type="date" value={form.expDate} onChange={f('expDate')}/></div>
            <div><label style={{fontSize:12,color:'#888',display:'block',marginBottom:4}}>Required Documents (one per line)</label>
              <textarea className="inp" rows={4} value={form.docs} onChange={f('docs')} placeholder="Background Check&#10;Flu Vaccine&#10;HIPAA Training"/></div>
            <div><label style={{fontSize:12,color:'#888',display:'block',marginBottom:4}}>Notes</label>
              <input className="inp" value={form.notes} onChange={f('notes')} placeholder="Additional notes or check-in instructions"/></div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn-y" onClick={save}>Save</button>
              <button className="btn-o" onClick={()=>{setShowForm(false);setEditId(null);}}>Cancel</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── CRM ────────────────────────────────────────────────────────────────────
function CRM({contacts,setContacts}) {
  const [showForm,setShowForm]=useState(false);
  const [editId,setEditId]=useState(null);
  const [detail,setDetail]=useState(null);
  const [filter,setFilter]=useState('all');
  const [search,setSearch]=useState('');
  const blank={name:'',title:'',hospital:'',phone:'',email:'',relationship:'cold',lastContact:'',nextFollowUp:'',notes:'',tags:''};
  const [form,setForm]=useState(blank);
  const [actNote,setActNote]=useState('');
  const [actType,setActType]=useState('Call');
  const f=k=>e=>setForm(prev=>({...prev,[k]:e.target.value}));

  const relColor={cold:'#888',warm:'#f97316',hot:'#ef4444',partner:'#22c55e'};

  const save=()=>{
    if(!form.name)return;
    const entry={id:editId||uid(),...form,tags:form.tags.split(',').map(t=>t.trim()).filter(Boolean),activities:editId?(contacts.find(c=>c.id===editId)?.activities||[]):[]};
    if(editId)setContacts(prev=>prev.map(c=>c.id===editId?entry:c));
    else setContacts(prev=>[...prev,entry]);
    setShowForm(false);setEditId(null);setForm(blank);
  };

  const openEdit=c=>{setForm({...c,tags:c.tags?.join(', ')||''});setEditId(c.id);setShowForm(true);};
  const del=id=>{setContacts(prev=>prev.filter(c=>c.id!==id));setDetail(null);};

  const logActivity=cid=>{
    if(!actNote)return;
    const act={id:uid(),type:actType,note:actNote,date:new Date().toISOString()};
    setContacts(prev=>prev.map(c=>c.id===cid?{...c,activities:[act,...(c.activities||[])],lastContact:act.date}:c));
    setDetail(prev=>({...prev,activities:[act,...(prev.activities||[])],lastContact:act.date}));
    setActNote('');
  };

  const filtered=contacts.filter(c=>{
    const matchF=filter==='all'||c.relationship===filter;
    const matchS=search===''||[c.name,c.hospital,c.title,c.email].some(s=>s?.toLowerCase().includes(search.toLowerCase()));
    return matchF&&matchS;
  });

  const followUps=contacts.filter(c=>c.nextFollowUp&&daysUntil(c.nextFollowUp)<=3&&daysUntil(c.nextFollowUp)>=0);

  return (
    <div className="fade-in" style={{padding:24,maxWidth:1200,margin:'0 auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div className="section-title">👥 CRM — Contact Manager</div>
        <button className="btn-y" onClick={()=>setShowForm(true)}>+ Add Contact</button>
      </div>

      {followUps.length>0 && (
        <div style={{background:'#1a1000',border:'1px solid #f97316',borderRadius:10,padding:12,marginBottom:16}}>
          <div style={{color:'#f97316',fontWeight:700,fontSize:13,marginBottom:6}}>📞 Follow-ups Due Soon</div>
          {followUps.map(c=>(
            <span key={c.id} onClick={()=>setDetail(c)} style={{display:'inline-block',margin:'3px',padding:'4px 10px',background:'#2a1800',border:'1px solid #f97316',borderRadius:20,fontSize:12,cursor:'pointer',color:'#f97316'}}>
              {c.name} · {fmtDateShort(c.nextFollowUp)}
            </span>
          ))}
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:12,marginBottom:16}}>
        <StatCard label="Total Contacts" value={contacts.length} icon="👥"/>
        <StatCard label="Hot Accounts" value={contacts.filter(c=>c.relationship==='hot').length} icon="🔥" color="#ef4444"/>
        <StatCard label="Partners" value={contacts.filter(c=>c.relationship==='partner').length} icon="🤝" color="#22c55e"/>
        <StatCard label="Pending Follow-up" value={contacts.filter(c=>c.nextFollowUp&&daysUntil(c.nextFollowUp)<=7).length} icon="📞" color="#f97316"/>
      </div>

      <div style={{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap'}}>
        <input className="inp" style={{flex:1,minWidth:200}} placeholder="Search contacts..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <div style={{display:'flex',gap:8}}>
          {['all','cold','warm','hot','partner'].map(r=>(
            <button key={r} onClick={()=>setFilter(r)}
              className={filter===r?'btn-y':'btn-o'}
              style={{fontSize:12,padding:'8px 14px',textTransform:'capitalize'}}>{r}</button>
          ))}
        </div>
      </div>

      <table>
        <thead><tr>
          <th>Name</th><th>Title</th><th>Hospital</th><th>Relationship</th><th>Last Contact</th><th>Follow-up</th><th>Actions</th>
        </tr></thead>
        <tbody>
          {filtered.map(c=>(
            <tr key={c.id} style={{cursor:'pointer'}} onClick={()=>setDetail(c)}>
              <td><strong>{c.name}</strong></td>
              <td style={{color:'#aaa'}}>{c.title}</td>
              <td style={{color:'#aaa'}}>{c.hospital}</td>
              <td><span className="badge" style={{background:relColor[c.relationship],color:'#fff'}}>{c.relationship}</span></td>
              <td style={{color:'#888',fontSize:12}}>{c.lastContact?fmtDateShort(c.lastContact):'—'}</td>
              <td style={{color:c.nextFollowUp&&daysUntil(c.nextFollowUp)<=3?'#f97316':'#aaa',fontSize:12}}>{c.nextFollowUp?fmtDateShort(c.nextFollowUp):'—'}</td>
              <td onClick={e=>e.stopPropagation()} style={{display:'flex',gap:6}}>
                <button className="btn-o" style={{fontSize:11,padding:'4px 8px'}} onClick={()=>openEdit(c)}>Edit</button>
                <button className="btn-r" style={{fontSize:11,padding:'4px 8px'}} onClick={()=>del(c.id)}>Del</button>
              </td>
            </tr>
          ))}
          {filtered.length===0 && <tr><td colSpan={7} style={{color:'#555',textAlign:'center',padding:30}}>No contacts match your filter.</td></tr>}
        </tbody>
      </table>

      {detail && (
        <Modal title={detail.name} onClose={()=>setDetail(null)}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
            {[['Title',detail.title],['Hospital',detail.hospital],['Phone',detail.phone],['Email',detail.email],['Relationship',detail.relationship]].map(([k,v])=>(
              <div key={k}><div style={{fontSize:11,color:'#888'}}>{k}</div><div style={{fontSize:14,color:'#ddd'}}>{v||'—'}</div></div>
            ))}
          </div>
          {detail.tags?.length>0 && <div style={{marginBottom:12}}>{detail.tags.map(t=><span key={t} className="badge badge-b" style={{margin:'2px'}}>{t}</span>)}</div>}
          {detail.notes && <p style={{fontSize:13,color:'#aaa',marginBottom:16,background:'#2a2a2a',padding:10,borderRadius:8}}>{detail.notes}</p>}
          <div style={{borderTop:'1px solid #2d2d2d',paddingTop:14,marginBottom:14}}>
            <div style={{color:'#FFC72C',fontWeight:700,fontSize:13,marginBottom:10}}>📝 Log Activity</div>
            <div style={{display:'flex',gap:8,marginBottom:8}}>
              {['Call','Visit','Email','Demo','Other'].map(t=>(
                <button key={t} onClick={()=>setActType(t)} className={actType===t?'btn-y':'btn-o'} style={{fontSize:12,padding:'6px 12px'}}>{t}</button>
              ))}
            </div>
            <textarea className="inp" rows={2} value={actNote} onChange={e=>setActNote(e.target.value)} placeholder="Notes from this interaction..."/>
            <button className="btn-y" style={{marginTop:8}} onClick={()=>logActivity(detail.id)}>Log Activity</button>
          </div>
          {detail.activities?.length>0 && (
            <div>
              <div style={{color:'#888',fontSize:13,fontWeight:600,marginBottom:8}}>Activity History</div>
              {detail.activities.slice(0,5).map(a=>(
                <div key={a.id} style={{padding:'8px',background:'#2a2a2a',borderRadius:8,marginBottom:6}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                    <span className="badge badge-b" style={{fontSize:10}}>{a.type}</span>
                    <span style={{fontSize:11,color:'#555'}}>{fmtDate(a.date)}</span>
                  </div>
                  <div style={{fontSize:13,color:'#ccc'}}>{a.note}</div>
                </div>
              ))}
            </div>
          )}
        </Modal>
      )}

      {showForm && (
        <Modal title={editId?'Edit Contact':'Add Contact'} onClose={()=>{setShowForm(false);setEditId(null);}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            {[['name','Name *'],['title','Title / Role'],['hospital','Hospital / Facility'],['phone','Phone'],['email','Email']].map(([k,l])=>(
              <div key={k}><label style={{fontSize:12,color:'#888',display:'block',marginBottom:4}}>{l}</label>
                <input className="inp" value={form[k]} onChange={f(k)} placeholder={l}/></div>

// ── CHATBOT ────────────────────────────────────────────────────────────────
function Chatbot() {
  const [history,setHistory]=useLS('cj_chatHistory',[{role:'bot',msg:'👋 Hi! I\'m your CJ 3.0 Beta assistant. Ask me anything about your role, Mako, joint replacement, OR etiquette, credentialing, or sales strategies. I\'m here 24/7 to help you succeed!'}]);
  const [input,setInput]=useState('');
  const bottomRef=useRef();

  useEffect(()=>bottomRef.current?.scrollIntoView({behavior:'smooth'}),[history]);

  const respond=q=>{
    const ql=q.toLowerCase();
    const match=DATA.chatKnowledge.find(k=>k.keys.some(key=>ql.includes(key)));
    return match?match.response:`Great question! For the most accurate info on "${q}", I recommend checking your Stryker training portal or asking your managers Cody Crocker or Chanel Derr directly. You can also head to the Training Hub for modules and quizzes. Is there something else I can help with — like Mako, credentialing, CRM, or sales tips?`;
  };

  const send=()=>{
    if(!input.trim())return;
    const q=input.trim();
    setInput('');
    setHistory(prev=>[...prev,{role:'user',msg:q}]);
    setTimeout(()=>setHistory(prev=>[...prev,{role:'bot',msg:respond(q)}]),500);
  };

  const suggestions=['Tell me about Mako','How do I handle objections?','What credentials do I need?','How do I manage my territory?','Tips for OR etiquette','First 6 months plan'];

  return (
    <div className="fade-in" style={{padding:24,maxWidth:800,margin:'0 auto'}}>
      <div className="section-title">💬 CJ Assistant</div>
      <div style={{fontSize:13,color:'#666',marginBottom:16}}>Ask anything about your role, products, territory, or career growth.</div>

      <div style={{background:'#161616',border:'1px solid #2d2d2d',borderRadius:12,padding:20,height:460,overflowY:'auto',display:'flex',flexDirection:'column',gap:12,marginBottom:14}}>
        {history.map((h,i)=>(
          <div key={i} style={{display:'flex',justifyContent:h.role==='user'?'flex-end':'flex-start'}}>
            <div className={h.role==='user'?'chat-bubble-user':'chat-bubble-bot'}>{h.msg}</div>
          </div>
        ))}
        <div ref={bottomRef}/>
      </div>

      <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:12}}>
        {suggestions.map(s=>(
          <button key={s} onClick={()=>{setInput(s);setTimeout(()=>document.getElementById('chat-input')?.focus(),100)}}
            className="btn-o" style={{fontSize:11,padding:'5px 12px'}}>{s}</button>
        ))}
      </div>

      <div style={{display:'flex',gap:10}}>
        <input id="chat-input" className="inp" value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&send()} placeholder="Ask anything... (Enter to send)"/>
        <button className="btn-y" onClick={send} style={{whiteSpace:'nowrap'}}>Send →</button>
        <button className="btn-o" onClick={()=>{if(confirm('Clear chat history?'))setHistory([{role:'bot',msg:'Chat cleared! How can I help you today?'}])}}>Clear</button>
      </div>

      <div style={{marginTop:16,padding:12,background:'#1a1a00',borderRadius:8,fontSize:12,color:'#666'}}>
        ⚖️ This assistant provides general guidance based on publicly available knowledge. Always verify product-specific information with your official Stryker training materials and management team.
      </div>
    </div>
  );
}

  const [targetForm,setTargetForm]=useState(myTargets||blankTargets);

  const subTabs=[
    {id:'company',label:'🏢 Stryker Company'},
    {id:'mako',label:'🤖 Mako Clinical Data'},
    {id:'myperf',label:'📋 My Performance'},
    {id:'targets',label:'🎯 My Targets'},
  ];

  const D=DATA.strykerPublicData;
  const C=DATA.makoClinicData;

  return (
    <div className="fade-in" style={{padding:24,maxWidth:1200,margin:'0 auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12,marginBottom:20}}>
        <div>
          <div className="section-title">📈 Metrics Dashboard</div>
          <div style={{fontSize:12,color:'#555'}}>Public data · Clinical literature · Personal performance · Internal targets</div>
        </div>
      </div>

      {/* Sub-nav */}
      <div style={{display:'flex',gap:8,marginBottom:24,flexWrap:'wrap'}}>
        {subTabs.map(s=>(
          <button key={s.id} onClick={()=>setSub(s.id)}
            className={sub===s.id?'btn-y':'btn-o'}
            style={{fontSize:12,padding:'8px 16px'}}>{s.label}</button>
        ))}
      </div>

      {/* ── STRYKER COMPANY METRICS ── */}
      {sub==='company' && (
        <div className="fade-in">
          <div style={{padding:'10px 16px',background:'#1a1a00',border:'1px solid #3d3d00',borderRadius:8,marginBottom:20,fontSize:12,color:'#888',lineHeight:1.6}}>
            ⚖️ <strong style={{color:'#FFC72C'}}>Source:</strong> {D.disclaimer}
            {' '}<a href={`https://${D.source}`} target="_blank" rel="noopener noreferrer" style={{color:'#3b82f6'}}>→ {D.source}</a>
            {' '}· Last reference period: <span style={{color:'#FFC72C'}}>{D.lastUpdated}</span>
          </div>

          <div style={{marginBottom:28}}>
            <div style={{color:'#888',fontWeight:700,fontSize:12,textTransform:'uppercase',letterSpacing:1,marginBottom:12}}>Company Financial Overview</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(230px,1fr))',gap:12}}>
              {D.companyOverview.map((m,i)=>(
                <div key={i} className="stat-card" style={{borderLeft:`3px solid ${m.color}`,textAlign:'left',padding:'14px 16px'}}>
                  <div style={{fontSize:11,color:'#666',marginBottom:4,textTransform:'uppercase',letterSpacing:.5}}>{m.label}</div>
                  <div style={{fontSize:24,fontWeight:800,color:m.color}}>{m.value}</div>
                  {m.delta&&<div style={{fontSize:11,color:'#888',marginTop:4}}>{m.delta}</div>}
                </div>
              ))}
            </div>
          </div>

          <div style={{marginBottom:28}}>
            <div style={{color:'#888',fontWeight:700,fontSize:12,textTransform:'uppercase',letterSpacing:1,marginBottom:12}}>Mako Platform Stats</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(230px,1fr))',gap:12}}>
              {D.makoStats.map((m,i)=>(
                <div key={i} className="stat-card" style={{borderLeft:`3px solid ${m.color}`,textAlign:'left',padding:'14px 16px'}}>
                  <div style={{fontSize:11,color:'#666',marginBottom:4,textTransform:'uppercase',letterSpacing:.5}}>{m.label}</div>
                  <div style={{fontSize:22,fontWeight:800,color:m.color}}>{m.value}</div>
                  {m.delta&&<div style={{fontSize:11,color:'#888',marginTop:4}}>{m.delta}</div>}
                </div>
              ))}
            </div>
          </div>

          <div>
            <div style={{color:'#888',fontWeight:700,fontSize:12,textTransform:'uppercase',letterSpacing:1,marginBottom:12}}>Market Context — North Texas</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(230px,1fr))',gap:12}}>
              {D.marketContext.map((m,i)=>(
                <div key={i} className="stat-card" style={{borderLeft:`3px solid ${m.color}`,textAlign:'left',padding:'14px 16px'}}>
                  <div style={{fontSize:11,color:'#666',marginBottom:4,textTransform:'uppercase',letterSpacing:.5}}>{m.label}</div>
                  <div style={{fontSize:22,fontWeight:800,color:m.color}}>{m.value}</div>
                  {m.delta&&<div style={{fontSize:11,color:'#888',marginTop:4}}>{m.delta}</div>}
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ── MAKO CLINICAL DATA ── */}
      {sub==='mako' && (
        <div className="fade-in">
          <div style={{padding:'10px 16px',background:'#1a1a00',border:'1px solid #3d3d00',borderRadius:8,marginBottom:20,fontSize:12,color:'#888',lineHeight:1.6}}>
            ⚖️ {C.disclaimer}
          </div>

          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(340px,1fr))',gap:16,marginBottom:32}}>
            {C.keyStats.map((s,i)=>(
              <div key={i} className="card" style={{borderLeft:`4px solid ${s.color}`}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8,flexWrap:'wrap',gap:6}}>
                  <div style={{fontWeight:700,fontSize:14,color:'#fff',flex:1}}>{s.stat}</div>
                  <span style={{background:s.color,color:'#111',borderRadius:20,padding:'2px 10px',fontSize:11,fontWeight:700,whiteSpace:'nowrap'}}>{s.value}</span>
                </div>
                <p style={{fontSize:13,color:'#aaa',lineHeight:1.6,marginBottom:10}}>{s.detail}</p>
                <div style={{fontSize:11,color:'#555',marginBottom:6}}>📚 {s.source}</div>
                <a href={s.pubmedUrl} target="_blank" rel="noopener noreferrer"
                  style={{fontSize:11,color:'#3b82f6',textDecoration:'none'}}>→ View on PubMed / Source</a>
              </div>
            ))}
          </div>

          <div className="card" style={{background:'#111d11',borderColor:'#1a3a1a'}}>
            <div style={{color:'#FFC72C',fontWeight:700,fontSize:15,marginBottom:16}}>💬 Clinical Talk Tracks — Objection Handling with Data</div>
            {C.talkTracks.map((tt,i)=>(
              <div key={i} style={{marginBottom:16,padding:14,background:'#1a2a1a',border:'1px solid #2a4a2a',borderRadius:10}}>
                <div style={{color:'#f97316',fontWeight:700,fontSize:13,marginBottom:8}}>Surgeon says: "{tt.objection}"</div>
                <div style={{fontSize:13,color:'#ccc',lineHeight:1.6}}>✅ <strong style={{color:'#FFC72C'}}>Your response:</strong> {tt.response}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── MY PERFORMANCE ── */}
      {sub==='myperf' && (
        <div className="fade-in">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}}>
            <div style={{color:'#888',fontSize:13}}>Log your weekly numbers — track trends over time.</div>
            <button className="btn-y" onClick={()=>setShowEntry(true)}>+ Log This Week</button>
          </div>

          {/* Totals */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:12,marginBottom:24}}>
            <StatCard label="Total Cases Covered" value={totals.cases} icon="🔪" color="#FFC72C"/>
            <StatCard label="Total Mako Cases" value={totals.mako} icon="🤖" color="#3b82f6"/>
            <StatCard label="Avg Mako Util %" value={`${avgUtil}%`} icon="📊" color={avgUtil>=70?'#22c55e':avgUtil>=40?'#f97316':'#ef4444'}/>
            <StatCard label="New Contacts" value={totals.contacts} icon="👥" color="#22c55e"/>
            <StatCard label="Surgeon Calls" value={totals.calls} icon="📞" color="#8b5cf6"/>
            <StatCard label="New Accounts" value={totals.accounts} icon="🏥" color="#FFC72C"/>
          </div>

          {/* Weekly log table */}
          {myMetrics.length>0 ? (
            <div>
              <div style={{color:'#888',fontWeight:700,fontSize:12,textTransform:'uppercase',letterSpacing:1,marginBottom:10}}>Weekly Log</div>

              {/* Simple trend bar chart */}
              <div className="card" style={{marginBottom:20}}>
                <div style={{color:'#FFC72C',fontWeight:700,fontSize:13,marginBottom:12}}>📊 Cases Per Week — Visual Trend</div>
                <div style={{display:'flex',alignItems:'flex-end',gap:8,height:100,overflow:'hidden'}}>
                  {[...myMetrics].reverse().slice(0,12).map((m,i)=>{
                    const max=Math.max(...myMetrics.map(x=>Number(x.casesTotal||0)),1);
                    const h=Math.max(4,Math.round((Number(m.casesTotal||0)/max)*90));
                    return (
                      <div key={i} title={`${m.weekLabel}: ${m.casesTotal} cases`}
                        style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                        <div style={{fontSize:9,color:'#888'}}>{m.casesTotal}</div>
                        <div style={{width:'100%',height:h,background:'linear-gradient(0deg,#FFC72C,#FFD700)',borderRadius:'3px 3px 0 0',minHeight:4}}/>
                        <div style={{fontSize:8,color:'#555',whiteSpace:'nowrap',overflow:'hidden',maxWidth:40,textOverflow:'ellipsis'}}>{m.weekLabel}</div>
                      </div>
                    );
                  })}
                </div>
              </div>

              <table>
                <thead><tr><th>Week</th><th>Cases</th><th>Mako</th><th>Util %</th><th>New Contacts</th><th>Surgeon Calls</th><th>New Accounts</th><th></th></tr></thead>
                <tbody>
                  {myMetrics.map(m=>(
                    <tr key={m.id}>
                      <td><strong>{m.weekLabel}</strong><div style={{fontSize:10,color:'#555'}}>{fmtDateShort(m.date)}</div></td>
                      <td><span style={{color:'#FFC72C',fontWeight:700}}>{m.casesTotal}</span></td>
                      <td>{m.makoTotal}</td>
                      <td>
                        <div style={{display:'flex',alignItems:'center',gap:6}}>
                          <div className="prog" style={{width:50,height:6,display:'inline-block'}}>
                            <div className="prog-fill" style={{width:`${m.makoUtil||0}%`}}/>
                          </div>
                          <span style={{fontSize:12,color:Number(m.makoUtil)>=70?'#22c55e':Number(m.makoUtil)>=40?'#f97316':'#ef4444'}}>{m.makoUtil}%</span>
                        </div>
                      </td>
                      <td>{m.newContacts}</td>
                      <td>{m.surgeonCalls}</td>
                      <td>{m.newAccounts}</td>
                      <td>
                        <button onClick={()=>delEntry(m.id)} className="btn-r" style={{fontSize:11,padding:'3px 8px'}}>✕</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          ) : (
            <div className="card" style={{textAlign:'center',padding:48,color:'#555'}}>
              <div style={{fontSize:32,marginBottom:12}}>📋</div>
              <div style={{fontSize:15,marginBottom:8}}>No weekly data yet.</div>
              <div style={{fontSize:13,marginBottom:20}}>Log your first week to start tracking trends.</div>
              <button className="btn-y" onClick={()=>setShowEntry(true)}>Log This Week</button>
            </div>
          )}

          {showEntry && (
            <Modal title="Log Weekly Performance" onClose={()=>setShowEntry(false)}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div style={{gridColumn:'span 2'}}>
                  <label style={{fontSize:12,color:'#888',display:'block',marginBottom:4}}>Week Label *</label>
                  <input className="inp" value={entry.weekLabel} onChange={e(('weekLabel'))} placeholder="e.g. Week of Mar 10, or Week 3"/>
                </div>
                {[
                  ['casesTotal','Total Cases Covered','How many total OR cases this week?'],
                  ['makoTotal','Mako Cases','How many were Mako-assisted?'],
                  ['makoUtil','Mako Utilization %','% of eligible cases done with Mako (0–100)'],
                  ['newContacts','New CRM Contacts','How many new contacts logged?'],
                  ['surgeonCalls','Surgeon / Office Calls','Office visits or cold calls made'],
                  ['newAccounts','New Accounts Opened','New hospital or practice relationships started'],
                ].map(([k,label,ph])=>(
                  <div key={k}>
                    <label style={{fontSize:12,color:'#888',display:'block',marginBottom:4}}>{label}</label>
                    <input className="inp" type="number" min="0" value={entry[k]} onChange={e(k)} placeholder={ph}/>
                  </div>
                ))}
                <div style={{gridColumn:'span 2'}}>
                  <label style={{fontSize:12,color:'#888',display:'block',marginBottom:4}}>Notes / Highlights</label>
                  <textarea className="inp" rows={3} value={entry.notes} onChange={e('notes')} placeholder="Key wins, challenges, anything notable this week..."/>
                </div>
              </div>
              <div style={{display:'flex',gap:10,marginTop:16}}>
                <button className="btn-y" onClick={saveEntry}>Save Entry</button>
                <button className="btn-o" onClick={()=>setShowEntry(false)}>Cancel</button>
              </div>
            </Modal>
          )}
        </div>
      )}

      {/* ── MY TARGETS ── */}
      {sub==='targets' && (
        <div className="fade-in">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:10}}>
            <div style={{color:'#888',fontSize:13}}>Enter your targets manually. Tracks your progress vs. goals. <span style={{color:'#FFC72C'}}>Your data stays local — never sent anywhere.</span></div>
            <button className="btn-y" onClick={()=>setShowTargets(true)}>
              {myTargets?'Update Targets':'Set My Targets'}
            </button>
          </div>

          {myTargets && (Number(myTargets.qCasesTarget)>0||Number(myTargets.qContactsTarget)>0||Number(myTargets.qMakoTarget)>0) ? (
            <div>
              {/* Aggregate actuals */}
              {(()=>{
                const actCases=myMetrics.reduce((a,m)=>a+Number(m.casesTotal||0),0);
                const actMako=myMetrics.reduce((a,m)=>a+Number(m.makoTotal||0),0);
                const actContacts=myMetrics.reduce((a,m)=>a+Number(m.newContacts||0),0);
                const targets=[
                  {label:'Cases Covered',actual:actCases,target:myTargets.qCasesTarget,icon:'🔪',color:'#FFC72C'},
                  {label:'Mako Cases',actual:actMako,target:myTargets.qMakoTarget,icon:'🤖',color:'#3b82f6'},
                  {label:'New Contacts',actual:actContacts,target:myTargets.qContactsTarget,icon:'👥',color:'#22c55e'},
                ];
                return (
                  <div>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16,marginBottom:24}}>
                      {targets.map(tgt=>{
                        const pct=pctOf(tgt.actual,tgt.target);
                        return(
                          <div key={tgt.label} className="card" style={{borderLeft:`4px solid ${tgt.color}`}}>
                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                              <div style={{fontWeight:700,fontSize:14}}>{tgt.icon} {tgt.label}</div>
                              <span style={{fontSize:20,fontWeight:800,color:tgt.color}}>{pct}%</span>
                            </div>
                            <ProgressBar pct={pct}/>
                            <div style={{display:'flex',justifyContent:'space-between',marginTop:8,fontSize:13,color:'#aaa'}}>
                              <span>Actual: <strong style={{color:'#fff'}}>{tgt.actual}</strong></span>
                              <span>Target: <strong style={{color:tgt.color}}>{tgt.target}</strong></span>
                              <span>Gap: <strong style={{color:pct>=100?'#22c55e':'#f97316'}}>{Math.max(0,Number(tgt.target)-tgt.actual)}</strong></span>
                            </div>
                          </div>
                        );
                      })}
                    </div>

                    <div className="card">
                      <div style={{color:'#FFC72C',fontWeight:700,fontSize:15,marginBottom:14}}>📋 Target Summary</div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
                        {myTargets.annualQuota&&<div style={{marginBottom:10}}><div style={{fontSize:12,color:'#888'}}>Annual Quota</div><div style={{fontSize:18,fontWeight:700,color:'#FFC72C'}}>{myTargets.annualQuota}</div></div>}
                        {myTargets.qRevenueTarget&&<div style={{marginBottom:10}}><div style={{fontSize:12,color:'#888'}}>Quarterly Revenue Target</div><div style={{fontSize:18,fontWeight:700,color:'#FFC72C'}}>{myTargets.qRevenueTarget}</div></div>}
                      </div>
                      {myTargets.notes&&<div style={{marginTop:10,padding:10,background:'#2a2a2a',borderRadius:8,fontSize:13,color:'#aaa'}}>{myTargets.notes}</div>}
                      <div style={{marginTop:14,padding:12,background:'#1a1a00',borderRadius:8,fontSize:12,color:'#555'}}>
                        🔒 Your targets are stored locally in your browser only. They are never uploaded or shared.
                      </div>
                    </div>
                  </div>
                );
              })()}
            </div>
          ) : (
            <div className="card" style={{textAlign:'center',padding:48,color:'#555'}}>
              <div style={{fontSize:32,marginBottom:12}}>🎯</div>
              <div style={{fontSize:15,marginBottom:8}}>No targets set yet.</div>
              <div style={{fontSize:13,marginBottom:20}}>Enter your quarterly targets to track progress. All data stays in your browser.</div>
              <button className="btn-y" onClick={()=>setShowTargets(true)}>Set My Targets</button>
            </div>
          )}

          {showTargets && (
            <Modal title="Set My Targets" onClose={()=>setShowTargets(false)}>
              <div style={{fontSize:12,color:'#888',marginBottom:14,padding:10,background:'#1a1a00',borderRadius:8}}>
                🔒 These numbers are stored locally in your browser only. They are never sent to any server.
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:12}}>
                {[
                  ['qCasesTarget','Quarterly Cases Target','How many cases to cover this quarter?'],
                  ['qMakoTarget','Quarterly Mako Cases Target','Target Mako cases for the quarter'],
                  ['qContactsTarget','Quarterly New Contacts Target','New contacts to add to CRM'],
                ].map(([k,label,ph])=>(
                  <div key={k}>
                    <label style={{fontSize:12,color:'#888',display:'block',marginBottom:4}}>{label}</label>
                    <input className="inp" type="number" min="0" value={targetForm[k]} onChange={t(k)} placeholder={ph}/>
                  </div>
                ))}
                <div>
                  <label style={{fontSize:12,color:'#888',display:'block',marginBottom:4}}>Annual Quota (enter how you like — $ or units)</label>
                  <input className="inp" value={targetForm.annualQuota} onChange={t('annualQuota')} placeholder="e.g. $500,000 or 120 cases"/>
                </div>
                <div>
                  <label style={{fontSize:12,color:'#888',display:'block',marginBottom:4}}>Quarterly Revenue Target</label>
                  <input className="inp" value={targetForm.qRevenueTarget} onChange={t('qRevenueTarget')} placeholder="e.g. $125,000"/>
                </div>
                <div>
                  <label style={{fontSize:12,color:'#888',display:'block',marginBottom:4}}>Notes</label>
                  <textarea className="inp" rows={2} value={targetForm.notes} onChange={t('notes')} placeholder="Any context about your targets..."/>
                </div>
                <div style={{display:'flex',gap:10}}>
                  <button className="btn-y" onClick={saveTargets}>Save Targets</button>
                  <button className="btn-o" onClick={()=>setShowTargets(false)}>Cancel</button>
                </div>
              </div>
            </Modal>
          )}
        </div>
      )}
    </div>
  );
}

// ── MAIN APP ───────────────────────────────────────────────────────────────
function App() {
  const [tab,setTab]=useState('dashboard');
  const [user]=useLS('cj_user',{name:'CJ',startDate:'2026-03-04',territory:'North Texas',managers:['Cody Crocker','Chanel Derr'],role:'Associate Sales Representative — Joint Replacement'});
  const [contacts,setContacts]=useLS('cj_contacts',[]);
  const [credentials,setCredentials]=useLS('cj_credentials',DATA.defaultCredentials);
  const [trainingProgress,setTrainingProgress]=useLS('cj_training',{});
  const [teamMembers,setTeamMembers]=useLS('cj_team',[]);
  const [myMetrics,setMyMetrics]=useLS('cj_myMetrics',[]);
  const [myTargets,setMyTargets]=useLS('cj_myTargets',null);

  const renderTab=()=>{
    switch(tab){
      case 'dashboard': return <Dashboard contacts={contacts} credentials={credentials} trainingProgress={trainingProgress} user={user}/>;
      case 'training': return <Training trainingProgress={trainingProgress} setTrainingProgress={setTrainingProgress}/>;
      case 'intel': return <IntelReport/>;
      case 'roadmap': return <Roadmap user={user} trainingProgress={trainingProgress}/>;
      case 'metrics': return <Metrics myMetrics={myMetrics} setMyMetrics={setMyMetrics} myTargets={myTargets} setMyTargets={setMyTargets}/>;
      case 'creds': return <Credentialing credentials={credentials} setCredentials={setCredentials}/>;
      case 'crm': return <CRM contacts={contacts} setContacts={setContacts}/>;
      case 'team': return <TeamHub teamMembers={teamMembers} setTeamMembers={setTeamMembers}/>;
      case 'report': return <ManagerReport contacts={contacts} trainingProgress={trainingProgress} credentials={credentials}/>;
      case 'chat': return <Chatbot/>;
      default: return null;
    }
  };

  return (
    <div style={{minHeight:'100vh'}}>
      <Header user={user}/>
      <Nav active={tab} setActive={setTab}/>
      <main style={{minHeight:'calc(100vh - 120px)'}}>
        {renderTab()}
      </main>
      <footer style={{borderTop:'1px solid #2a2a2a',padding:'12px 24px',textAlign:'center',fontSize:11,color:'#444'}}>
        CJ 3.0 Beta — Personal Sales Agent · North Texas Joint Replacement Territory · Powered by publicly available knowledge only.
        Not affiliated with or endorsed by Stryker Corporation. Does not access internal Stryker systems or proprietary data.
        Maintenance window: 1:00–1:30 AM CT daily.
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
