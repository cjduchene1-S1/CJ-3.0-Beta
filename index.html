              <Icon n='inventory' s={16} c='var(--red)'/>
              <div style={{fontWeight:700,fontSize:14}}>Inventory Alerts</div>
            </div>
            {criticalInv.length===0 && lowInv.length===0 && <div style={{fontSize:12,color:'var(--green)',display:'flex',alignItems:'center',gap:6}}><Icon n='check' s={12} c='var(--green)'/>All levels OK</div>}
            {[...criticalInv,...lowInv].slice(0,4).map(i=>(
              <div key={i.id} style={{display:'flex',gap:10,alignItems:'flex-start',marginBottom:8}}>
                <span className={`badge ${i.status==='critical'?'badge-red':'badge-orange'}`} style={{fontSize:10,flexShrink:0,marginTop:1}}>{i.status==='critical'?'CRITICAL':'LOW'}</span>
                <div style={{fontSize:12,lineHeight:1.4}}>{i.item.length>45?i.item.slice(0,42)+'...':i.item}</div>
              </div>
            ))}
          </div>
          <div className="glass" style={{padding:20}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
              <Icon n='alert' s={16} c='var(--orange)'/>
              <div style={{fontWeight:700,fontSize:14}}>Credential Alerts</div>
            </div>
            {expiringCreds.length===0 && <div style={{fontSize:12,color:'var(--green)',display:'flex',alignItems:'center',gap:6}}><Icon n='check' s={12} c='var(--green)'/>All credentials active</div>}
            {expiringCreds.map(c=>(
              <div key={c.id} style={{marginBottom:8}}>
                <div style={{fontSize:12,fontWeight:600}}>{c.facility.split(' ').slice(0,3).join(' ')}</div>
                <div style={{fontSize:11,color:c.status==='expiring'?'var(--orange)':'var(--text2)'}}>
                  {c.status==='expiring'?`Expires ${fmtDateShort(c.expiry)}`:'Pending approval'}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── SCHEDULE ──────────────────────────────────────────────────────────────────
function Schedule({cases, setCases}) {
  const [view, setView] = useState('upcoming');
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const [detail, setDetail] = useState(null);
  const blank = {date:'',time:'',surgeon:'',facility:'',or:'',procedure:'',type:'standard',implantSystem:'',ctStatus:'na',ctNotes:'',repNote:'',status:'upcoming',postCaseNotes:''};
  const [form, setForm] = useState(blank);
  const f = k=>e=>setForm(p=>({...p,[k]:e.target.value}));

  const filtered = useMemo(()=>{
    if(view==='upcoming') return cases.filter(c=>c.status==='upcoming').sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
    if(view==='completed') return cases.filter(c=>c.status==='completed').sort((a,b)=>b.date.localeCompare(a.date));
    return cases.sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  },[cases,view]);

  const save=()=>{
    if(!form.surgeon||!form.date) return;
    if(editId) setCases(p=>p.map(c=>c.id===editId?{...c,...form}:c));
    else setCases(p=>[...p,{id:uid(),...form}]);
    setShowForm(false); setEditId(null); setForm(blank);
  };
  const del=id=>setCases(p=>p.filter(c=>c.id!==id));
  const markComplete=id=>{ setCases(p=>p.map(c=>c.id===id?{...c,status:'completed'}:c)); setDetail(null); };
  const openEdit=c=>{ setForm({...blank,...c}); setEditId(c.id); setShowForm(true); };

  const ctColor = s => s==='loaded'?'var(--green)':s==='pending'?'var(--orange)':s==='not_ordered'?'var(--red)':'var(--text2)';
  const ctLabel = s => s==='loaded'?'CT Loaded':s==='pending'?'CT Pending':s==='not_ordered'?'CT NOT Ordered':s==='na'?'N/A':'—';

  return (
    <div className="fade-up" style={{padding:24,maxWidth:1280,margin:'0 auto'}}>
      <SectionTitle title="Case Schedule" icon="schedule" sub="Upcoming OR cases, CT scan status, and post-case notes"
        action={<button className="btn btn-gold" onClick={()=>{setForm(blank);setEditId(null);setShowForm(true);}}><Icon n='plus' s={14}/>Add Case</button>}/>

      <div style={{display:'flex',gap:8,marginBottom:20}}>
        {['upcoming','completed','all'].map(v=><Pill key={v} children={v.charAt(0).toUpperCase()+v.slice(1)+' ('+(v==='upcoming'?cases.filter(c=>c.status==='upcoming').length:v==='completed'?cases.filter(c=>c.status==='completed').length:cases.length)+')'} active={view===v} onClick={()=>setView(v)}/>)}
      </div>

      {/* CT Alert Banner */}
      {view!=='completed' && cases.filter(c=>c.status==='upcoming'&&c.type==='mako'&&c.ctStatus==='not_ordered').length>0 && (
        <div style={{background:'rgba(255,82,82,.08)',border:'1px solid rgba(255,82,82,.3)',borderRadius:12,padding:'12px 16px',marginBottom:16,display:'flex',alignItems:'center',gap:10}}>
          <Icon n='alert' s={18} c='var(--red)'/>
          <div>
            <span style={{fontWeight:700,color:'var(--red)'}}>CT Scan Action Required — </span>
            <span style={{fontSize:13,color:'var(--text)'}}>
              {cases.filter(c=>c.status==='upcoming'&&c.type==='mako'&&c.ctStatus==='not_ordered').map(c=>`${c.surgeon} (${fmtDateShort(c.date)})`).join(', ')} has not ordered CT scan.
            </span>
          </div>
        </div>
      )}

      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        {filtered.length===0 && <div className="glass" style={{padding:30,textAlign:'center',color:'var(--text2)'}}>No cases in this view.</div>}
        {filtered.map(c=>(
          <div key={c.id} className={`case-card ${c.type} fade-up`} onClick={()=>setDetail(c)} style={{cursor:'pointer'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:16}}>
              <div style={{display:'flex',gap:20,flexWrap:'wrap'}}>
                {/* Date/Time */}
                <div style={{minWidth:110}}>
                  <div style={{fontSize:11,color:'var(--text2)',marginBottom:3,textTransform:'uppercase',letterSpacing:'.5px'}}>Date & Time</div>
                  <div style={{fontWeight:700,fontSize:14}}>{fmtDate(c.date)}</div>
                  <div style={{fontSize:13,color:'var(--text2)'}}>{fmtTime(c.time)} · {c.or}</div>
                </div>
                {/* Surgeon & Facility */}
                <div style={{flex:1,minWidth:200}}>
                  <div style={{fontSize:11,color:'var(--text2)',marginBottom:3,textTransform:'uppercase',letterSpacing:'.5px'}}>Surgeon & Location</div>
                  <div style={{fontWeight:700,fontSize:14}}>{c.surgeon}</div>
                  <div style={{fontSize:12,color:'var(--text2)'}}>{c.facility}</div>
                </div>
                {/* Procedure */}
                <div style={{minWidth:160}}>
                  <div style={{fontSize:11,color:'var(--text2)',marginBottom:3,textTransform:'uppercase',letterSpacing:'.5px'}}>Procedure</div>
                  <div style={{fontWeight:600,fontSize:14}}>{c.procedure}</div>
                  <div style={{fontSize:12,color:'var(--text2)'}}>{c.implantSystem}</div>
                </div>
                {/* CT Status */}
                {c.type==='mako' && (
                  <div style={{minWidth:130}}>
                    <div style={{fontSize:11,color:'var(--text2)',marginBottom:3,textTransform:'uppercase',letterSpacing:'.5px'}}>CT Scan</div>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <Icon n='ct' s={14} c={ctColor(c.ctStatus)}/>
                      <span style={{fontSize:13,fontWeight:600,color:ctColor(c.ctStatus)}}>{ctLabel(c.ctStatus)}</span>
                    </div>
                    {c.ctNotes && <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>{c.ctNotes.slice(0,40)}{c.ctNotes.length>40?'...':''}</div>}
                  </div>
                )}
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:8,alignItems:'flex-end'}}>
                <span className={`badge ${c.type==='mako'?'badge-teal':c.type==='urgent'?'badge-red':'badge-gold'}`}>
                  {c.type==='mako'?'MAKO':c.type==='urgent'?'URGENT':'STANDARD'}
                </span>
                <span className={`badge ${c.status==='completed'?'badge-green':'badge-gray'}`}>{c.status}</span>
                <div style={{display:'flex',gap:6}}>
                  <button className="btn btn-ghost" style={{padding:'5px 10px',fontSize:11}} onClick={e=>{e.stopPropagation();openEdit(c)}}><Icon n='edit' s={11}/>Edit</button>
                  <button className="btn btn-red" style={{padding:'5px 10px',fontSize:11}} onClick={e=>{e.stopPropagation();del(c.id)}}><Icon n='trash' s={11}/></button>
                </div>
              </div>
            </div>
            {c.repNote && <div style={{marginTop:10,padding:'8px 12px',background:'rgba(245,166,35,.06)',borderRadius:8,fontSize:12,color:'var(--text2)',borderLeft:'2px solid var(--gold)'}}>
              <Icon n='alert' s={11} c='var(--gold)'/> {c.repNote}
            </div>}
          </div>
        ))}
      </div>

      {/* Case Detail Modal */}
      {detail && (
        <Modal title={`${detail.procedure} — ${detail.surgeon}`} onClose={()=>setDetail(null)} wide>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
            {[['Date',fmtDate(detail.date)],['Time',fmtTime(detail.time)],['Facility',detail.facility],['OR Room',detail.or],['Procedure',detail.procedure],['Implant System',detail.implantSystem]].map(([k,v])=>(
              <div key={k}><div style={{fontSize:11,color:'var(--text2)',marginBottom:3}}>{k}</div><div style={{fontSize:14,fontWeight:600}}>{v||'—'}</div></div>
            ))}
          </div>
          {detail.type==='mako' && (
            <div style={{background:'rgba(0,212,255,.06)',border:'1px solid rgba(0,212,255,.2)',borderRadius:12,padding:16,marginBottom:20}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                <Icon n='robot' s={16} c='var(--teal)'/>
                <span style={{fontWeight:700,color:'var(--teal)'}}>Mako Case Details</span>
                <span className={`badge ${detail.ctStatus==='loaded'?'badge-green':detail.ctStatus==='not_ordered'?'badge-red':'badge-orange'}`}>{ctLabel(detail.ctStatus)}</span>
              </div>
              <div style={{fontSize:13,color:'var(--text)',lineHeight:1.6}}>{detail.ctNotes||'No CT notes entered.'}</div>
            </div>
          )}
          {detail.repNote && <div style={{background:'rgba(245,166,35,.07)',border:'1px solid rgba(245,166,35,.2)',borderRadius:10,padding:14,marginBottom:16,fontSize:13,color:'var(--text)'}}>
            <strong style={{color:'var(--gold)'}}>Rep Note: </strong>{detail.repNote}
          </div>}
          <div style={{marginBottom:16}}>
            <label style={{fontSize:11,color:'var(--text2)',display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:'.5px'}}>Post-Case Notes</label>
            <textarea className="inp" rows={3} value={detail.postCaseNotes||''} onChange={e=>setDetail({...detail,postCaseNotes:e.target.value})} placeholder="What was used, how case went, surgeon feedback..."/>
          </div>
          <div style={{display:'flex',gap:10}}>
            {detail.status==='upcoming' && <button className="btn btn-gold" onClick={()=>{setCases(p=>p.map(c=>c.id===detail.id?{...c,status:'completed',postCaseNotes:detail.postCaseNotes}:c));setDetail(null);}}>Mark Completed</button>}
            <button className="btn btn-outline" onClick={()=>{setCases(p=>p.map(c=>c.id===detail.id?{...detail}:c));setDetail(null);}}>Save Notes</button>
            <button className="btn btn-ghost" onClick={()=>setDetail(null)}>Close</button>
          </div>
        </Modal>
      )}

      {/* Add/Edit Case Modal */}
      {showForm && (
        <Modal title={editId?'Edit Case':'Add Case'} onClose={()=>{setShowForm(false);setEditId(null);}} wide>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            {[['date','Date','date'],['time','Time','time'],['surgeon','Surgeon Name','text'],['facility','Facility','text'],['or','OR Room','text'],['procedure','Procedure','text'],['implantSystem','Implant System','text']].map(([k,l,t])=>(
              <div key={k}><label style={{fontSize:11,color:'var(--text2)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>{l}</label>
                <input className="inp" type={t} value={form[k]} onChange={f(k)} placeholder={l}/></div>
            ))}
            <div><label style={{fontSize:11,color:'var(--text2)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>Case Type</label>
              <select className="inp" value={form.type} onChange={f('type')}>
                {['standard','mako','urgent'].map(t=><option key={t} value={t}>{t.charAt(0).toUpperCase()+t.slice(1)}</option>)}
              </select></div>
            {form.type==='mako' && <>
              <div><label style={{fontSize:11,color:'var(--text2)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>CT Scan Status</label>
                <select className="inp" value={form.ctStatus} onChange={f('ctStatus')}>
                  {['not_ordered','pending','loaded','na'].map(s=><option key={s} value={s}>{ctLabel(s)}</option>)}
                </select></div>
              <div style={{gridColumn:'span 2'}}><label style={{fontSize:11,color:'var(--text2)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>CT / Plan Notes</label>
                <textarea className="inp" rows={2} value={form.ctNotes} onChange={f('ctNotes')} placeholder="CT plan details, sizing notes..."/></div>
            </>}
            <div style={{gridColumn:'span 2'}}><label style={{fontSize:11,color:'var(--text2)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>Rep Note / Action Required</label>
              <input className="inp" value={form.repNote} onChange={f('repNote')} placeholder="Any flags or reminders for this case..."/></div>
          </div>
          <div style={{display:'flex',gap:10,marginTop:20}}>
            <button className="btn btn-gold" onClick={save}>Save Case</button>
            <button className="btn btn-ghost" onClick={()=>{setShowForm(false);setEditId(null);}}>Cancel</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── SURGEONS (Enhanced CRM) ───────────────────────────────────────────────────
function Surgeons({surgeons, setSurgeons}) {
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');
  const [detail, setDetail] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const [actType, setActType] = useState('Case');
  const [actNote, setActNote] = useState('');
  const [showTemplate, setShowTemplate] = useState(null);

  const blank = {name:'',hospital:'',specialty:'',relationship:'cold',phone:'',email:'',lastContact:'',nextFollowUp:'',
    preferences:{approach:'',fixation:'',implantBrand:'',sizing:'',OR_habits:'',patientTypes:'',makoUser:false,makoNotes:''},
    activities:[]};
  const [form, setForm] = useState(blank);
  const f = k=>e=>setForm(p=>({...p,[k]:e.target.value}));
  const fp = k=>e=>setForm(p=>({...p,preferences:{...p.preferences,[k]:e.target.value}}));

  const filtered = surgeons.filter(s=>{
    const m = !search || s.name.toLowerCase().includes(search.toLowerCase())||s.hospital.toLowerCase().includes(search.toLowerCase());
    const r = filter==='all'||s.relationship===filter;
    return m&&r;
  });

  const relColor = {cold:'var(--text2)',warm:'var(--gold)',hot:'var(--red)',partner:'var(--green)'};

  const logActivity = id => {
    if(!actNote.trim()) return;
    setSurgeons(p=>p.map(s=>s.id===id?{...s,lastContact:new Date().toISOString().slice(0,10),activities:[{id:uid(),type:actType,date:new Date().toISOString(),note:actNote},...(s.activities||[])]}:s));
    const updated = surgeons.find(s=>s.id===id);
    if(updated) setDetail({...updated,lastContact:new Date().toISOString().slice(0,10),activities:[{id:uid(),type:actType,date:new Date().toISOString(),note:actNote},...(updated.activities||[])]});
    setActNote('');
  };

  const save=()=>{
    if(!form.name) return;
    if(editId) setSurgeons(p=>p.map(s=>s.id===editId?{...s,...form}:s));
    else setSurgeons(p=>[...p,{id:uid(),...form}]);
    setShowForm(false); setEditId(null); setForm(blank);
  };
  const del=id=>{ setSurgeons(p=>p.filter(s=>s.id!==id)); if(detail?.id===id) setDetail(null); };
  const openEdit=s=>{ setForm({...blank,...s,preferences:{...blank.preferences,...s.preferences}}); setEditId(s.id); setShowForm(true); };

  const getTemplate = s => {
    const t = DATA.followUpTemplates[0];
    return t.template.replace('[SURGEON_NAME]',s.name).replace('[FACILITY]',s.hospital).replace('[PROCEDURE]','[Procedure]').replace('[CUSTOM_NOTE]','[Your note here]').replace('[ISSUE_NOTE]','').replace('[NEXT_CASE_DATE]','[Next case date]').replace('[CT_CONFIRM_DATE]','[Date]');
  };

  return (
    <div className="fade-up" style={{padding:24,maxWidth:1280,margin:'0 auto'}}>
      <SectionTitle title="Surgeon Profiles & CRM" icon="crm" sub="Preferences, relationship tracking, and activity history"
        action={<button className="btn btn-gold" onClick={()=>{setForm(blank);setEditId(null);setShowForm(true);}}><Icon n='plus' s={14}/>Add Surgeon</button>}/>

      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
        <Stat label="Total Surgeons" value={surgeons.length} icon="crm"/>
        <Stat label="Mako Users" value={surgeons.filter(s=>s.preferences?.makoUser).length} color="var(--teal)" icon="robot"/>
        <Stat label="Hot / Partner" value={surgeons.filter(s=>['hot','partner'].includes(s.relationship)).length} color="var(--green)" icon="star"/>
        <Stat label="Due for Follow-up" value={surgeons.filter(s=>s.nextFollowUp&&daysUntil(s.nextFollowUp)<=3).length} color="var(--orange)" icon="clock"/>
      </div>

      {/* Follow-up alerts */}
      {surgeons.filter(s=>s.nextFollowUp&&daysUntil(s.nextFollowUp)<=3).length>0 && (
        <div style={{background:'rgba(255,149,0,.07)',border:'1px solid rgba(255,149,0,.25)',borderRadius:12,padding:'12px 16px',marginBottom:16,display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          <div style={{fontSize:12,fontWeight:600,color:'var(--orange)',marginRight:4,display:'flex',alignItems:'center',gap:6}}><Icon n='phone' s={13} c='var(--orange)'/>Follow-ups Due:</div>
          {surgeons.filter(s=>s.nextFollowUp&&daysUntil(s.nextFollowUp)<=3).map(s=>(
            <button key={s.id} onClick={()=>setDetail(s)} className="chip">{s.name} · {fmtDateShort(s.nextFollowUp)}</button>
          ))}
        </div>
      )}

      {/* Search + Filter */}
      <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
        <div style={{position:'relative',flex:1,minWidth:200}}>
          <div style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)'}}><Icon n='search' s={14} c='var(--text2)'/></div>
          <input className="inp" style={{paddingLeft:36}} placeholder="Search surgeons..." value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <div style={{display:'flex',gap:6}}>
          {['all','cold','warm','hot','partner'].map(r=><Pill key={r} children={r.charAt(0).toUpperCase()+r.slice(1)} active={filter===r} onClick={()=>setFilter(r)}/>)}
        </div>
      </div>

      {/* Surgeon Cards Grid */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:16}}>
        {filtered.map(s=>(
          <div key={s.id} className="surgeon-card" onClick={()=>setDetail(s)}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
              <div>
                <div style={{fontWeight:800,fontSize:15}}>{s.name}</div>
                <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>{s.specialty}</div>
                <div style={{fontSize:12,color:'var(--text2)'}}>{s.hospital}</div>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:6,alignItems:'flex-end'}}>
                <span className="badge" style={{background:`${relColor[s.relationship]}22`,color:relColor[s.relationship],border:`1px solid ${relColor[s.relationship]}44`,textTransform:'capitalize'}}>{s.relationship}</span>
                {s.preferences?.makoUser && <span className="badge badge-teal" style={{fontSize:10}}>MAKO USER</span>}
              </div>
            </div>
            {/* Quick preferences */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
              {[['Approach',s.preferences?.approach],['Fixation',s.preferences?.fixation]].map(([k,v])=>v&&(
                <div key={k} style={{padding:'6px 10px',background:'var(--surface2)',borderRadius:8,border:'1px solid var(--border)'}}>
                  <div style={{fontSize:10,color:'var(--text2)',marginBottom:2,textTransform:'uppercase',letterSpacing:'.5px'}}>{k}</div>
                  <div style={{fontSize:11,fontWeight:500,lineHeight:1.3}}>{v.length>35?v.slice(0,32)+'...':v}</div>
                </div>
              ))}
            </div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{fontSize:11,color:'var(--text2)'}}>Last: {s.lastContact?fmtDateShort(s.lastContact):'Never'}</div>
              {s.nextFollowUp && <div style={{fontSize:11,color:daysUntil(s.nextFollowUp)<=3?'var(--orange)':'var(--text2)',display:'flex',alignItems:'center',gap:4}}>
                <Icon n='clock' s={10}/>Follow-up: {fmtDateShort(s.nextFollowUp)}
              </div>}
            </div>
          </div>
        ))}
      </div>

      {/* Surgeon Detail Modal */}
      {detail && (
        <Modal title={detail.name} onClose={()=>setDetail(null)} wide>
          <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
            <span className="badge" style={{background:`${relColor[detail.relationship]}22`,color:relColor[detail.relationship],border:`1px solid ${relColor[detail.relationship]}44`,textTransform:'capitalize',fontSize:12}}>{detail.relationship}</span>
            {detail.preferences?.makoUser && <span className="badge badge-teal">Mako User</span>}
            <span className="badge badge-gray">{detail.hospital}</span>
          </div>

          {/* Preferences Section */}
          <div style={{background:'rgba(0,212,255,.05)',border:'1px solid rgba(0,212,255,.15)',borderRadius:12,padding:16,marginBottom:16}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14,fontWeight:700,color:'var(--teal)'}}>
              <Icon n='clipboard' s={15} c='var(--teal)'/>Surgical Preferences
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              {[['Preferred Approach',detail.preferences?.approach],['Fixation',detail.preferences?.fixation],['Implant Brand / System',detail.preferences?.implantBrand],['Sizing Tendency',detail.preferences?.sizing],['OR Habits',detail.preferences?.OR_habits],['Typical Patient Profile',detail.preferences?.patientTypes]].map(([k,v])=>v&&(
                <div key={k}>
                  <div style={{fontSize:10,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'.7px',marginBottom:4}}>{k}</div>
                  <div style={{fontSize:13,lineHeight:1.5,color:'var(--text)'}}>{v}</div>
                </div>
              ))}
            </div>
            {detail.preferences?.makoNotes && (
              <div style={{marginTop:14,padding:'10px 14px',background:'rgba(0,212,255,.08)',borderRadius:8,borderLeft:'3px solid var(--teal)'}}>
                <div style={{fontSize:10,color:'var(--teal)',textTransform:'uppercase',letterSpacing:'.7px',marginBottom:4}}>Mako Notes</div>
                <div style={{fontSize:13,color:'var(--text)'}}>{detail.preferences.makoNotes}</div>
              </div>
            )}
          </div>

          {/* Contact & Follow-up */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
            {[['Phone',detail.phone],['Email',detail.email],['Last Contact',fmtDate(detail.lastContact)],['Next Follow-up',fmtDate(detail.nextFollowUp)]].map(([k,v])=>(
              <div key={k}><div style={{fontSize:10,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'.7px',marginBottom:3}}>{k}</div><div style={{fontSize:13,fontWeight:500}}>{v||'—'}</div></div>
            ))}
          </div>

          {/* Log Activity */}
          <div style={{borderTop:'1px solid var(--border)',paddingTop:14,marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:10,display:'flex',alignItems:'center',gap:6}}><Icon n='clipboard' s={14} c='var(--gold)'/>Log Activity</div>
            <div style={{display:'flex',gap:6,marginBottom:8,flexWrap:'wrap'}}>
              {['Case','Visit','Call','Email','In-Service','Other'].map(t=><Pill key={t} children={t} active={actType===t} onClick={()=>setActType(t)}/>)}
            </div>
            <textarea className="inp" rows={2} value={actNote} onChange={e=>setActNote(e.target.value)} placeholder="Notes from this interaction..."/>
            <div style={{display:'flex',gap:8,marginTop:8}}>
              <button className="btn btn-gold" onClick={()=>logActivity(detail.id)}>Log Activity</button>
              <button className="btn btn-ghost" onClick={()=>setShowTemplate(detail)}><Icon n='mail' s={13}/>Generate Follow-up</button>
            </div>
          </div>

          {/* Activity History */}
          {detail.activities?.length>0 && (
            <div>
              <div style={{fontWeight:700,fontSize:12,color:'var(--text2)',marginBottom:10,textTransform:'uppercase',letterSpacing:'.7px'}}>Activity History</div>
              {detail.activities.slice(0,5).map(a=>(
                <div key={a.id} style={{padding:'10px 14px',background:'var(--surface2)',borderRadius:10,marginBottom:8,borderLeft:'2px solid var(--border2)'}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                    <span className="badge badge-gray" style={{fontSize:10}}>{a.type}</span>
                    <span style={{fontSize:11,color:'var(--text2)'}}>{fmtDate(a.date)}</span>
                  </div>
                  <div style={{fontSize:13,color:'var(--text)',lineHeight:1.5}}>{a.note}</div>
                </div>
              ))}
            </div>
          )}

          <div style={{display:'flex',gap:8,marginTop:16,borderTop:'1px solid var(--border)',paddingTop:16}}>
            <button className="btn btn-outline" onClick={()=>openEdit(detail)}><Icon n='edit' s={13}/>Edit Profile</button>
            <button className="btn btn-red" onClick={()=>del(detail.id)}><Icon n='trash' s={13}/>Remove</button>
          </div>
        </Modal>
      )}

      {/* Follow-up Template Modal */}
      {showTemplate && (
        <Modal title="Generate Follow-Up Email" onClose={()=>setShowTemplate(null)} wide>
          <div style={{marginBottom:12}}>
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>
              {DATA.followUpTemplates.map(t=><Pill key={t.id} children={t.name} active={false} onClick={()=>{}} />)}
            </div>
          </div>
          <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:12,padding:20,fontFamily:'monospace',fontSize:12,lineHeight:1.8,whiteSpace:'pre-wrap',color:'var(--text)',maxHeight:400,overflowY:'auto'}}>
            {getTemplate(showTemplate)}
          </div>
          <div style={{display:'flex',gap:8,marginTop:16}}>
            <button className="btn btn-gold" onClick={()=>{navigator.clipboard.writeText(getTemplate(showTemplate));alert('Copied to clipboard!');}}>
              <Icon n='copy' s={13}/>Copy to Clipboard
            </button>
            <button className="btn btn-ghost" onClick={()=>setShowTemplate(null)}>Close</button>
          </div>
        </Modal>
      )}

      {/* Add/Edit Surgeon Modal */}
      {showForm && (
        <Modal title={editId?'Edit Surgeon Profile':'Add Surgeon Profile'} onClose={()=>{setShowForm(false);setEditId(null);}} wide>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            {[['name','Full Name *'],['hospital','Hospital / Facility'],['specialty','Specialty'],['phone','Phone'],['email','Email']].map(([k,l])=>(
              <div key={k}><label style={{fontSize:10,color:'var(--text2)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>{l}</label>
                <input className="inp" value={form[k]||''} onChange={f(k)} placeholder={l}/></div>
            ))}
            <div><label style={{fontSize:10,color:'var(--text2)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>Relationship</label>
              <select className="inp" value={form.relationship} onChange={f('relationship')}>
                {['cold','warm','hot','partner'].map(r=><option key={r} value={r}>{r}</option>)}
              </select></div>
            <div><label style={{fontSize:10,color:'var(--text2)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>Next Follow-up</label>
              <input className="inp" type="date" value={form.nextFollowUp||''} onChange={f('nextFollowUp')}/></div>
          </div>

          <div style={{marginTop:20,paddingTop:16,borderTop:'1px solid var(--border)'}}>
            <div style={{fontWeight:700,fontSize:13,color:'var(--teal)',marginBottom:14,display:'flex',alignItems:'center',gap:6}}><Icon n='clipboard' s={14} c='var(--teal)'/>Surgical Preferences</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
              {[['approach','Preferred Approach'],['fixation','Fixation Preference'],['implantBrand','Implant Brand / System'],['sizing','Sizing Tendency'],['OR_habits','OR Habits / Communication Style'],['patientTypes','Typical Patient Profile'],['makoNotes','Mako Notes']].map(([k,l])=>(
                <div key={k} style={{gridColumn:['OR_habits','makoNotes'].includes(k)?'span 2':'auto'}}>
                  <label style={{fontSize:10,color:'var(--text2)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>{l}</label>
                  <input className="inp" value={form.preferences?.[k]||''} onChange={fp(k)} placeholder={l}/>
                </div>
              ))}
              <div><label style={{fontSize:10,color:'var(--text2)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>Mako User?</label>
                <select className="inp" value={form.preferences?.makoUser?'yes':'no'} onChange={e=>setForm(p=>({...p,preferences:{...p.preferences,makoUser:e.target.value==='yes'}}))}>
                  <option value="no">No</option><option value="yes">Yes</option>
                </select></div>
            </div>
          </div>

          <div style={{display:'flex',gap:10,marginTop:20}}>
            <button className="btn btn-gold" onClick={save}>Save Profile</button>
            <button className="btn btn-ghost" onClick={()=>{setShowForm(false);setEditId(null);}}>Cancel</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── TRAY LIBRARY ──────────────────────────────────────────────────────────────
function TrayLibrary() {
  const [system, setSystem] = useState('tka');
  const [selected, setSelected] = useState(null);
  const [search, setSearch] = useState('');

  const tray = DATA.trayLibrary[system];
  const filtered = tray.instruments.filter(i=>!search||i.name.toLowerCase().includes(search.toLowerCase())||i.function.toLowerCase().includes(search.toLowerCase())||i.cat.toLowerCase().includes(search.toLowerCase()));

  const catColor = {Alignment:'var(--teal)',Resection:'var(--red)',Sizing:'var(--purple)',Trialing:'var(--gold)',Implantation:'var(--green)',Fixation:'var(--orange)',Preparation:'var(--teal)',Measurement:'var(--purple)',Exposure:'var(--text2)',System:'var(--teal)',Registration:'var(--gold)',Verification:'var(--green)'};

  const InstrumentSVG = ({instrument}) => {
    const shapes = {
      Alignment: <svg viewBox="0 0 100 20" style={{width:'100%',maxWidth:200,height:40}}><rect x="2" y="8" width="96" height="4" rx="2" fill="none" stroke="#00D4FF" strokeWidth="1.5"/><circle cx="50" cy="10" r="6" fill="none" stroke="#00D4FF" strokeWidth="1.5"/><line x1="50" y1="2" x2="50" y2="6" stroke="#00D4FF" strokeWidth="1.5"/><line x1="50" y1="14" x2="50" y2="18" stroke="#00D4FF" strokeWidth="1.5"/></svg>,
      Resection: <svg viewBox="0 0 120 40" style={{width:'100%',maxWidth:200,height:50}}><rect x="5" y="10" width="80" height="20" rx="3" fill="none" stroke="#FF5252" strokeWidth="1.5"/><rect x="85" y="14" width="30" height="12" rx="2" fill="rgba(255,82,82,.15)" stroke="#FF5252" strokeWidth="1"/><line x1="20" y1="18" x2="20" y2="22" stroke="#FF5252" strokeWidth="1"/><line x1="35" y1="18" x2="35" y2="22" stroke="#FF5252" strokeWidth="1"/><line x1="50" y1="18" x2="50" y2="22" stroke="#FF5252" strokeWidth="1"/><line x1="65" y1="18" x2="65" y2="22" stroke="#FF5252" strokeWidth="1"/></svg>,
      Trialing: <svg viewBox="0 0 100 50" style={{width:'100%',maxWidth:200,height:60}}><path d="M10 40 Q10 10 30 10 L70 10 Q90 10 90 40 Z" fill="rgba(245,166,35,.1)" stroke="#F5A623" strokeWidth="1.5"/><line x1="30" y1="10" x2="30" y2="40" stroke="#F5A623" strokeWidth="1"/><line x1="70" y1="10" x2="70" y2="40" stroke="#F5A623" strokeWidth="1"/></svg>,
      Implantation: <svg viewBox="0 0 100 40" style={{width:'100%',maxWidth:200,height:50}}><rect x="5" y="15" width="60" height="10" rx="5" fill="none" stroke="#00E676" strokeWidth="1.5"/><circle cx="75" cy="20" r="12" fill="rgba(0,230,118,.1)" stroke="#00E676" strokeWidth="1.5"/><path d="M70 20 L80 20 M75 15 L75 25" stroke="#00E676" strokeWidth="1.5"/></svg>,
      Preparation: <svg viewBox="0 0 100 40" style={{width:'100%',maxWidth:200,height:50}}><path d="M10 30 L20 10 L80 10 L90 30 Z" fill="rgba(0,212,255,.1)" stroke="#00D4FF" strokeWidth="1.5"/><circle cx="50" cy="30" r="8" fill="none" stroke="#00D4FF" strokeWidth="1.5"/></svg>,
      Sizing: <svg viewBox="0 0 100 30" style={{width:'100%',maxWidth:200,height:40}}><line x1="10" y1="15" x2="90" y2="15" stroke="#BF5AF2" strokeWidth="2"/><line x1="10" y1="8" x2="10" y2="22" stroke="#BF5AF2" strokeWidth="2"/><line x1="90" y1="8" x2="90" y2="22" stroke="#BF5AF2" strokeWidth="2"/><line x1="30" y1="11" x2="30" y2="19" stroke="#BF5AF2" strokeWidth="1"/><line x1="50" y1="11" x2="50" y2="19" stroke="#BF5AF2" strokeWidth="1"/><line x1="70" y1="11" x2="70" y2="19" stroke="#BF5AF2" strokeWidth="1"/></svg>,
      System: <svg viewBox="0 0 120 80" style={{width:'100%',maxWidth:200,height:70}}><rect x="10" y="10" width="100" height="60" rx="8" fill="rgba(0,212,255,.07)" stroke="#00D4FF" strokeWidth="1.5"/><circle cx="60" cy="40" r="20" fill="none" stroke="#00D4FF" strokeWidth="1.5"/><path d="M50 40 Q55 30 60 40 Q65 50 70 40" stroke="#00D4FF" strokeWidth="1.5" fill="none"/></svg>,
      Registration: <svg viewBox="0 0 100 50" style={{width:'100%',maxWidth:200,height:60}}><rect x="10" y="5" width="80" height="40" rx="4" fill="rgba(245,166,35,.07)" stroke="#F5A623" strokeWidth="1.5"/><circle cx="30" cy="20" r="4" fill="#F5A623"/><circle cx="50" cy="15" r="4" fill="#F5A623"/><circle cx="70" cy="20" r="4" fill="#F5A623"/><circle cx="60" cy="30" r="4" fill="#F5A623"/><path d="M30 20 L50 15 L70 20 L60 30 L30 20" stroke="#F5A623" strokeWidth="1" fill="rgba(245,166,35,.1)"/></svg>,
      Verification: <svg viewBox="0 0 80 50" style={{width:'100%',maxWidth:200,height:60}}><circle cx="40" cy="25" r="22" fill="rgba(0,230,118,.07)" stroke="#00E676" strokeWidth="1.5"/><path d="M28 25 L36 33 L52 17" stroke="#00E676" strokeWidth="2.5" fill="none" strokeLinecap="round"/></svg>,
      Measurement: <svg viewBox="0 0 100 40" style={{width:'100%',maxWidth:200,height:50}}><line x1="10" y1="20" x2="90" y2="20" stroke="#BF5AF2" strokeWidth="1.5"/><rect x="20" y="10" width="5" height="20" rx="1" fill="#BF5AF2"/><rect x="45" y="13" width="5" height="14" rx="1" fill="#BF5AF2"/><rect x="70" y="10" width="5" height="20" rx="1" fill="#BF5AF2"/></svg>,
      Fixation: <svg viewBox="0 0 80 50" style={{width:'100%',maxWidth:200,height:60}}><path d="M20 10 L60 10 L70 25 L60 40 L20 40 Z" fill="rgba(255,149,0,.1)" stroke="#FF9500" strokeWidth="1.5"/><line x1="30" y1="20" x2="55" y2="20" stroke="#FF9500" strokeWidth="1.5"/><line x1="30" y1="30" x2="50" y2="30" stroke="#FF9500" strokeWidth="1.5"/></svg>,
      Exposure: <svg viewBox="0 0 100 40" style={{width:'100%',maxWidth:200,height:50}}><path d="M5 35 Q5 5 20 5 L80 5 Q95 5 95 35" fill="none" stroke="var(--text2)" strokeWidth="1.5"/><line x1="20" y1="5" x2="20" y2="35" stroke="var(--text2)" strokeWidth="1"/><line x1="80" y1="5" x2="80" y2="35" stroke="var(--text2)" strokeWidth="1"/></svg>,
    };
    return <div style={{textAlign:'center',padding:'10px 0'}}>{shapes[instrument.cat]||shapes['Trialing']}</div>;
  };

  return (
    <div className="fade-up" style={{padding:24,maxWidth:1280,margin:'0 auto'}}>
      <SectionTitle title="Instrument Tray Library" icon="tray" sub="Visual reference for all instrument sets — function, usage, and surgical tips"/>

      {/* System Selector */}
      <div style={{display:'flex',gap:10,marginBottom:20}}>
        {[['tka','TKA — Triathlon'],['tha','THA — Accolade II / Trident'],['mako','Mako Robotic Components']].map(([k,l])=>(
          <button key={k} onClick={()=>{setSystem(k);setSelected(null);setSearch('');}}
            style={{padding:'10px 20px',borderRadius:12,border:`1px solid ${system===k?'var(--teal)':'var(--border)'}`,background:system===k?'rgba(0,212,255,.1)':'var(--surface)',color:system===k?'var(--teal)':'var(--text2)',fontSize:13,fontWeight:600,cursor:'pointer',transition:'all .2s'}}>
            {l}
          </button>
        ))}
      </div>

      <div style={{marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:16,marginBottom:4}}>{tray.name}</div>
        <div style={{fontSize:13,color:'var(--text2)',marginBottom:14}}>{tray.description}</div>
        <div style={{position:'relative',maxWidth:340}}>
          <div style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)'}}><Icon n='search' s={14} c='var(--text2)'/></div>
          <input className="inp" style={{paddingLeft:36}} placeholder="Search instruments..." value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14}}>
        {filtered.map(inst=>(
          <div key={inst.id} className={`instrument-card${selected?.id===inst.id?' selected':''}`} onClick={()=>setSelected(selected?.id===inst.id?null:inst)}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
              <div>
                <div style={{fontWeight:700,fontSize:13}}>{inst.name}</div>
                <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>{inst.abbrev}</div>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:4,alignItems:'flex-end'}}>
                <span className="badge" style={{background:`${catColor[inst.cat]||'var(--text2)'}18`,color:catColor[inst.cat]||'var(--text2)',border:`1px solid ${catColor[inst.cat]||'var(--text2)'}33`,fontSize:10}}>{inst.cat}</span>
                {inst.critical && <span className="badge badge-red" style={{fontSize:9}}>CRITICAL</span>}
              </div>
            </div>

            <InstrumentSVG instrument={inst}/>

            <div style={{fontSize:11,color:'var(--text2)',lineHeight:1.5,marginBottom:8}}>{inst.function}</div>
            <div style={{padding:'6px 10px',background:'rgba(245,166,35,.06)',borderRadius:8,borderLeft:'2px solid rgba(245,166,35,.4)'}}>
              <div style={{fontSize:10,color:'var(--gold)',fontWeight:600,marginBottom:2}}>USAGE STEP</div>
              <div style={{fontSize:11,color:'var(--text)'}}>{inst.usage}</div>
            </div>

            {selected?.id===inst.id && (
              <div style={{marginTop:12,padding:'12px 14px',background:'rgba(0,212,255,.07)',border:'1px solid rgba(0,212,255,.2)',borderRadius:10}}>
                <div style={{fontSize:10,color:'var(--teal)',fontWeight:700,marginBottom:4,textTransform:'uppercase',letterSpacing:'.5px'}}>Pro Tip</div>
                <div style={{fontSize:12,color:'var(--text)',lineHeight:1.6}}>{inst.tip}</div>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── INVENTORY ─────────────────────────────────────────────────────────────────
function Inventory({inventory, setInventory}) {
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const blank = {item:'',account:'',qty:0,par:2,expiry:'',status:'ok',notes:''};
  const [form, setForm] = useState(blank);
  const f = k=>e=>setForm(p=>({...p,[k]:e.target.value}));

  const filtered = inventory.filter(i=>{
    const m = !search||i.item.toLowerCase().includes(search.toLowerCase())||i.account.toLowerCase().includes(search.toLowerCase());
    const s = filter==='all'||i.status===filter;
    return m&&s;
  });

  const autoStatus = (qty,par) => +qty===0?'critical':+qty<+par?'low':'ok';

  const save=()=>{
    const status = autoStatus(form.qty,form.par);
    const item = {...form, qty:+form.qty, par:+form.par, status};
    if(editId) setInventory(p=>p.map(i=>i.id===editId?{...i,...item}:i));
    else setInventory(p=>[...p,{id:uid(),...item}]);
    setShowForm(false); setEditId(null); setForm(blank);
  };
  const del=id=>setInventory(p=>p.filter(i=>i.id!==id));
  const openEdit=i=>{ setForm({...blank,...i}); setEditId(i.id); setShowForm(true); };

  const critical = inventory.filter(i=>i.status==='critical');
  const low = inventory.filter(i=>i.status==='low');

  return (
    <div className="fade-up" style={{padding:24,maxWidth:1280,margin:'0 auto'}}>
      <SectionTitle title="Inventory Tracker" icon="inventory" sub="Consignment levels, expiration dates, and restock alerts"
        action={<button className="btn btn-gold" onClick={()=>{setForm(blank);setEditId(null);setShowForm(true);}}><Icon n='plus' s={14}/>Add Item</button>}/>

      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
        <Stat label="Total Items" value={inventory.length} icon="inventory"/>
        <Stat label="Critical" value={critical.length} color="var(--red)" sub={critical.length>0?'Order immediately':'All clear'} icon="alert"/>
        <Stat label="Low Stock" value={low.length} color="var(--orange)" sub={low.length>0?'Below par level':'All clear'} icon="alert"/>
        <Stat label="Accounts Stocked" value={[...new Set(inventory.map(i=>i.account))].length} color="var(--teal)" icon="hospital"/>
      </div>

      {/* Alerts */}
      {critical.length>0 && (
        <div style={{background:'rgba(255,82,82,.07)',border:'1px solid rgba(255,82,82,.3)',borderRadius:12,padding:'14px 16px',marginBottom:14}}>
          <div style={{fontWeight:700,color:'var(--red)',fontSize:13,display:'flex',alignItems:'center',gap:8,marginBottom:10}}><Icon n='alert' s={15} c='var(--red)'/>Critical — Order Immediately</div>
          {critical.map(i=><div key={i.id} style={{fontSize:13,color:'var(--text)',marginBottom:4}}>• {i.item} <span style={{color:'var(--text2)'}}>({i.account})</span> — Qty: <span style={{color:'var(--red)',fontWeight:700}}>{i.qty}</span></div>)}
        </div>
      )}

      {/* Filter + Search */}
      <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
        <div style={{position:'relative',flex:1,minWidth:200}}>
          <div style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)'}}><Icon n='search' s={14} c='var(--text2)'/></div>
          <input className="inp" style={{paddingLeft:36}} placeholder="Search items or accounts..." value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <div style={{display:'flex',gap:6}}>
          {['all','critical','low','ok'].map(s=><Pill key={s} children={s==='ok'?'OK':s.charAt(0).toUpperCase()+s.slice(1)+` (${inventory.filter(i=>i.status===s).length})`} active={filter===s} onClick={()=>setFilter(s)}/>)}
        </div>
      </div>

      {/* Inventory List */}
      {filtered.map(i=>(
        <div key={i.id} className={`inv-row ${i.status==='critical'?'inv-critical':i.status==='low'?'inv-warning':''}`}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:600,fontSize:13,marginBottom:2}}>{i.item}</div>
            <div style={{fontSize:11,color:'var(--text2)',display:'flex',gap:12}}>
              <span style={{display:'flex',alignItems:'center',gap:4}}><Icon n='hospital' s={11}/>{i.account}</span>
              {i.expiry && <span style={{display:'flex',alignItems:'center',gap:4}}><Icon n='clock' s={11}/>Exp: {fmtDateShort(i.expiry)}</span>}
              {i.notes && <span style={{color:'var(--text2)'}}>{i.notes}</span>}
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:16}}>
            {/* Qty bar */}
            <div style={{textAlign:'center',minWidth:80}}>
              <div style={{fontSize:11,color:'var(--text2)',marginBottom:4}}>Stock / Par</div>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{fontWeight:800,fontSize:18,color:i.status==='critical'?'var(--red)':i.status==='low'?'var(--orange)':'var(--green)'}}>{i.qty}</span>
                <span style={{fontSize:11,color:'var(--text2)'}}>/ {i.par}</span>
              </div>
              <div className="prog" style={{marginTop:4,width:80}}>
                <div className={`prog-fill ${i.status==='ok'?'prog-green':''}`} style={{width:`${Math.min((i.qty/Math.max(i.par,1))*100,100)}%`,background:i.status==='critical'?'var(--red)':i.status==='low'?'var(--orange)':'var(--green)'}}/>
              </div>
            </div>
            <span className={`badge ${i.status==='critical'?'badge-red':i.status==='low'?'badge-orange':'badge-green'}`} style={{minWidth:70,justifyContent:'center'}}>
              {i.status==='critical'?'CRITICAL':i.status==='low'?'LOW':'IN STOCK'}
            </span>
            <div style={{display:'flex',gap:6}}>
              <button className="btn btn-ghost" style={{padding:'5px 10px',fontSize:11}} onClick={()=>openEdit(i)}><Icon n='edit' s={11}/></button>
              <button className="btn btn-red" style={{padding:'5px 10px',fontSize:11}} onClick={()=>del(i.id)}><Icon n='trash' s={11}/></button>
            </div>
          </div>
        </div>
      ))}

      {showForm && (
        <Modal title={editId?'Edit Inventory Item':'Add Inventory Item'} onClose={()=>{setShowForm(false);setEditId(null);}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            <div style={{gridColumn:'span 2'}}><label style={{fontSize:10,color:'var(--text2)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>Item Name *</label>
              <input className="inp" value={form.item} onChange={f('item')} placeholder="Product name, size, configuration"/></div>
            <div><label style={{fontSize:10,color:'var(--text2)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>Account / Facility</label>
              <input className="inp" value={form.account} onChange={f('account')} placeholder="Hospital name"/></div>
            <div><label style={{fontSize:10,color:'var(--text2)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>Expiry Date</label>
              <input className="inp" type="date" value={form.expiry} onChange={f('expiry')}/></div>
            <div><label style={{fontSize:10,color:'var(--text2)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>Current Qty</label>
              <input className="inp" type="number" min="0" value={form.qty} onChange={f('qty')}/></div>
            <div><label style={{fontSize:10,color:'var(--text2)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>Par Level</label>
              <input className="inp" type="number" min="1" value={form.par} onChange={f('par')}/></div>
            <div style={{gridColumn:'span 2'}}><label style={{fontSize:10,color:'var(--text2)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>Notes</label>
              <input className="inp" value={form.notes} onChange={f('notes')} placeholder="Any notes about this item..."/></div>
          </div>
          <div style={{display:'flex',gap:10,marginTop:18}}>
            <button className="btn btn-gold" onClick={save}>Save Item</button>
            <button className="btn btn-ghost" onClick={()=>{setShowForm(false);setEditId(null);}}>Cancel</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── TRAINING ──────────────────────────────────────────────────────────────────
function Training({trainingProgress, setTrainingProgress}) {
  const [active, setActive] = useState(null);
  const [quizMode, setQuizMode] = useState(false);
  const [quizState, setQuizState] = useState({});
  const [quizIdx, setQuizIdx] = useState(0);
  const [filter, setFilter] = useState('All');

  const cats = ['All',...new Set(DATA.trainingModules.map(m=>m.cat))];
  const filtered = DATA.trainingModules.filter(m=>filter==='All'||m.cat===filter);
  const completed = Object.values(trainingProgress).filter(v=>v?.completed).length;
  const pct = Math.round(completed/DATA.trainingModules.length*100);

  const catColor = {Clinical:'var(--teal)',Technology:'var(--gold)',Professional:'var(--purple)',Sales:'var(--green)',Operations:'var(--orange)',Strategy:'var(--red)'};

  const openModule = m => { setActive(m); setQuizMode(false); setQuizState({}); setQuizIdx(0); };
  const startQuiz = () => { setQuizMode(true); setQuizState({}); setQuizIdx(0); };
  const backToLesson = () => { setQuizMode(false); setQuizState({}); setQuizIdx(0); };
  const backToModules = () => { setActive(null); setQuizMode(false); };

  const answer = (qi, choice) => {
    if(quizState[qi]!==undefined) return;
    setQuizState(p=>({...p,[qi]:choice}));
  };

  const nextQ = () => {
    if(quizIdx < active.quiz.length - 1) {
      setQuizIdx(p=>p+1);
    } else {
      // quiz done - save progress
      const correctCount = Object.entries(quizState).filter(([i,c])=>active.quiz[Number(i)]?.correct===c).length;
      const finalCorrect = quizState[quizIdx] === active.quiz[quizIdx].correct ? correctCount + 1 : correctCount;
      setTrainingProgress(p=>({...p,[active.id]:{completed:true,date:new Date().toISOString(),score:finalCorrect,total:active.quiz.length}}));
      setQuizIdx(active.quiz.length); // signal done
    }
  };

  // ── MODULE GRID ──
  if(!active) return (
    <div className="fade-up" style={{padding:24,maxWidth:1280,margin:'0 auto'}}>
      <SectionTitle title="Training Hub" icon="training" sub={`${completed} of ${DATA.trainingModules.length} modules complete`}/>
      <div style={{marginBottom:20}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
          <span style={{fontSize:13,color:'var(--text2)'}}>Overall Progress</span>
          <span style={{fontWeight:700,color:'var(--gold)'}}>{pct}%</span>
        </div>
        <div className="prog" style={{height:8}}><div className="prog-fill" style={{width:`${pct}%`}}/></div>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap'}}>
        {cats.map(c=><Pill key={c} active={filter===c} onClick={()=>setFilter(c)}>{c}</Pill>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:16}}>
        {filtered.map(m=>{
          const done = trainingProgress[m.id]?.completed;
          const cc = catColor[m.cat]||'var(--text2)';
          return (
            <div key={m.id} className="glass" style={{padding:20,cursor:'pointer',transition:'all .2s',border:done?'1px solid rgba(0,230,118,.25)':'1px solid var(--border)'}} onClick={()=>openModule(m)}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                <span className="badge" style={{background:`${cc}18`,color:cc,border:`1px solid ${cc}33`,fontSize:10}}>{m.cat}</span>
                {done && <span className="badge badge-green" style={{fontSize:10}}>✓ Done</span>}
              </div>
              <div style={{fontWeight:700,fontSize:15,marginBottom:6}}>{m.title}</div>
              <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.5,marginBottom:14}}>{m.desc}</div>
              <div style={{display:'flex',gap:12}}>
                <span style={{fontSize:11,color:'var(--text2)'}}><Icon n='clock' s={11}/> {m.dur}</span>
                <span style={{fontSize:11,color:'var(--text2)'}}><Icon n='clipboard' s={11}/> {m.quiz.length} questions</span>
              </div>
              {done && <div style={{marginTop:10,fontSize:12,color:'var(--green)'}}>Score: {trainingProgress[m.id].score}/{trainingProgress[m.id].total||m.quiz.length}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );

  // ── QUIZ MODE ──
  if(quizMode) {
    const isDone = quizIdx >= active.quiz.length;
    const q = !isDone ? active.quiz[quizIdx] : null;
    return (
      <div className="fade-up" style={{padding:24,maxWidth:760,margin:'0 auto'}}>
        <button className="btn btn-ghost" onClick={backToLesson} style={{marginBottom:20}}>
          <Icon n='chev_right' s={14} c='var(--text2)' stroke={2}/> Back to Lesson
        </button>
        <div style={{fontWeight:800,fontSize:20,marginBottom:4}}>{active.title}</div>
        <div style={{fontSize:13,color:'var(--text2)',marginBottom:20}}>Knowledge Check · {active.quiz.length} questions</div>
        <div className="glass" style={{padding:24}}>
          {!isDone ? (
            <div>
              <div style={{fontSize:11,color:'var(--text2)',marginBottom:8,textTransform:'uppercase',letterSpacing:'.7px'}}>Question {quizIdx+1} of {active.quiz.length}</div>
              <div className="prog" style={{marginBottom:16}}><div className="prog-fill" style={{width:`${(quizIdx/active.quiz.length)*100}%`,background:'var(--teal)'}}/></div>
              <div style={{fontWeight:600,fontSize:15,marginBottom:16,lineHeight:1.6,color:'var(--text)'}}>{q.q}</div>
              {q.opts.map((o,oi)=>{
                const sel = quizState[quizIdx];
                const isCorrect = oi===q.correct;
                const selected = sel===oi;
                const revealed = sel!==undefined;
                return (
                  <button key={oi} onClick={()=>answer(quizIdx,oi)} style={{display:'block',width:'100%',textAlign:'left',padding:'12px 16px',borderRadius:10,border:`1px solid ${revealed?(isCorrect?'var(--green)':selected?'var(--red)':'var(--border)'):'var(--border)'}`,background:revealed?(isCorrect?'rgba(0,230,118,.1)':selected?'rgba(255,82,82,.1)':'var(--surface)'):'var(--surface)',color:'var(--text)',marginBottom:8,cursor:revealed?'default':'pointer',transition:'all .2s',fontSize:13}}>
                    {o}
                  </button>
                );
              })}
              {quizState[quizIdx]!==undefined && (
                <div style={{marginTop:12,padding:'12px 14px',background:'rgba(0,212,255,.07)',border:'1px solid rgba(0,212,255,.2)',borderRadius:10}}>
                  <div style={{fontSize:12,color:quizState[quizIdx]===q.correct?'var(--green)':'var(--red)',fontWeight:700,marginBottom:4}}>
                    {quizState[quizIdx]===q.correct ? 'Correct!' : 'Incorrect'}
                  </div>
                  <div style={{fontSize:13,color:'var(--text)',lineHeight:1.6}}>{q.exp}</div>
                  <button className="btn btn-gold" style={{marginTop:12}} onClick={nextQ}>
                    {quizIdx < active.quiz.length-1 ? 'Next Question' : 'Finish Quiz'}
                  </button>
                </div>
              )}
            </div>
          ) : (
            <div style={{textAlign:'center',padding:20}}>
              <div style={{fontSize:48,marginBottom:12}}>🏆</div>
              <div style={{fontWeight:800,fontSize:22,color:'var(--green)',marginBottom:8}}>Module Complete!</div>
              <div style={{fontSize:14,color:'var(--text2)',marginBottom:20}}>
                Score: {trainingProgress[active.id]?.score ?? 0} / {active.quiz.length}
              </div>
              <div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}}>
                <button className="btn btn-ghost" onClick={backToLesson}>Back to Lesson</button>
                <button className="btn btn-gold" onClick={startQuiz}>Retry Quiz</button>
                <button className="btn btn-ghost" onClick={backToModules}>All Modules</button>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── LESSON VIEW ──
  const cc = catColor[active.cat] || 'var(--gold)';
  const done = trainingProgress[active.id]?.completed;
  return (
    <div className="fade-up" style={{padding:24,maxWidth:800,margin:'0 auto'}}>
      <button className="btn btn-ghost" onClick={backToModules} style={{marginBottom:20}}>
        <Icon n='chev_right' s={14} c='var(--text2)' stroke={2}/> All Modules
      </button>

      {/* Module header */}
      <div className="glass" style={{padding:24,marginBottom:20,borderTop:`2px solid ${cc}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}}>
          <div>
            <span className="badge" style={{background:`${cc}18`,color:cc,border:`1px solid ${cc}33`,fontSize:10,marginBottom:10,display:'inline-block'}}>{active.cat}</span>
            <div style={{fontWeight:800,fontSize:22,marginBottom:4,color:'var(--text)'}}>{active.title}</div>
            <div style={{fontSize:13,color:'var(--text2)'}}>{active.dur} · {active.quiz.length} questions</div>
          </div>
          {done && <span className="badge badge-green">✓ Completed · {trainingProgress[active.id].score}/{trainingProgress[active.id].total||active.quiz.length}</span>}
        </div>
        <p style={{marginTop:14,color:'var(--text2)',fontSize:14,lineHeight:1.7}}>{active.desc}</p>
      </div>

      {/* Sections */}
      {(active.sections||[]).map((sec,si)=>(
        <div key={si} style={{marginBottom:24}}>
          {sec.heading && (
            <div style={{fontSize:15,fontWeight:800,color:cc,paddingBottom:10,marginBottom:14,borderBottom:'1px solid var(--border)',letterSpacing:.2}}>
              {sec.heading}
            </div>
          )}
          {sec.body && (
            <div style={{fontSize:14,lineHeight:1.85,color:'var(--text)',whiteSpace:'pre-line',marginBottom:sec.svg||sec.videos?14:0}}>
              {sec.body}
            </div>
          )}
          {sec.svg && (
            <div style={{margin:'16px 0',borderRadius:12,overflow:'hidden',border:'1px solid var(--border)'}}
              dangerouslySetInnerHTML={{__html:sec.svg}}
            />
          )}
          {sec.videos && sec.videos.length>0 && (
            <div style={{marginTop:12}}>
              <div style={{fontSize:12,fontWeight:700,color:'var(--gold)',marginBottom:8,textTransform:'uppercase',letterSpacing:.5}}>🎬 Watch & Learn</div>
              {sec.videos.map((v,vi)=>(
                <a key={vi} href={v.url} target="_blank" rel="noopener noreferrer"
                  style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',background:'rgba(0,212,255,.05)',border:'1px solid rgba(0,212,255,.15)',borderRadius:10,textDecoration:'none',color:'var(--text)',fontSize:13,marginBottom:8}}>
                  <span style={{color:'var(--teal)',fontSize:16}}>▶</span>
                  <span style={{flex:1}}>{v.title}</span>
                  <span style={{fontSize:11,color:'var(--teal)'}}>Open →</span>
                </a>
              ))}
            </div>
          )}
        </div>
      ))}

      {/* Quiz launch */}
      <div className="glass" style={{padding:20,marginTop:24,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:16,border:`1px solid ${cc}44`}}>
        <div>
          <div style={{fontWeight:800,fontSize:16,color:'var(--gold)',marginBottom:4}}>Knowledge Check</div>
          <div style={{fontSize:13,color:'var(--text2)'}}>{active.quiz.length} questions · 70% to pass</div>
          {done && <div style={{fontSize:12,color:'var(--green)',marginTop:4}}>Last score: {trainingProgress[active.id].score}/{trainingProgress[active.id].total||active.quiz.length}</div>}
        </div>
        <button className="btn btn-gold" onClick={startQuiz}>
          {done ? 'Retake Quiz' : 'Start Quiz →'}
        </button>
      </div>

      <div style={{marginTop:20,padding:12,background:'rgba(255,255,255,.03)',border:'1px solid var(--border)',borderRadius:10,fontSize:11,color:'var(--text3)',lineHeight:1.6}}>
        ⚖️ All content is derived from publicly available clinical literature. Always defer to official Stryker training materials and your manager.
      </div>
    </div>
  );
}

// ── CREDENTIALS ───────────────────────────────────────────────────────────────
function Credentials({credentials, setCredentials}) {
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const blank = {facility:'',platform:'Reptrax',status:'active',expiry:'',requirements:[],notes:''};
  const [form, setForm] = useState(blank);
  const [reqInput, setReqInput] = useState('');
  const f = k=>e=>setForm(p=>({...p,[k]:e.target.value}));

  const expiring = credentials.filter(c=>c.status==='expiring'||c.status==='pending');
  const save=()=>{
    if(!form.facility) return;
    if(editId) setCredentials(p=>p.map(c=>c.id===editId?{...c,...form}:c));
    else setCredentials(p=>[...p,{id:uid(),...form}]);
    setShowForm(false); setEditId(null); setForm(blank);
  };
  const del=id=>setCredentials(p=>p.filter(c=>c.id!==id));
  const openEdit=c=>{ setForm({...blank,...c,requirements:[...(c.requirements||[])]}); setEditId(c.id); setShowForm(true); };

  const statusColor = {active:'var(--green)',expiring:'var(--orange)',pending:'var(--text2)',expired:'var(--red)'};

  return (
    <div className="fade-up" style={{padding:24,maxWidth:1100,margin:'0 auto'}}>
      <SectionTitle title="Hospital Credentialing" icon="creds" sub="Vendor credential status across all facilities"
        action={<button className="btn btn-gold" onClick={()=>{setForm(blank);setEditId(null);setShowForm(true);}}><Icon n='plus' s={14}/>Add Facility</button>}/>

      {expiring.length>0 && (
        <div style={{background:'rgba(255,149,0,.07)',border:'1px solid rgba(255,149,0,.3)',borderRadius:12,padding:'14px 16px',marginBottom:20,display:'flex',gap:10,alignItems:'flex-start'}}>
          <Icon n='alert' s={18} c='var(--orange)'/>
          <div>
            <div style={{fontWeight:700,color:'var(--orange)',marginBottom:4}}>Attention Required ({expiring.length} facilities)</div>
            {expiring.map(c=><div key={c.id} style={{fontSize:13,color:'var(--text)',marginBottom:2}}>• {c.facility} — {c.platform} — {c.status==='expiring'?`Expires ${fmtDateShort(c.expiry)}`:'Pending approval'}</div>)}
          </div>
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:16}}>
        {credentials.map(c=>(
          <div key={c.id} className="glass" style={{padding:20,borderLeft:`3px solid ${statusColor[c.status]||'var(--border)'}`,transition:'all .2s'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
              <div style={{fontWeight:700,fontSize:14}}>{c.facility}</div>
              <span className="badge" style={{background:`${statusColor[c.status]||'var(--text2)'}18`,color:statusColor[c.status]||'var(--text2)',border:`1px solid ${statusColor[c.status]||'var(--text2)'}33`,textTransform:'capitalize'}}>{c.status}</span>
            </div>
            <div style={{fontSize:12,color:'var(--text2)',marginBottom:10}}>{c.platform}</div>
            {c.expiry && <div style={{fontSize:12,color:c.status==='expiring'?'var(--orange)':'var(--text2)',marginBottom:10,display:'flex',alignItems:'center',gap:6}}><Icon n='clock' s={11}/>Expires: {fmtDateShort(c.expiry)}{c.status==='expiring'&&c.expiry?` (${daysUntil(c.expiry)} days)`:''}
            </div>}
            {c.requirements?.length>0 && <div style={{marginBottom:10,display:'flex',gap:4,flexWrap:'wrap'}}>
              {c.requirements.map(r=><span key={r} className="badge badge-gray" style={{fontSize:10}}>{r}</span>)}
            </div>}
            {c.notes && <div style={{fontSize:12,color:'var(--text2)',marginBottom:12,fontStyle:'italic'}}>{c.notes}</div>}
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-ghost" style={{padding:'5px 12px',fontSize:11}} onClick={()=>openEdit(c)}><Icon n='edit' s={11}/>Edit</button>
              <button className="btn btn-red" style={{padding:'5px 12px',fontSize:11}} onClick={()=>del(c.id)}><Icon n='trash' s={11}/>Remove</button>
            </div>
          </div>
        ))}
      </div>

      {showForm && (
        <Modal title={editId?'Edit Credential':'Add Facility'} onClose={()=>{setShowForm(false);setEditId(null);}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            <div style={{gridColumn:'span 2'}}><label style={{fontSize:10,color:'var(--text2)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>Facility Name *</label>
              <input className="inp" value={form.facility} onChange={f('facility')} placeholder="Hospital / Facility name"/></div>
            <div><label style={{fontSize:10,color:'var(--text2)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>Platform</label>
              <select className="inp" value={form.platform} onChange={f('platform')}>
                {['Reptrax','Vendormate','Intellicentrics','Other'].map(p=><option key={p} value={p}>{p}</option>)}
              </select></div>
            <div><label style={{fontSize:10,color:'var(--text2)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>Status</label>
              <select className="inp" value={form.status} onChange={f('status')}>
                {['active','expiring','pending','expired'].map(s=><option key={s} value={s}>{s}</option>)}
              </select></div>
            <div><label style={{fontSize:10,color:'var(--text2)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>Expiry Date</label>
              <input className="inp" type="date" value={form.expiry} onChange={f('expiry')}/></div>
            <div><label style={{fontSize:10,color:'var(--text2)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>Notes</label>
              <input className="inp" value={form.notes} onChange={f('notes')} placeholder="Access instructions, notes..."/></div>
            <div style={{gridColumn:'span 2'}}><label style={{fontSize:10,color:'var(--text2)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:'.5px'}}>Requirements (type + Enter)</label>
              <div style={{display:'flex',gap:8,marginBottom:8}}><input className="inp" value={reqInput} onChange={e=>setReqInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&reqInput.trim()){setForm(p=>({...p,requirements:[...(p.requirements||[]),reqInput.trim()]}));setReqInput('');}}} placeholder="e.g. Background Check"/></div>
              <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                {(form.requirements||[]).map(r=><span key={r} className="badge badge-gray" style={{cursor:'pointer'}} onClick={()=>setForm(p=>({...p,requirements:p.requirements.filter(x=>x!==r)}))}>{r} ×</span>)}
              </div></div>
          </div>
          <div style={{display:'flex',gap:10,marginTop:18}}>
            <button className="btn btn-gold" onClick={save}>Save</button>
            <button className="btn btn-ghost" onClick={()=>{setShowForm(false);setEditId(null);}}>Cancel</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function Chatbot() {
  const [history, setHistory] = useLS('cj_chat4',[{role:'bot',msg:'Welcome to CJ 4.0. Ask me anything about your role — Mako workflow, clinical knowledge, OR etiquette, competitor positioning, territory strategy, or case preparation. What do you need?'}]);
  const [input, setInput] = useState('');
  const bottomRef = useRef();
  useEffect(()=>bottomRef.current?.scrollIntoView({behavior:'smooth'}),[history]);

  const respond = q => {
    const ql = q.toLowerCase();
    const match = DATA.chatKnowledge.find(k=>k.keys.some(key=>ql.includes(key)));
    return match ? match.response : `Good question. For "${q}" — I recommend checking the Training Hub modules or asking Cody or Chanel directly. I can help with: Mako workflow, TKA/THA/PKA clinical details, OR etiquette, competitor positioning (ROSA, CORI), credentialing, territory strategy, inventory management, or case preparation. What topic would you like to explore?`;
  };

  const send = () => {
    if(!input.trim()) return;
    const q = input.trim(); setInput('');
    setHistory(p=>[...p,{role:'user',msg:q},{role:'bot',msg:respond(q)}]);
  };

  const chips = ['Tell me about Mako','AccuStop technology','How do I handle objections?','What credentials do I need?','OR etiquette tips','First 90 days strategy','Competitor positioning','Dallas territory intel'];

  return (
    <div className="fade-up" style={{padding:24,maxWidth:820,margin:'0 auto'}}>
      <SectionTitle title="CJ Assistant" icon="chat" sub="Ask anything about your role, products, territory, or clinical knowledge"/>
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:16,display:'flex',flexDirection:'column',height:'calc(100vh - 280px)',minHeight:400}}>
        <div style={{flex:1,overflowY:'auto',padding:20,display:'flex',flexDirection:'column',gap:12}}>
          {history.map((m,i)=>(
            <div key={i} className={m.role==='user'?'chat-user':'chat-bot'} style={{alignSelf:m.role==='user'?'flex-end':'flex-start'}}>{m.msg}</div>
          ))}
          <div ref={bottomRef}/>
        </div>
        <div style={{padding:'12px 16px',borderTop:'1px solid var(--border)'}}>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
            {chips.map(c=><button key={c} className="chip" onClick={()=>{setInput(c);}}>{c}</button>)}
          </div>
          <div style={{display:'flex',gap:10}}>
            <input className="inp" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder="Ask anything..."/>
            <button className="btn btn-gold" onClick={send}><Icon n='send' s={14}/></button>
            <button className="btn btn-ghost" onClick={()=>setHistory([{role:'bot',msg:'Chat cleared. What would you like to know?'}])}>Clear</button>
          </div>
          <div style={{fontSize:10,color:'var(--text3)',marginTop:8,textAlign:'center'}}>General guidance based on publicly available knowledge. Verify specifics with Stryker training materials.</div>
        </div>
      </div>
    </div>
  );
}

// ── ROADMAP ───────────────────────────────────────────────────────────────────
function Roadmap({user, trainingProgress}) {
  const dayInRole = Math.ceil((new Date()-new Date(user.startDate||'2026-03-04'))/86400000);
  const currentMonth = Math.ceil(dayInRole/30);
  const months = [
    {n:1,title:'Foundation',color:'var(--gold)',items:['Complete credentialing at all assigned facilities','Complete all 10 training modules + quizzes','Shadow 10+ OR cases with senior reps','Introduce yourself to all OR staff contacts','Set up CRM with initial surgeon database']},
    {n:2,title:'Case Support',color:'var(--teal)',items:['Begin independent case coverage with oversight','Build relationships with scrub techs and circulators at top 3 accounts','Attend first Mako case and learn the workflow','Make 20+ surgeon office calls','Log 100% of interactions in CRM']},
    {n:3,title:'Independence',color:'var(--green)',items:['Cover cases independently','Identify top 5 Mako growth opportunities','Schedule first surgeon lunch-and-learn','Initiate contact with at least 2 target (competitive) accounts','Present first territory plan to managers']},
    {n:4,title:'Growth',color:'var(--purple)',items:['Drive measurable Mako utilization increase','Convert at least 1 new case from competitive account','Build relationships with 2+ new hospital accounts','Conduct surgeon education event (grand rounds, in-service)','Identify and document pipeline opportunities']},
    {n:5,title:'Optimization',color:'var(--orange)',items:['Achieve 90%+ case coverage rate','Submit Mako growth proposal to managers','Train new contact on at least one product','Review and refine territory tiering','Mentor newer team members if applicable']},
    {n:6,title:'Performance Review',color:'var(--red)',items:['Prepare comprehensive 6-month performance summary','Hit or exceed all activity KPIs','Present territory growth plan for next 6 months','Establish yourself as trusted OR resource','Define 3 major goals for your second 6 months']},
  ];
  return (
    <div className="fade-up" style={{padding:24,maxWidth:1280,margin:'0 auto'}}>
      <SectionTitle title="6-Month Success Roadmap" icon="roadmap" sub={`Day ${dayInRole} in role · Currently in Month ${currentMonth}`}/>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
        {months.map(m=>{
          const active = m.n===currentMonth;
          const past = m.n<currentMonth;
          return (
            <div key={m.n} className="glass" style={{padding:20,border:`1px solid ${active?m.color:'var(--border)'}`,background:active?`${m.color}08`:'var(--surface)',opacity:past?.8:1,transition:'all .2s'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <div style={{fontWeight:800,fontSize:16,color:m.color}}>Month {m.n}</div>
                {active && <span className="badge badge-gold">ACTIVE</span>}
                {past && <span className="badge badge-green"><Icon n='check' s={10} c='var(--green)'/>Done</span>}
              </div>
              <div style={{fontWeight:700,fontSize:14,marginBottom:12,color:m.color}}>{m.title}</div>
              {m.items.map(item=>(
                <div key={item} style={{display:'flex',gap:8,alignItems:'flex-start',marginBottom:8}}>
                  <div style={{width:16,height:16,borderRadius:'50%',border:`1.5px solid ${past?m.color:'var(--border)'}`,background:past?`${m.color}20`:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:2}}>
                    {past && <Icon n='check' s={9} c={m.color} stroke={3}/>}
                  </div>
                  <span style={{fontSize:12,color:'var(--text)',lineHeight:1.5}}>{item}</span>
                </div>
              ))}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('dashboard');
  const [user] = useLS('cj_user',{name:'CJ',startDate:'2026-03-04',territory:'North Texas',managers:['Cody Crocker','Chanel Derr'],role:'Associate Sales Representative — Joint Replacement'});
  const [contacts, setContacts] = useLS('cj_contacts',[]);
  const [credentials, setCredentials] = useLS('cj_credentials4', DATA.defaultCredentials);
  const [trainingProgress, setTrainingProgress] = useLS('cj_training4',{});
  const [cases, setCases] = useLS('cj_cases4', DATA.defaultCases);
  const [inventory, setInventory] = useLS('cj_inventory4', DATA.defaultInventory);
  const [surgeons, setSurgeons] = useLS('cj_surgeons4', DATA.defaultSurgeons);

  const renderTab = () => {
    switch(tab) {
      case 'dashboard': return <Dashboard contacts={contacts} credentials={credentials} trainingProgress={trainingProgress} user={user} cases={cases} inventory={inventory}/>;
      case 'schedule': return <Schedule cases={cases} setCases={setCases}/>;
      case 'surgeons': return <Surgeons surgeons={surgeons} setSurgeons={setSurgeons}/>;
      case 'tray': return <TrayLibrary/>;
      case 'inventory': return <Inventory inventory={inventory} setInventory={setInventory}/>;
      case 'training': return <Training trainingProgress={trainingProgress} setTrainingProgress={setTrainingProgress}/>;
      case 'intel': return <IntelReport/>;
      case 'metrics': return <Metrics/>;
      case 'creds': return <Credentials credentials={credentials} setCredentials={setCredentials}/>;
      case 'report': return <ManagerReport contacts={contacts} trainingProgress={trainingProgress} credentials={credentials} cases={cases}/>;
      case 'chat': return <Chatbot/>;
      default: return null;
    }
  };

  return (
    <div style={{minHeight:'100vh'}}>
      <Header user={user}/>
      <Nav active={tab} setActive={setTab}/>
      <main>{renderTab()}</main>
      <footer style={{borderTop:'1px solid var(--border)',padding:'12px 24px',textAlign:'center',fontSize:11,color:'var(--text3)',marginTop:40}}>
        CJ 4.0 Territory OS · North Texas Joint Replacement · Powered by publicly available knowledge only · Not affiliated with or endorsed by Stryker Corporation
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
