        body:`The hip is a ball-and-socket joint formed by the femoral head and the acetabulum (cup-shaped socket in the pelvis). It is one of the largest and most stable joints in the body, designed for both mobility and weight-bearing.

Key structures:
• Femoral head — the ball, covered in articular cartilage
• Acetabulum — the socket, also cartilage-lined, deepened by the acetabular labrum
• Joint capsule — fibrous sleeve surrounding the joint providing stability
• Ligamentum teres — internal ligament connecting femoral head to acetabulum
• Iliofemoral, pubofemoral, ischiofemoral ligaments — three capsular ligaments providing passive stability

The hip allows: flexion/extension, abduction/adduction, internal/external rotation, and circumduction. Normal ROM: flexion 120°, extension 20°, abduction 45°, adduction 30°, IR/ER 45° each.

Blood supply to femoral head: primarily from the medial femoral circumflex artery — disruption causes avascular necrosis (AVN).`,

        body:`The knee is the largest joint in the body and the most complex. It is primarily a hinge joint but also allows slight rotation. It consists of three compartments:

• Medial tibiofemoral compartment — medial femoral condyle articulating with medial tibial plateau
• Lateral tibiofemoral compartment — lateral femoral condyle articulating with lateral tibial plateau  
• Patellofemoral compartment — patella articulating with the trochlear groove of the femur

Key structures:
• Articular cartilage — covers all articulating surfaces, 2–4mm thick, avascular
• Menisci (medial and lateral) — fibrocartilage shock absorbers; increase contact area and distribute load
• ACL/PCL — cruciate ligaments providing anteroposterior stability
• MCL/LCL — collateral ligaments providing mediolateral stability
• Quadriceps/patellar tendon — extensor mechanism

        heading:'3. Osteoarthritis — The #1 Indication',
        body:`Osteoarthritis (OA) is a degenerative joint disease characterized by progressive loss of articular cartilage, subchondral bone changes, osteophyte formation, and synovial inflammation.

Pathophysiology:
1. Cartilage matrix breakdown — proteoglycan and collagen degradation
2. Chondrocyte dysfunction — cells cannot maintain matrix integrity
3. Subchondral bone sclerosis — bone hardens beneath the damaged cartilage
4. Osteophyte formation — bone spurs grow at joint margins
5. Joint space narrowing — visible on X-ray as the cartilage disappears
6. Synovial inflammation — joint becomes swollen, warm, painful

X-ray findings (Kellgren-Lawrence Grading):
• Grade 0: Normal
• Grade 1: Possible osteophytes, no JSN
• Grade 2: Definite osteophytes, possible JSN
• Grade 3: Moderate osteophytes, definite JSN, some sclerosis
• Grade 4: Large osteophytes, severe JSN, marked sclerosis, possible bony deformity

Symptoms: pain with activity progressing to rest pain and night pain, stiffness after rest (morning gel phenomenon), crepitus, reduced ROM, swelling, deformity.

Other indications for joint replacement: Rheumatoid arthritis (RA), avascular necrosis (AVN), post-traumatic arthritis, dysplasia, osteonecrosis.`,

        heading:'4. Surgical Indications & Contraindications',
        body:`Indications for total joint replacement:
• Severe OA, RA, or AVN confirmed on imaging
• Disabling pain that significantly affects quality of life
• Failure of conservative treatment (NSAIDs, PT, injections, weight loss) for 3–6 months
• Significant functional limitation (inability to walk reasonable distances, sleep disturbance)
• X-ray evidence of grade 3–4 joint destruction

Contraindications (absolute):
• Active joint or systemic infection
• Neuropathic arthropathy (Charcot joint)
• Insufficient bone stock for implant fixation
• Non-functional extensor mechanism (TKA)
• Severe vascular disease compromising healing

Relative contraindications (surgeon judgment required):
• Morbid obesity (BMI >40) — increased complication risk
• Medical comorbidities (uncontrolled diabetes, cardiac disease)
• Young age (<50) — implant longevity concerns
• Prior joint surgery — may complicate approach
• Psychiatric conditions affecting rehabilitation compliance

As a sales rep, you will encounter surgeons discussing borderline cases. Understanding the decision framework helps you support clinical conversations and anticipate implant selection considerations.`,

        heading:'2. CT-Based Planning — How It Works',
        body:`The CT scan is the foundation of every Mako case. Without it, the case cannot proceed.

Pre-operative CT protocol:
• Specific scan protocols are required — not every CT scan is compatible
• The scan must include the joint being replaced PLUS reference anatomy above and below
• For TKA: scan includes hip center, full knee, and ankle center (for mechanical axis calculation)
• For THA: scan includes full pelvis and proximal femur
• Scans are uploaded to the Mako planning software (typically done by a Stryker clinical team)

3D planning software generates:
• Patient-specific bone model from CT data
• Proposed component sizes and positions
• Mechanical axis visualization
• Soft tissue tension predictions
• Multiple alignment options (mechanical, kinematic, anatomical)

The surgeon reviews the plan before surgery and can adjust:
• Component size
• Implant position (flexion/extension, varus/valgus, rotation)
• Resection levels
• Target alignment

YOUR RESPONSIBILITY: Confirm the CT scan has been ordered, received, and the plan is approved at least 48 hours before the case. If CT is missing the morning of surgery — the Mako case cannot happen. This is the #1 preventable case failure in Mako surgery.`,

        heading:'3. Intraoperative Registration',
        body:`Registration is the critical step that connects the pre-operative CT plan to the patient's actual anatomy in the OR.

How registration works:
1. Bone arrays are attached to the patient's bones (pinned securely to tibia and femur for TKA; pelvis and femur for THA)
2. Arrays contain reflective markers tracked by an optical camera mounted on the Mako system
3. The surgeon uses a registration probe to "touch" anatomical landmarks on the exposed bone surface
4. The Mako system correlates these landmark points to the same points identified on the CT model
5. When enough landmarks match within tolerance — the system confirms registration is complete
6. From this point, the system tracks the patient's bone position in real time

Registration quality determines accuracy. If a patient moves significantly, if arrays loosen, or if registration points are collected incorrectly, the plan-to-patient match degrades.

Your role during registration:
• Stay quiet — this is a precision step requiring surgeon focus
• Do not touch or bump the arrays or bone
• Be ready to hand instruments but do not distract
• If the surgeon has registration difficulty, be prepared to assist per their instruction`,

        body:`Understanding the clinical data is essential for supporting surgeon conversations. Always cite publicly available peer-reviewed sources.

• Implant positioning accuracy: Multiple published studies show statistically significant improvement in acetabular cup inclination and tibial component alignment vs. manual technique (Journal of Arthroplasty, JBJS)
• Outlier reduction: Robotic-arm TKA reduces positioning outliers (components outside target zone) by up to 3× vs. conventional technique (Khlopas et al.)
• Patient-reported outcomes: Several studies report improved early pain scores and patient satisfaction for robotic-assisted vs. conventional cases (Kayani et al., JBJS 2018)
• PKA survivorship: >98% at 2 years published in registry and cohort studies (Coon et al., Knee journal)
• Learning curve: OR time returns to conventional benchmarks within 7–20 cases (Sodhi et al., J Knee Surg)
• Revision rate trend: Registry data suggests lower revision rates with robotic-assisted TKA

Key talk tracks for surgeon objections:
• "Mako takes too long" → Learning curve data shows normalization by ~20 cases. High-volume Mako surgeons report no meaningful time difference.
• "I don't need a robot — I'm already accurate" → Mako doesn't replace skill, it enhances reproducibility. Even experienced surgeons show variability in published studies.
• "The data isn't mature" → Mako cleared since 2006 (PKA). 10+ years of peer-reviewed data including AJRR registry support.

        body:`Total hip arthroplasty replaces the femoral head and the acetabular surface. It is one of the most successful surgical procedures in medicine — consistently rated among the highest for patient satisfaction and quality-of-life improvement.

Annual volume: ~450,000 THAs performed annually in the US. Growing ~5% per year driven by aging population and expanding indications to younger, more active patients.

Primary indications:
• Osteoarthritis (most common, ~80% of cases)
• Rheumatoid arthritis
• Avascular necrosis (AVN) of the femoral head
• Post-traumatic arthritis
• Hip dysplasia / acetabular dysplasia
• Failed previous hip procedures

Implant components:
1. Acetabular shell (cup) — hemispherical metal shell press-fit or screwed into the acetabulum
2. Acetabular liner — poly (UHMWPE), ceramic, or metal; articulates with the femoral head
3. Femoral stem — inserted into the femoral canal; titanium or cobalt-chrome
4. Femoral head — ball that articulates with the liner; various sizes and offset options (ceramic or metal)

Bearing surfaces: Metal-on-poly (most common), ceramic-on-poly, ceramic-on-ceramic, metal-on-metal (largely abandoned due to complications).`,

      {
        heading:'2. Surgical Approaches',
        body:`The surgical approach determines how the surgeon accesses the hip joint. Each has advantages and trade-offs. Knowing the approach helps you anticipate instrument needs and patient positioning.

POSTERIOR APPROACH (most common, ~70% of US THAs)
• Incision: posterolateral, patient in lateral position
• Muscle disruption: short external rotators and posterior capsule incised
• Advantages: excellent acetabular exposure, familiar to most surgeons
• Disadvantages: higher historical dislocation risk (posterior capsule repair mitigates this)
• Your role: lateral positioning equipment, standard instrument set

DIRECT ANTERIOR APPROACH (DAA) (growing rapidly, ~20–25%)
• Incision: anterior, patient supine on standard or specialized table
• Muscle disruption: intermuscular plane — NO muscle cutting
• Advantages: faster recovery, lower dislocation risk, both legs accessible for length comparison
• Disadvantages: more challenging exposure, requires specialized table, steeper learning curve
• Your role: specialized table setup, fluoroscopy coordination, different retractor set

ANTEROLATERAL APPROACH (~10%)
• Incision: lateral, partial detachment of gluteus medius
• Intermediate recovery profile
• Less common in high-volume centers

DIRECT LATERAL (HARDINGE) APPROACH
• Splits the gluteus medius
• Good acetabular exposure
• Risk of abductor weakness

KEY SALES INSIGHT: DAA is the fastest-growing approach in the US. Surgeons choosing DAA often want to differentiate their practice on "faster recovery." Mako THA with DAA is an increasingly common combination — know both cold.`,

      {
        heading:'3. Fixation Options',
        body:`How the implant stays in the bone long-term is one of the most important decisions in hip arthroplasty.

CEMENTLESS (PRESS-FIT) — ~90% of primary THAs in US
• The implant is impacted into prepared bone — undersized slightly for press-fit
• Implant surface has porous coating (titanium beads, sintered mesh, or hydroxyapatite)
• Bone grows INTO the porous surface over 6–12 weeks (osseointegration)
• Preferred in younger patients (<70) with good bone quality
• Stryker products: Accolade® II femoral stem, Triton-H® stem, Secur-Fit® Max acetabular cup, Trident® II shell

CEMENTED
• Polymethylmethacrylate (PMMA) bone cement injected before implant placement
• Immediate fixation — no waiting for bone ingrowth
• Preferred in older patients (>75-80) with osteoporotic bone
• Requires cement mixing, pressurization, and waiting for cure
• Your role: know cement mixing protocol, have restrictor plugs and cement gun ready

HYBRID
• One component cemented, one cementless
• Common: cemented stem + cementless cup (reduces risk of cement disease in young femur)
• Or cementless stem + cemented cup in some elderly patients

KEY IMPLANT PARAMETERS:
• Acetabular cup: Target inclination ~40° (±10°), anteversion ~15–20°
• The "safe zone" prevents impingement and reduces dislocation risk
• Femoral offset: distance from femoral axis to hip center — restoring offset restores abductor tension and gait
• Leg length: must be equalized within 5–10mm — discrepancy is a leading cause of patient dissatisfaction`,

        body:`Step-by-step OR responsibilities for a primary THA:

        heading:'1. TKA Overview & Components',
        body:`Total knee arthroplasty resurfaces the distal femur, proximal tibia, and optionally the patella. It is the most commonly performed joint replacement in the US — over 700,000 annually, growing ~5–6% per year.

Three compartments addressed:
• Medial tibiofemoral
• Lateral tibiofemoral
• Patellofemoral

Implant components:
1. Femoral component — metal (cobalt-chrome), resurfaces the distal femur including condyles and trochlear groove
2. Tibial tray — metal baseplate anchored to proximal tibia via keel or pegs
3. Polyethylene insert — UHMWPE, sits on tibial tray, provides the articulating surface
4. Patellar button — resurfacing of the posterior patella (not always performed)

Key design decisions:
• CR (Cruciate-Retaining): PCL preserved, implant relies on PCL for posterior stability and rollback
• PS (Posterior-Stabilized): PCL sacrificed, tibial post + femoral cam mechanism provides posterior stability
• Fixed bearing vs. mobile bearing: mobile poly insert allows rotation, potentially reducing wear
• Standard vs. constrained: constrained designs used for ligamentous insufficiency

Stryker TKA system: Triathlon® (primary workhorse), Scorpio® NRG (PS option), Triathlon Tritanium (cementless option).`,

      {
        heading:'2. CR vs PS Design Philosophy',
        body:`The CR vs PS decision is one of the most important clinical choices in TKA. As an ASR you will frequently be asked about this and need to understand it deeply.

CRUCIATE-RETAINING (CR):
• The posterior cruciate ligament (PCL) is preserved
• The tibial post mechanism is absent — implant relies on the PCL for posterior rollback
• Requires intact, functional PCL for proper kinematics
• Generally considered more "anatomic" — closer to natural knee motion
• Typically easier balancing in straightforward cases
• Used by: surgeons who prefer natural ligament function, less complex primary cases
• Stryker option: Triathlon CR

POSTERIOR-STABILIZED (PS):
• PCL is excised during surgery
• A tibial spine (post) articulates with a femoral cam mechanism
• Post/cam engages in mid-flexion to drive posterior femoral rollback
• More predictable kinematics — less dependent on individual patient ligament quality
• Required when: PCL is deficient, previously sacrificed, or when adequate balancing cannot be achieved
• Used by: surgeons who want more consistent results across varied patient anatomy
• Stryker option: Triathlon PS

THE DEBATE: No definitive evidence that one produces better long-term outcomes. Surgeon training, preference, and patient anatomy drive the decision.

KEY PRINCIPLE: The polyethylene insert must match the femoral component design. CR inserts cannot go on PS femoral components and vice versa. This is a critical inventory management point.`,
        svg:null

      {
        heading:'3. Bone Cuts & Mechanical Alignment',
        body:`TKA requires precise bone cuts to restore proper alignment and ensure the implant is positioned correctly.

5 primary bone cuts in TKA:
1. Distal femoral resection — removes diseased distal femur surface; sets flexion/extension alignment
2. Anterior femoral resection — removes anterior cortex
3. Posterior femoral resection — removes posterior condyles
4. Anterior and posterior chamfer cuts — bevel the transitions between cut surfaces
5. Tibial resection — removes proximal tibia; sets slope (typically 3–5° posterior slope)

Alignment philosophy:
MECHANICAL ALIGNMENT (traditional, most common)
• Components positioned to place mechanical axis (hip-knee-ankle) at neutral (0°)
• Predictable wear pattern, established long-term data
• May not match individual patient's natural anatomy

KINEMATIC ALIGNMENT (growing in popularity)
• Components positioned to restore the patient's native joint line and anatomy
• More individualized, potentially more natural feel
• Mako enables both — surgeon can select alignment philosophy in the pre-op plan

CORONAL ALIGNMENT: Components should be neutral (0°) on the coronal view
SAGITTAL ALIGNMENT: Femoral flexion typically 3°, tibial slope 3–5°
ROTATIONAL ALIGNMENT: Critical — rotational mismatch causes patellar tracking problems and pain

YOUR ROLE: Know what alignment the surgeon uses. For Mako cases, understand which alignment target is set in the plan.`,
        svg:null
      },
      {
        heading:'4. Gap Balancing',
        body:`Gap balancing is one of the most critical — and most technically demanding — aspects of TKA. It directly affects patient satisfaction and implant longevity.

Two gaps must be equalized:
• EXTENSION GAP: Space between femur and tibia when knee is at full extension
• FLEXION GAP: Space between femur and tibia when knee is at 90° flexion

For a well-balanced TKA:
Extension gap = Flexion gap (rectangular and equal)

If gaps are unequal:
• Tight in flexion → revision of posterior femoral cuts or use thinner insert
• Tight in extension → more distal femoral resection or change femoral size
• Medial/lateral imbalance → soft tissue releases (collateral ligament balancing)

Trialing sequence:
1. Insert trial femoral component
2. Insert trial tibial tray
3. Insert trial poly insert (start thin — typically 9mm)
4. Assess extension and flexion gaps with spacer blocks or digital tension devices
5. Test ROM — should achieve full extension and 120°+ flexion
6. Test medial/lateral stability — should be stable in extension and slight laxity in flexion
7. Adjust poly thickness to achieve balance
8. Confirm patellar tracking (no lateral subluxation)

YOUR ROLE: Stage 9mm, 10mm, and 11mm poly inserts before trialing. Be ready to hand them quickly. Sizing changes during trialing are very common.`,

        heading:'1. PKA Overview',
        body:`Partial knee arthroplasty (PKA) — also called unicompartmental knee arthroplasty (UKA) — replaces only the damaged compartment of the knee, preserving healthy bone, cartilage, and ligaments in the other compartments.

Three PKA options:
• Medial PKA (most common, ~75–80% of PKAs): replaces medial tibiofemoral compartment
• Lateral PKA (~10–15%): replaces lateral tibiofemoral compartment
• Patellofemoral replacement: replaces patellofemoral compartment only

Why PKA when TKA exists?
• Preserves ACL, PCL, healthy cartilage, and proprioception
• Less bone removal — important for future revision surgery
• Faster recovery and shorter hospital stay
• More natural feel and kinematics
• Smaller incision

When is PKA appropriate?
Patient profile: BMI <35 preferred, isolated compartmental disease, intact ACL, stable collateral ligaments, flexion contracture <10°, no inflammatory arthritis.

        heading:'2. Why Mako Excels at PKA',
        body:`PKA is arguably the procedure where Mako provides the most compelling clinical value. Here is why:

THE CHALLENGE OF MANUAL PKA:
• Small implant, precise placement required in a confined space
• Small positioning errors have disproportionate impact on outcomes
• Published data shows higher revision rates for manual PKA vs. manual TKA, partly attributable to positioning variability
• The "bad reputation" of PKA historically was largely due to poor patient selection and imprecise implant placement

HOW MAKO CHANGES THIS:
• CT-based planning identifies the exact bone morphology before surgery
• AccuStop constrains cuts to precise planned boundaries — especially important when working in a small space next to healthy cartilage
• Published data shows Mako PKA achieves more accurate component positioning than manual technique
• Survivorship data improves with robotic assistance (>98% at 2 years in published studies)
• Surgeon confidence in PKA as an option increases with robotic assistance

THE SALES MESSAGE:
"Mako allows surgeons to offer PKA to appropriate patients with the confidence that the implant will be positioned correctly — harvesting all the recovery and preservation benefits of partial replacement without the positioning risk that historically made surgeons hesitant."

• Isolated compartmental disease (medial > lateral) confirmed on X-ray and MRI if needed
• Intact ACL (critically important for medial PKA)
• Stable collateral ligaments

• Flexion contracture <10° (can achieve adequate flexion)

• Correctable deformity (<10° varus for medial PKA)

• Inflammatory arthritis (RA, psoriatic) — multi-compartmental disease by definition

• Multi-compartment involvement

• Medial joint line tenderness
• Varus alignment (for medial PKA)
• Full-thickness cartilage loss on medial compartment only (X-ray: medial JSN with preserved lateral space)

        body:`The operating room is one of the most controlled, high-stakes, and hierarchical environments in medicine. Your ability to navigate it professionally directly determines your OR access, surgeon relationships, and career trajectory.

Physical environment:
• Sterile core: area immediately surrounding the surgical field — only sterile-gowned team members (surgeons, scrub tech) allowed to touch
• Restricted zone: the OR itself — requires OR scrubs, hair cover, mask, shoe covers
• Semi-restricted zone: corridors and support areas adjacent to ORs
• Unrestricted zone: outside OR suite

Temperature: typically kept cold (65–68°F) to reduce infection risk and keep surgeons comfortable under drapes.

Noise: controlled. Conversations should be purposeful. Phones on silent. Your side conversations should be minimal.

Time: every minute has a cost. 1 OR minute at a major hospital costs $30–100 in fixed overhead. Being unprepared wastes money and damages relationships.

Staff hierarchy in the OR:
1. Attending surgeon — absolute authority on clinical decisions
2. Resident/fellow — learning under supervision
3. Anesthesiologist/CRNA — controls the patient's airway and hemodynamics
4. Scrub tech (ST) — controls the sterile back table; your primary in-room working relationship
5. Circulating nurse — works outside sterile field; documentation, supply retrieval, phone calls
6. You — vendor representative; support role, never clinical authority`,

        body:`The sterile field is the foundation of surgical safety. Violations cause infections. Infections cause deaths. There is zero tolerance.

• The draped surgical site
• The sterile back table and Mayo stand where instruments are laid
• The gowns and gloves of scrubbed team members
• Any opened, sterile supply

Rules:
✓ NEVER reach into or across the sterile field while unsterile
✓ NEVER touch a scrubbed team member's gown, gloves, or instruments
✓ Pass items to the sterile field by dropping from packaging — never hand directly
✓ Open sterile packaging by peeling (not tearing) and dropping contents
✓ If you accidentally contaminate the sterile field — STOP and notify the scrub tech immediately
✓ Keep a 12-inch minimum distance from the sterile field when moving past
✓ Never turn your back to the sterile field when standing adjacent to it

If you are unsure whether something is sterile — assume it is NOT and act accordingly.

If you break the sterile field and do NOT report it:
• Patient gets infected

• You will be liable

        body:`Medical device sales — especially surgical implants — requires a consultative approach. The product is not sold on features; it is sold on how it solves a specific clinical or business problem for a specific surgeon or hospital.

The framework:
1. RESEARCH: Before any conversation, know the surgeon's specialty, volume, current implant system, practice setting, and patient demographics. Cold outreach based on generic messaging fails.

2. OPEN: Earn the right to a conversation. Your introduction should acknowledge their time and lead with curiosity, not a pitch.

3. DISCOVER: Ask before you present. Clinical questions: "What challenges do you see with your current implant system?" Business questions: "How are your patients responding to their recovery experience?" Problem questions: "Have you had cases where positioning felt imprecise?"

4. PRESENT: Connect your solution specifically to what you just discovered. "Based on what you said about recovery expectations — Mako PKA allows your patients to preserve more natural tissue, which is directly tied to the faster recovery profile they're asking for."

5. HANDLE OBJECTIONS: Acknowledge → Clarify → Respond → Confirm. Never dismiss an objection.

6. CLOSE: In surgical sales, the close is rarely "sign here." It's asking for a specific next step: "Would you be open to a lunch where I show you our latest Mako PKA outcome data?" or "Can we schedule a proctored first case?"

7. FOLLOW THROUGH: What you promise after the call determines whether the relationship continues. Under-promise, over-deliver. Always.`,

      {
        heading:'1. Loaner Tray System',
        body:`Most medical device companies — including Stryker — use a loaner tray model for instrument sets. Understanding this system is essential for preventing case failures.

How loaner trays work:
• Stryker maintains a regional loaner pool of instrument sets
• For each scheduled case, a tray set is shipped or transported to the facility
• The tray is processed by the hospital's SPD (sterile processing department)
• After the case, the tray is returned (cleaned but unsterile) to Stryker

Your responsibilities in the loaner system:
1. BOOKING: Confirm tray booking with Stryker logistics at least 3–5 business days before case
2. SHIPPING CONFIRMATION: Verify tray has arrived at the facility — typically 24–48 hours before case
3. SPD COORDINATION: Confirm SPD has received, logged, and scheduled the tray for sterilization
4. PRE-CASE AUDIT: Day of — open and count tray contents against the packing list before the case starts
5. POST-CASE: Return the tray same day or per facility agreement; document any missing or damaged instruments

CRITICAL: If a tray arrives incomplete or late, you have time to source instruments from other facilities or Stryker's emergency logistics. You do NOT have this option if you discover the problem after the surgeon scrubs in.

MAKO-SPECIFIC: Mako cases require specific sterile registration arrays (tibial and femoral arrays). These must be ordered and confirmed separately from standard instrument trays.`,
        svg:null

      {
        heading:'2. Consignment Inventory Management',
        body:`Consignment inventory is product stored at the hospital facility for immediate use — without being invoiced until used. It is one of your most critical daily responsibilities.

What goes in consignment:
• Implants (stems, cups, tibial trays, inserts, heads) in multiple sizes
• Trial components
• Specialty items (specific head sizes, offset options, augments)

Your obligations:
• MONTHLY AUDIT: Count every consignment item. Compare against par levels. Identify shortages.
• EXPIRATION MANAGEMENT: Check lot expiry dates. Rotate stock (FIFO). Flag items expiring within 90 days.
• RESTOCK REQUESTS: Submit restocking before hitting critical levels — not after. Critical means a case could fail.
• USAGE TRACKING: Every implant used must be documented: lot number, size, patient (in facility records), date.
• RELATIONSHIP: The supply chain coordinator and OR materials manager control consignment space. Build these relationships.

Par level management:
• Par level = minimum quantity that should always be on hand
• If qty < par: LOW status — order immediately
• If qty = 0 or near 0: CRITICAL — emergency restock required
• A missing implant size during a case is a career-defining moment — and not in a good way

BEST PRACTICE: Create a personal consignment log for every account. Update it after every case and every monthly audit.`,
        svg:null

      {
        heading:'3. Sterile Processing (SPD) — Your Hidden Partnership',
        body:`SPD (Sterile Processing Department) — also called Central Sterile Supply (CSS) — is one of the most underappreciated relationships in your OR ecosystem.

What SPD does:
• Receives, inspects, and logs all incoming instrument trays
• Disassembles instruments, cleans with enzymatic solutions and ultrasonic cleaners
• Inspects instruments for damage or missing pieces
• Reassembles and packages in appropriate sterilization wrap
• Sterilizes using steam autoclave, EtO gas, or hydrogen peroxide plasma
• Stores sterile trays until needed for cases
• Tracks tray inventory and documentation

Why SPD is critical to your success:
• They control whether your trays are sterile and available on time
• A rushed or improperly processed tray must be re-sterilized — potentially delaying or canceling a case
• SPD staff can prioritize or deprioritize your trays based on their relationship with you
• They catch instrument deficiencies BEFORE the case — if you have a relationship with them, they call you. If not, they don't.

How to build the SPD relationship:
• Introduce yourself to the SPD supervisor on your very first visit
• Learn the names of the staff who process your trays
• Thank them specifically when they go above and beyond
• Bring donuts or coffee occasionally — genuinely appreciated
• Be their resource for product questions
• NEVER send an incomplete or improperly packed tray without communication`,

    sections:[
      {
        heading:'1. The Competitive Robotic Landscape',
        body:`The orthopedic robotics market has rapidly expanded. Knowing your competitors in detail is non-negotiable for a Stryker rep.

MAKO (STRYKER):
• Technology: CT-based 3D planning, semi-active robotic arm, AccuStop haptic boundaries
• Clearances: PKA (2006), TKA (2015), THA (2017) — 3 indications
• Installed base: 1,600+ globally (as of most recent data) — largest in market
• Clinical data: 10+ years of peer-reviewed evidence, AJRR registry data
• Key strength: broadest indications, deepest evidence base, largest support infrastructure

ROSA (ZIMMER BIOMET):
• Technology: Image-free option (no CT required) or CT-based; optical and robotic guidance
• Clearances: TKA and THA
• No PKA clearance currently
• Key pitch: image-free option reduces pre-op burden, faster to adopt for some surgeons
• Weakness vs Mako: no PKA clearance, less mature evidence base, smaller installed base

CORI (SMITH & NEPHEW):
• Technology: Handheld robotic device — no large robotic arm, no CT required
• Clearances: TKA
• Key pitch: small footprint, fast setup, no CT requirement
• Weakness vs Mako: handheld less precise than arm-based system per published comparisons; TKA only; no 3D pre-op planning without CT
• Surgeon appeal: surgeons who want "robotics lite" — less infrastructure commitment

VELYS (DEPUY SYNTHES / J&J):
• Technology: CT-optional navigation and robotic guidance for TKA
• Clearances: TKA; limited THA data as of last update
• Key pitch: J&J brand relationship, CT-optional flexibility, DePuy implant integration
• Weakness vs Mako: TKA-focused, no PKA, less published data, newer to market

        heading:'2. Competitive Positioning Talk Tracks',
        body:`How to handle competitive situations professionally and effectively:

WHEN A SURGEON IS TRIALING A COMPETITOR ROBOT:
Do NOT: criticize the competitor or imply the surgeon made a wrong choice.
DO: "I respect that you're evaluating your options. When you have a moment, I'd love to share a head-to-head clinical comparison — particularly on component positioning accuracy — so you have the full data picture. Would that be useful?"
Then: arrange a peer surgeon reference call with a Mako-experienced surgeon.

WHEN ASKED "HOW DOES MAKO COMPARE TO ROSA?":
"Both are good systems with different design philosophies. ROSA offers image-free flexibility which some surgeons prefer. Mako's approach — CT-based 3D planning — means the surgeon has a patient-specific visualization before ever entering the OR. The clinical question is: does pre-operative 3D planning change how you prepare and execute? For our surgeons, the answer is consistently yes. And Mako is the only platform with PKA clearance, which adds a significant procedure option."

WHEN ASKED ABOUT CORI:
"CORI is a handheld device that's easy to adopt — no CT, no large arm. For surgeons who want to dip their toe into robotics with minimal infrastructure change, it's approachable. The trade-off is that without a rigid arm and CT-based planning, you lose the precision boundary enforcement and pre-operative visualization that most surgeons cite as the primary value of Mako. It's a different tool for a different level of commitment to robotic surgery."

NEVER SAY: "ROSA/CORI/VELYS is a terrible product." Focus on differentiation, not denigration.`,

  {
    id:'m11', title:'Revision Total Joint Arthroplasty', cat:'Clinical', dur:'60 min', qCount:10,
    desc:'Why joints fail, revision surgery workflow, implant complexity, and your role in revision cases.',
    sections:[
      {
        heading:'1. Why Joints Fail',
        body:`Revision total joint arthroplasty (rTJA) addresses failed primary implants. Revision cases are more complex, longer, and require a significantly different instrument and implant set than primary cases.

Causes of TKA failure:
• Aseptic loosening (most common) — implant-bone interface fails without infection
• Infection (PJI — periprosthetic joint infection) — can be early (<3 months) or late
• Instability — ligamentous failure, polyethylene wear
• Stiffness — arthrofibrosis
• Polyethylene wear — generates debris, causes osteolysis
• Patellar complications — maltracking, fracture, loosening
• Implant fracture — rare with modern implants

Causes of THA failure:
• Aseptic loosening (most common)
• Dislocation — recurrent hip dislocation
• Periprosthetic joint infection (PJI)
• Bearing surface wear — osteolysis from PE debris
• Periprosthetic fracture — bone fractures around the implant
• Component malposition — cup outside safe zone, leg length discrepancy

PERIPROSTHETIC JOINT INFECTION (PJI):
• Devastating complication — requires complete implant removal, antibiotic spacer placement, and staged reimplantation
• Two-stage revision: Stage 1 removes implants, places cement spacer with antibiotics; Stage 2 (6–12 weeks later) reimplants after infection cleared
• Or single-stage revision in select cases
• Your role: know that PJI cases require separate spacer inventory and different cement protocols`,
        svg:null
      },
      {
        heading:'2. Revision Case Complexity',
        body:`Revision surgery is significantly more demanding than primary TJA in every dimension:

SURGICAL COMPLEXITY:
• Scar tissue and adhesions from prior surgery
• Bone loss — implant removal leaves defects requiring augments, bone graft, or stems
• Altered anatomy — prior incisions, muscle damage
• Longer OR time — typically 2–4× a primary case
• Higher complication risk — infection, nerve injury, blood loss

IMPLANT COMPLEXITY:
Revision TKA implants include:
• Stems — long intramedullary stems extending into the femur and tibia for added stability
• Metal augments — blocks that fill bone defects
• Constrained inserts — highly constrained poly designs for unstable knees
• Rotating hinge — maximum constraint for severely compromised ligaments

Revision THA implants include:
• Revision stems — longer, fluted, often tapered for poor proximal bone
• Acetabular revision cups — often larger with screw fixation, cages for severe bone loss
• Augments and tantalum constructs for acetabular bone defects

Stryker revision systems:
• Triathlon Total Stabilizer (TS) — revision TKA
• Trident Hemispherical Revision Cup / Tritanium Revision Cup — THA
• Restoration Modular revision hip system

YOUR ROLE IN REVISION CASES:
• Significantly larger instrument set required
• Multiple tray confirmations — revisions may require 2–3× the normal tray count
• Know the plan in detail — which components are being removed, which defects anticipated
• Have backup options staged — revision cases often encounter unexpected findings`,

  {
    id:'m12', title:'Patient Selection & Surgical Indications', cat:'Clinical', dur:'45 min', qCount:10,
    desc:'How surgeons decide who needs a joint replacement, shared decision-making, and how this affects sales conversations.',
    sections:[
      {
        heading:'1. The Shared Decision-Making Process',
        body:`Understanding how surgeons decide to offer joint replacement — and how patients decide to proceed — is essential context for sales conversations.

THE PATIENT JOURNEY:
1. Primary care or sports medicine physician identifies OA on X-ray
2. Referral to orthopedic surgeon for evaluation
3. Orthopedic surgeon: history, physical exam, imaging review
4. Conservative treatment trial: NSAIDs, PT, injections, bracing
5. Conservative treatment failure → surgical candidacy evaluated
6. Surgeon presents surgical options (TKA, THA, PKA, etc.)
7. Shared decision-making: patient goals, expectations, lifestyle, surgeon recommendation
8. Patient consents to surgery
9. Pre-operative evaluation: medical clearance, CT (for Mako), implant planning

FACTORS IN SURGICAL DECISION:
• Age: no absolute age cutoff; younger patients get TJA more often now
• Activity level: active patients may be better candidates for THA/TKA over continued pain management
• BMI: obesity increases complication risk but is not absolute contraindication
• Bone quality: affects fixation choice (cemented vs cementless)
• Prior surgeries: previous knee surgeries may complicate approach
• Patient expectations: must be realistic — TJA addresses pain, not athletic performance

THE SURGEON'S DECISION BETWEEN PROCEDURE TYPES:
• Isolated medial disease + intact ACL → PKA is an option (especially with Mako)
• Multi-compartmental disease → TKA
• Hip disease → THA
• Degree of deformity, bone loss, ligament status → affects implant selection within each category`,
        svg:null
      },
      {
        heading:'2. Conservative Treatment Failure',
        body:`Understanding when conservative treatment has "failed" — and what failure looks like — helps you recognize surgical candidates in sales conversations.

Conservative options and their role:
• NSAIDs (Naproxen, Meloxicam, Celecoxib): reduce inflammation and pain; long-term use has GI and cardiovascular risks
• Physical therapy: strengthening around the joint; improves function without changing the arthritis
• Cortisone injections: short-term pain relief (weeks to months); typically 2–3 injections before efficacy diminishes
• Viscosupplementation (hyaluronic acid): lubricates joint; moderate evidence, variable response
• Bracing: offloading braces can help medial OA patients; temporary relief
• Weight loss: reduces mechanical load; significant improvement in pain and function with even 10% body weight reduction

When conservative treatment has "failed":
• Pain persists despite multiple treatment modalities over 3–6 months
• Function is significantly limited — unable to complete activities of daily living
• Night pain — waking from sleep due to joint pain
• X-ray evidence of significant joint destruction (Grade 3–4)
• Patient preference for surgical resolution after being informed of all options

SALES INSIGHT: Understanding this timeline helps you identify which surgeons see a high volume of appropriately-selected surgical candidates vs. those who may be operating on patients not yet appropriate for surgery. Both scenarios affect your account dynamics.`,

        body:`You will be in pre-operative planning meetings, surgeon office visits, and clinical discussions where X-rays and imaging are referenced. The ability to speak intelligently about what you're looking at — and what it means — separates elite reps from average ones.

You are NOT diagnosing. You are NOT making clinical recommendations. You are conversationally fluent in imaging so you can support and enhance clinical discussions, not be lost in them.

What you need to read:
• AP (anteroposterior) and lateral X-rays of hip and knee
• Identify normal anatomy landmarks
• Recognize grades of OA
• Understand alignment measurements
• Recognize prosthesis position on post-op X-rays
• Understand what Mako planning images show

Standard X-ray views:
HIP:
• AP pelvis — shows both hips, sacrum, bony pelvis
• AP hip — focused single hip view
• Cross-table lateral (or Dunn view) — lateral view of femoral neck

KNEE:
• AP weight-bearing — standing view showing true joint space under load (most important)
• Lateral — shows sagittal alignment, patella height, posterior slope
• Patellofemoral (Merchant) view — shows patellofemoral compartment
• Long-leg alignment view (hip-knee-ankle) — shows full mechanical axis`,

      {
        heading:'2. Key X-Ray Landmarks',
        body:`What to identify on each view:

AP KNEE (weight-bearing):
• Joint space: measure medial and lateral compartments separately
• Osteophytes: bony spurs at joint margins (medial, lateral, intercondylar notch)
• Sclerosis: increased bone density below cartilage loss (white/dense on X-ray)
• Varus/valgus deformity: bow-legged (varus) from medial disease; knock-kneed (valgus) from lateral disease
• Tibial spine: prominence may indicate anterior impingement
• Kellgren-Lawrence grade: 1–4 based on above findings

AP PELVIS / HIP:
• Joint space: uniform cartilage space normally 4–5mm; loss indicates OA
• Femoral head sphericity: loss of round shape suggests AVN or severe OA
• Acetabular coverage: is femoral head adequately covered?
• Shenton's line: imaginary line connecting femoral neck to superior obturator foramen — disrupted in hip pathology
• Leg length: compare both sides — discrepancy visible on AP pelvis
• Osteophytes: at femoral head/neck junction, acetabular rim
• Protrusio: femoral head pushed into pelvis — requires acetabular augmentation

POST-OPERATIVE X-RAY ASSESSMENT:
TKA post-op: check component alignment (coronal and sagittal), component seating, cement mantle, patellar tracking
THA post-op: check cup inclination (~40°), anteversion estimation, stem alignment, leg length equality, offset restoration`,

  {
    id:'m14', title:'Post-Op Protocols & Rapid Recovery', cat:'Clinical', dur:'40 min', qCount:10,
    desc:'Enhanced recovery after surgery (ERAS), multimodal pain management, physical therapy, and patient outcomes.',
    sections:[
      {
        heading:'1. Enhanced Recovery After Surgery (ERAS)',
        body:`ERAS protocols have transformed joint replacement surgery from a 3–5 day hospital stay to same-day or next-day discharge in many cases. Understanding this helps you contextualize how Mako fits into the modern surgical ecosystem.

Key ERAS elements:

PRE-OPERATIVE:
• Patient education — setting expectations, pre-hab exercises
• Carbohydrate loading 2 hours before surgery (replaces old NPO protocols)
• Preoperative analgesics (acetaminophen, celecoxib, gabapentin)
• Optimization of comorbidities (diabetes control, anemia treatment)

INTRAOPERATIVE:
• Spinal anesthesia (preferred over general — fewer side effects, faster recovery)
• Minimally invasive techniques when possible
• Regional nerve blocks — adductor canal block for TKA, fascia iliaca block for THA
• Tranexamic acid (TXA) — reduces blood loss dramatically
• Local infiltration analgesia (LIA) — surgeon injects local anesthetic around the joint
• Tight tourniquet minimization (TKA) — shorter tourniquet time reduces pain

        heading:'1. The Regulatory & Ethical Framework',
        body:`Medical device sales is heavily regulated. Violations can result in criminal charges, civil penalties, career termination, and reputational damage. Understanding and following the rules is not optional.

KEY LAWS AND REGULATIONS:

ANTI-KICKBACK STATUTE (AKS):
• Federal law prohibiting any remuneration (payment, gifts, meals, entertainment) intended to induce referrals of federal healthcare program business (Medicare, Medicaid)
• Penalties: criminal fines up to $100,000/violation + imprisonment + exclusion from federal programs
• Relevant to you: anything of value given to a healthcare provider that could influence their prescribing or ordering decisions
• "Remuneration" is broadly defined — meals, tickets, consulting arrangements, research grants

FALSE CLAIMS ACT (FCA):
• Prohibits knowingly submitting false claims to federal healthcare programs
• Qui tam provisions: individuals ("whistleblowers") can file on behalf of government and receive a portion of recovery
• Relevant to you: documenting cases accurately, correct coding, not inflating usage

HIPAA (Health Insurance Portability and Accountability Act):
• Protects patient health information (PHI)
• In the OR: you may see patient information on charts, screens, and documentation
• Never discuss or record patient identifying information outside the clinical context
• Never take photos in the OR without explicit authorization

FDA REGULATION:
• Cleared vs. approved: 510(k) clearance (like Mako) = substantially equivalent to existing device; PMA approval = full clinical trial required for new technologies
• Off-label use: devices can be used off-label by physicians; reps cannot promote off-label use
• MDR (Medical Device Reporting): mandatory reporting of device-related serious injuries and deaths`,

EDUCATIONAL EVENTS:

• "Modest" = reasonable for the circumstances; not lavish
• No meals to spouses/family members
• Cannot be at entertainment venues (sports games, concerts) unless educational portion is primary purpose

CONSULTING ARRANGEMENTS:
• Surgeons can legitimately consult for device companies (training, speaking, research)
• Must be fair market value, documented, serve a genuine need
• Must not be a disguised kickback for product usage

TRAINING AND EDUCATION:
• Hands-on training and surgical skills labs are legitimate when genuinely educational

ITEMS OF NOMINAL VALUE:
• Small items (<$100 per AdvaMed guidance) for patient use are generally permissible

PHYSICIAN SUNSHINE ACT (OPEN PAYMENTS):

    sections:[
      {
        heading:'1. How Hospitals Get Paid for Joint Replacement',
        body:`Understanding hospital reimbursement is essential for conversations with administration and supply chain about the economic value of Mako and your implant system.

THE DRG SYSTEM (Diagnosis Related Group):
• Medicare pays hospitals a fixed amount per admission based on the DRG
• DRG 469: Major hip and knee joint replacement WITHOUT MCC (most common TJA DRG)
• DRG 470: Major hip and knee joint replacement WITH MCC (with major complications)
• The hospital receives the same payment regardless of what implant was used
• If the hospital spends less on the case than the DRG payment — they keep the difference (margin)
• If the hospital spends more — they absorb the loss

IMPLICATION FOR YOU: Hospitals are under continuous pressure to reduce implant costs. Every conversation with supply chain involves this pressure. Knowing the economics makes you a better partner.

CJR MODEL (Comprehensive Joint Replacement):
• CMS bundled payment model (mandatory in selected markets until recent policy changes)
• Hospitals received a single bundled payment for the entire episode of care: surgery + 90 days post-discharge
• Complications, readmissions, and extended care reduce profitability
• CJR incentivizes: efficient surgery, low complication rates, fast recovery, minimal readmissions
• Mako's value proposition in CJR: reduced complications + faster recovery = better episode economics

COMMERCIAL INSURANCE:
• Private payers negotiate rates with hospitals — typically a multiplier of Medicare rates
• Commercial rates are generally higher than Medicare, making commercial patients more profitable per case for hospitals
• High-volume commercial joint replacement is a major revenue driver for orthopedic programs`,

    sections:[
      {
        heading:'1. The Surgeon Office Visit',
        body:`The surgeon office visit is one of your most valuable — and most limited — touchpoints. Surgeons are extraordinarily time-poor. You may get 5–10 minutes. Use every second deliberately.

BEFORE THE VISIT:
• Know the surgeon's background: training, specialty focus, current implant system, published research
• Know their case volume and Mako status (Mako user? Non-user? On learning curve?)
• Have a specific objective for the visit — not "relationship building" but a concrete outcome
• Prepare 1–2 data points or clinical insights relevant to their practice
• Confirm the visit with office staff in advance

IN THE WAITING ROOM:
• Introduce yourself to the front desk and medical assistant by name
• Learn the names of gatekeepers — they control access
• Be brief if the surgeon is running behind — offer to reschedule rather than wait 45 min
• Never monopolize the surgeon's clinic time

THE 5-MINUTE STRUCTURE:
1. Open (30 sec): "Dr. [Name], thank you for a few minutes. I wanted to share [specific insight] and ask you one question about [specific topic]."
2. Deliver value (2 min): One clinical data point, patient outcome highlight, or relevant market insight

        heading:'1. Bone Cement (PMMA) — Basics to OR Application',
        body:`Polymethylmethacrylate (PMMA) bone cement has been used in joint replacement since the 1960s. Understanding it is essential for supporting cemented cases and knowing your inventory.

WHAT PMMA DOES:
• PMMA is NOT a glue — it is a "grout"
• It fills the spaces between implant and bone, distributing load
• Interdigitates with cancellous bone creating a mechanical interlock
• Provides immediate fixation (no waiting for bone ingrowth)
• The cement cures (polymerizes) through an exothermic reaction

CEMENT COMPONENTS:
• Powder (polymer): polymethylmethacrylate + barium sulfate (for X-ray visibility)
• Liquid (monomer): methyl methacrylate (MMA)
• When mixed: initiates polymerization → dough phase → cure phase

WORKING PHASES:
• Mixing (2–3 min): powder + liquid mixed to uniform consistency
• Dough phase (2–5 min): workable, not sticky — optimal time for insertion
• Cure phase (exothermic): cement hardens, temperature rises to 40–50°C
• Set time: approximately 10 minutes from start of mixing (temperature-dependent)

COLD vs WARM OR:
Cold OR = slower cure = more working time
Hot surgeon hands = faster cure = less working time
Watch surgeon preference for ambient temperature management

ANTIBIOTIC CEMENT:
• Gentamicin and tobramycin are most commonly added
• Releases locally during cure and over time
• Standard for revision cases, PJI cases, and some high-risk primary cases`,
        svg:null

      {
        heading:'2. Pressurization & Technique',
        body:`Proper cement technique is critical for implant longevity. Understanding good vs. bad technique helps you recognize what you're seeing and what questions to ask.

FEMORAL CANAL PREPARATION FOR CEMENTED THA STEM:
1. Canal cleaning: pulsatile lavage (high-pressure saline irrigation) removes fat and marrow debris
2. Drying: canal dried with adrenaline-soaked sponge to reduce bleeding
3. Restrictor plug: inserted into canal below stem tip to prevent cement from going too deep
4. Cement insertion (retrograde): gun inserted to canal tip, slowly withdrawn as cement fills
5. Pressurization: fingertip or pressurizer device compresses cement into cancellous bone
6. Stem insertion: before dough phase passes; held in position until cured
7. Avoid voids and cracks: these are stress risers and sites of long-term failure

TIBIAL CEMENTATION IN TKA:
1. Tibial surface preparation: pulsatile lavage, dry
2. Cement applied to tibial tray and/or bone surface
3. Component seated and pressurized
4. Excess cement removed from margins before curing

WHAT CAN GO WRONG:
• Inadequate pressurization → poor cement-bone interlock → early loosening
• Voids in cement mantle → stress concentration → fatigue crack propagation
• Wrong timing (too early before dough phase or too late) → poor adhesion
• Blood contamination → prevents cement-bone contact

YOUR ROLE:
• Know if the case is cemented or cementless BEFORE the case
• Have cement guns, restrictor plug inserter, and pulsatile lavage ready
• Know how many bags of cement are needed (ask the rep)
• Track cement lot numbers`,

        heading:'3. Cementless Osseointegration',
        body:`Cementless fixation has become the dominant technique for primary TJA in younger patients — understanding the biology and clinical requirements helps you support these cases.

OSSEOINTEGRATION BIOLOGY:
• Bone grows into the porous surface of the implant over 6–12 weeks
• Requires: (1) close implant-bone contact (<50-100 micron gap), (2) stability (micromotion <50-150 microns), (3) adequate bone quality
• Porous surfaces: sintered beads, fiber metal mesh, 3D-printed titanium (Tritanium®)
• HA (hydroxyapatite) coating enhances early bone apposition

STRYKER CEMENTLESS TECHNOLOGY — TRITANIUM®:
• 3D-printed titanium lattice structure
• Porosity matches trabecular bone architecture
• Available on: Triathlon Tritanium tibial tray (TKA), Trident Tritanium cup (THA)
• Evidence shows faster and more robust osseointegration vs. traditional sintered bead coatings

PRESS-FIT TECHNIQUE:
• Femoral stem: broached slightly undersized — stem is impacted for 1–2mm of diametral interference
• Acetabular cup: reamed slightly undersized (1–2mm) and impacted
• Achieving stability: tactile confirmation ("this is how it should feel") + radiographic assessment
• If stability inadequate: adjunctive screw fixation (cups have screw holes) or convert to cement

EARLY WEIGHT BEARING:
• Modern cementless implants are designed for immediate weight bearing
• The bone ingrowth begins within days and is biologically complete by 6–12 weeks
• ERAS protocols leverage cementless fixation's immediate stability for day-of-surgery ambulation`,

    id:'m20', title:'Soft Tissue Balancing & Gap Management', cat:'Clinical', dur:'45 min', qCount:10,

    sections:[
      {
        heading:'1. Why Soft Tissue Balancing Matters',
        body:`Soft tissue balancing is arguably the most technically demanding and most outcome-determining aspect of TKA. Poorly balanced knees cause pain, instability, limited range of motion, and early failure.

The surgeon's goal: achieve equal, symmetric flexion and extension gaps with appropriate ligament tension — creating a stable, well-tracking knee throughout full range of motion.

The three planes of balance:
1. CORONAL BALANCE: medial/lateral stability — equal tension in MCL and LCL
2. SAGITTAL BALANCE: flexion/extension gap equality
3. ROTATIONAL BALANCE: tibial component rotation aligned with femoral component — critical for patellar tracking

Understanding gaps:
• The knee functions in a range of flexion from 0° (full extension) to 135°+ (full flexion)
• At any degree of flexion, the space between the cut bone surfaces = the gap
• If gaps are unequal → the knee will be tight in one position and lax in another
• The poly insert must fill the extension gap AND the flexion gap equally

Clinical consequences of imbalance:
• Tight in extension + loose in flexion: instability in mid-flexion
• Tight in flexion + loose in extension: limited flexion, tight feel
• Medial tight + lateral loose: varus thrust gait
• Poor patellar tracking from rotational mismatch: anterior knee pain, subluxation`,

      {
        heading:'2. Soft Tissue Releases',
        body:`When bone cuts alone cannot achieve balance — the surgeon performs soft tissue releases to equalize tension.

MEDIAL RELEASE (for varus/medial tightness — most common):
• Release the deep MCL (medial collateral ligament)
• Release the posterior capsule medially
• Sequential approach: small releases, reassess after each
• Goal: open the medial space until it matches the lateral side

LATERAL RELEASE (for valgus/lateral tightness — less common):
• Release the IT band (iliotibial band)
• Release the lateral capsule
• Less common than medial — requires care to avoid instability

FLEXION CONTRACTURE (knee won't fully extend):
• More distal femoral resection (removes bone from the extension gap)
• Posterior capsular release
• Posterior osteophyte removal (osteophytes block full extension)

POSTERIOR SLOPE ADJUSTMENT:
• Increasing tibial slope opens the flexion gap without affecting extension
• Decreasing slope tightens flexion gap
• Typical target: 3–5° posterior slope

MAKO'S CONTRIBUTION TO BALANCING:
• Mako's pre-operative plan models soft tissue tension mathematically
• Surgeons can predict gap behavior before making cuts
• Adjustments to cut depth can be made in the virtual plan
• Some surgeons report fewer intraoperative surprises with Mako-planned cases`,

    { keys: ['tha', 'total hip', 'hip replacement', 'hip'], response: 'THA components: acetabular shell + liner, femoral stem, femoral head. Common approaches: posterior (most common), anterolateral, direct anterior (DAA). Your OR role: know implant sizes, have backup trays ready, track lot numbers, anticipate surgeon needs. Key metrics surgeons care about: leg length equality, cup inclination (~40°), and offset restoration.' },
    { keys: ['tka', 'total knee', 'knee replacement', 'knee'], response: 'TKA replaces femoral condyles, tibial plateau, and optionally the patella. Components: femoral component, tibial tray, poly insert, ± patellar button. CR vs PS design difference: CR retains PCL; PS uses post/cam mechanism. Your role: organize trays in order, know sizing, track trialing, document lot numbers. Goal: proper alignment along the mechanical axis with balanced gaps.' },
    { keys: ['partial knee', 'pka', 'unicompartmental', 'uni'], response: 'PKA (partial knee arthroplasty) replaces only the damaged compartment — most commonly medial. Indication: isolated compartmental OA with intact ACL. Advantages over TKA: preserves natural ligaments, less bone removal, often faster recovery. Mako is especially valuable for PKA due to the precision required for a smaller implant in a confined space.' },

    { keys: ['territory', 'dallas', 'north texas', 'dfw', 'market'], response: 'North Texas is one of the fastest-growing healthcare markets in the US. Key health systems: HCA, Baylor Scott & White, Methodist, UT Southwestern, Texas Health Resources. DFW suburbs (Plano, Frisco, McKinney, Allen, Mansfield) are high-growth targets. Tier your accounts: Tier 1 (protect), Tier 2 (grow), Tier 3 (target). Focus Mako conversations at facilities with the robot installed but underutilizing it.' },
    { keys: ['manager', 'report', 'cody', 'chanel', 'weekly report'], response: 'Your weekly manager report to Cody Crocker and Chanel Derr should include: (1) Cases covered this week + key wins, (2) New surgeon/admin contacts made, (3) Mako utilization updates, (4) Pipeline/opportunities, (5) Challenges needing support, (6) Ideas for Mako growth in the territory. Send every Sunday. Be concise, data-driven, and proactive about requesting help when needed.' },
    { keys: ['scrub tech', 'or staff', 'nurse', 'circulator', 'or etiquette'], response: 'Building strong OR staff relationships is as important as surgeon relationships. Tips: (1) Learn everyone\'s name and use it, (2) Bring food/snacks occasionally, (3) Help where appropriate without stepping on toes, (4) Respect the hierarchy, (5) Be reliable — if you say you\'ll do something, do it. The scrub tech and circulator influence surgeon preferences and your OR access.' },
    { keys: ['first 6 months', 'new rep', 'onboarding', 'success'], response: 'First 6-month blueprint: Month 1 — complete credentialing at all facilities, learn product line, shadow cases. Month 2 — begin supporting cases independently, build OR relationships. Month 3 — start independent case coverage, identify Mako growth opportunities. Month 4 — expand surgeon contacts, begin consultative sales calls. Month 5 — drive measurable territory growth. Month 6 — full territory management, performance review prep. Track every interaction in CRM.' },
    { keys: ['study', 'learn', 'training', 'module', 'quiz'], response: 'The Training Hub has 10 modules covering anatomy, Mako, THA/TKA/PKA, OR protocols, sales skills, territory management, credentialing, and competitive intelligence. Each module has quizzes to test retention. Recommended study schedule: 1 module per week minimum. Review quiz misses — those gaps will show up in real OR situations. Video resources are linked in each module.' },
    { keys: ['call', 'cold call', 'office visit', 'drop in'], response: 'Office call tips: (1) Research the practice and surgeon before going in, (2) Bring value — clinical article, product info, or lunch, (3) Build a relationship with the front desk first, (4) Keep it short — 5-10 min is ideal, (5) Always leave with a next step, (6) Friday afternoon and mid-morning (9-11 AM) are often the best windows. Log every visit in CRM immediately.' },
    { keys: ['crm', 'contact', 'track', 'log', 'notes'], response: 'Use the CRM for every surgeon, OR nurse, scrub tech, administrator, and scheduler you meet. Log: name, title, hospital, phone, email, relationship stage (cold/warm/hot/partner), last contact, next follow-up, and notes. Patterns you\'ll see over time: who responds to what, best contact times, relationship trajectory. CRM discipline separates top performers from average reps.' },

const fmtDateShort = d => d ? new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '—';
const daysUntil = d => Math.ceil((new Date(d) - new Date()) / 86400000);
const ls = (k,v) => { try { if(v===undefined) return JSON.parse(localStorage.getItem(k)); localStorage.setItem(k,JSON.stringify(v)); } catch(e){} };

function useLS(key, def) {
  const [val, setVal] = useState(() => ls(key) ?? def);
  const set = useCallback(v => { setVal(v); ls(key, v); }, [key]);
  return [val, set];
}

// ── TRAINING ───────────────────────────────────────────────────────────────
function Training({trainingProgress,setTrainingProgress}) {
  const [selected,setSelected]=useState(null);
  const [quiz,setQuiz]=useState(null);
  const [qIdx,setQIdx]=useState(0);
  const [ans,setAns]=useState(null);
  const [score,setScore]=useState(0);
  const [quizDone,setQuizDone]=useState(false);
  const [view,setView]=useState('modules'); // 'modules','lesson','quiz'
  const [filterCat,setFilterCat]=useState('All');

  const prog = mod => trainingProgress[mod.id] || {};
  const pct = () => DATA.trainingModules.filter(m=>trainingProgress[m.id]?.completed).length / DATA.trainingModules.length * 100;

  const startQuiz = mod => {
    setQuiz(mod);
    setQIdx(0);
    setAns(null);
    setScore(0);
    setQuizDone(false);
    setView('quiz');
  };

  const handleAns = (mod, idx) => {
    if(ans!==null) return;
    setAns(idx);
    if(idx === quiz.quiz[qIdx].correct) setScore(s=>s+1);
    setTimeout(()=>{
      if(qIdx+1 >= quiz.quiz.length) {
        setQuizDone(true);
        const pctScore = (score+(idx===quiz.quiz[qIdx].correct?1:0)) / quiz.quiz.length * 100;
        if(pctScore>=70) {
          setTrainingProgress(prev=>({...prev,[quiz.id]:{...prev[quiz.id],completed:true,score:pctScore,date:new Date().toISOString()}}));
        }
      } else {
        setQIdx(q=>q+1);
        setAns(null);
      }
    }, 1400);
  };

  const finalScore = () => score / quiz.quiz.length * 100;

  // ── CAT COLOR MAP ──
  const catColor = {
    Clinical:'#00D4FF', Technology:'#F5A623', Professional:'#00E676',
    Sales:'#BF5AF2', Operations:'#FF9500', Strategy:'#FF5252'
  };

  // ── QUIZ VIEW ──
  if(view==='quiz' && quiz) {
    const q = quiz.quiz[qIdx];
    return (
      <div className="fade-in" style={{padding:24,maxWidth:700,margin:'0 auto'}}>
        <button className="btn-o" onClick={()=>setView('lesson')} style={{marginBottom:20}}>← Back to Lesson</button>
        {!quizDone ? (
          <div className="card">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6,flexWrap:'wrap',gap:8}}>
              <div style={{color:'var(--gold)',fontWeight:700,fontSize:15}}>{quiz.title} — Knowledge Check</div>
              <div style={{fontSize:13,color:'#888'}}>Q{qIdx+1} / {quiz.quiz.length}</div>
            </div>
            <ProgressBar pct={(qIdx/quiz.quiz.length)*100}/>
            <div style={{fontSize:16,fontWeight:600,margin:'20px 0 16px',lineHeight:1.6,color:'#eee'}}>{q.q}</div>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {q.opts.map((o,i)=>(
                <button key={i} className={`quiz-opt ${ans!==null?(i===q.correct?'correct':ans===i?'wrong':''):''}`}
                  onClick={()=>handleAns(quiz,i)}>{o}</button>
              ))}
            </div>
            {ans!==null && (
              <div style={{marginTop:16,padding:14,background:'rgba(0,230,118,0.06)',border:'1px solid rgba(0,230,118,0.2)',borderRadius:8,fontSize:13,color:'#aaa',lineHeight:1.6}}>
                <span style={{color:'var(--teal)',fontWeight:700}}>Explanation: </span>{q.exp}
              </div>
            )}
          </div>
        ) : (
          <div className="card" style={{textAlign:'center'}}>
            <div style={{fontSize:52,marginBottom:12}}>{finalScore()>=70?'🏆':'📚'}</div>
            <div style={{fontSize:28,fontWeight:800,color:finalScore()>=70?'#22c55e':'#f97316',marginBottom:8}}>
              {Math.round(finalScore())}%
            </div>
            <div style={{fontSize:16,color:'#ddd',marginBottom:8}}>
              {finalScore()>=70?'Module Passed — Outstanding work.':'Keep studying — review the lesson and retry.'}
            </div>
            <div style={{color:'#888',fontSize:13,marginBottom:24}}>{score} of {quiz.quiz.length} correct</div>
            <div style={{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}}>
              <button className="btn-y" onClick={()=>{setView('lesson');setSelected(quiz)}}>Back to Lesson</button>
              <button className="btn-o" onClick={()=>startQuiz(quiz)}>Retry Quiz</button>
              <button style={{background:'rgba(255,255,255,0.07)',border:'1px solid #333',borderRadius:8,padding:'10px 18px',color:'#aaa',cursor:'pointer',fontSize:14}} onClick={()=>setView('modules')}>All Modules</button>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ── LESSON VIEW ──
  if(view==='lesson' && selected) {
    const p = prog(selected);
    const cc = catColor[selected.cat] || '#F5A623';
    return (
      <div className="fade-in" style={{padding:24,maxWidth:860,margin:'0 auto'}}>
        {/* Header nav */}
        <button className="btn-o" onClick={()=>setView('modules')} style={{marginBottom:20}}>← Back to Modules</button>

        {/* Module header card */}
        <div className="card" style={{marginBottom:24,borderTop:`3px solid ${cc}`}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}}>
            <div>
              <div style={{fontSize:11,fontWeight:700,color:cc,textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>{selected.cat}</div>
              <div style={{fontSize:24,fontWeight:800,marginBottom:4,color:'#eee'}}>{selected.title}</div>
              <div style={{color:'#888',fontSize:13}}>{selected.dur} · {selected.quiz.length} questions</div>
            </div>
            {p.completed && <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
              <Badge type="g" text="✓ Completed"/>
              <div style={{color:'#22c55e',fontSize:12}}>Score: {Math.round(p.score)}%</div>
            </div>}
          </div>
          <p style={{marginTop:14,color:'#aaa',fontSize:14,lineHeight:1.7}}>{selected.desc}</p>
        </div>

        {/* Lesson sections */}
        {selected.sections && selected.sections.map((sec,si)=>(
          <div key={si} style={{marginBottom:28}}>
            {/* Section heading */}
            {sec.heading && (
              <div style={{
                fontSize:16, fontWeight:800, color:cc,
                paddingBottom:10, marginBottom:16,
                borderBottom:`1px solid rgba(255,255,255,0.08)`,
                letterSpacing:0.3
              }}>{sec.heading}</div>
            )}

            {/* Body text — render newlines and bullet points */}
            {sec.body && (
              <div style={{fontSize:14,lineHeight:1.85,color:'#ccc',whiteSpace:'pre-line',marginBottom:sec.svg||sec.videos?16:0}}>
                {sec.body}
              </div>
            )}

            {/* SVG diagram */}
            {sec.svg && (
              <div style={{
                margin:'20px 0',
                padding:4,
                background:'rgba(255,255,255,0.02)',
                border:'1px solid rgba(255,255,255,0.07)',
                borderRadius:14,
                overflow:'hidden'
              }}
                dangerouslySetInnerHTML={{__html: sec.svg}}
              />
            )}

            {/* Video links */}
            {sec.videos && sec.videos.length>0 && (
              <div style={{marginTop:12}}>
                <div style={{color:'var(--gold)',fontWeight:700,fontSize:13,marginBottom:10}}>🎬 Watch & Learn</div>
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  {sec.videos.map((v,vi)=>(
                    <a key={vi} href={v.url} target="_blank" rel="noopener noreferrer"
                      style={{
                        display:'flex',alignItems:'center',gap:12,
                        padding:'12px 16px',
                        background:'rgba(0,212,255,0.05)',
                        border:'1px solid rgba(0,212,255,0.15)',
                        borderRadius:10,
                        textDecoration:'none',color:'#ddd',fontSize:13,
                        transition:'background 0.2s'
                      }}
                      onMouseEnter={e=>e.currentTarget.style.background='rgba(0,212,255,0.1)'}
                      onMouseLeave={e=>e.currentTarget.style.background='rgba(0,212,255,0.05)'}
                    >
                      <span style={{fontSize:18,flexShrink:0}}>▶</span>
                      <span style={{flex:1}}>{v.title}</span>
                      <span style={{fontSize:11,color:'var(--teal)',flexShrink:0}}>Open →</span>
                    </a>
                  ))}
                </div>
              </div>
            )}
          </div>
        ))}

        {/* Quiz launch card */}
        <div style={{
          marginTop:32,
          padding:24,
          background:'rgba(245,166,35,0.06)',
          border:'2px solid rgba(245,166,35,0.25)',
          borderRadius:14,
          display:'flex',
          justifyContent:'space-between',
          alignItems:'center',
          flexWrap:'wrap',
          gap:16
        }}>
          <div>
            <div style={{fontWeight:800,fontSize:17,color:'var(--gold)',marginBottom:4}}>Knowledge Check</div>
            <div style={{color:'#888',fontSize:13}}>{selected.quiz.length} questions · 70% to pass</div>
            {p.completed && <div style={{color:'#22c55e',fontSize:12,marginTop:4}}>Last score: {Math.round(p.score)}% · {fmtDateShort(p.date)}</div>}
          </div>
          <div style={{display:'flex',gap:10}}>
            <button className="btn-y" onClick={()=>startQuiz(selected)}>
              {p.completed ? 'Retake Quiz' : 'Start Quiz →'}
            </button>
          </div>
        </div>

        {/* Disclaimer */}
        <div style={{marginTop:28,padding:14,background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.07)',borderRadius:10,fontSize:12,color:'#666',lineHeight:1.6}}>
          ⚖️ All content is derived from publicly available clinical literature and information. Always defer to your Stryker onboarding materials, manager guidance, and official Stryker training for product specifications and compliance requirements.
        </div>
      </div>
    );
  }

  // ── MODULE GRID VIEW ──
  const allCats = ['All',...new Set(DATA.trainingModules.map(m=>m.cat))];
  const shown = filterCat==='All' ? DATA.trainingModules : DATA.trainingModules.filter(m=>m.cat===filterCat);
  const completed = DATA.trainingModules.filter(m=>trainingProgress[m.id]?.completed).length;

  return (
    <div className="fade-in" style={{padding:24,maxWidth:1100,margin:'0 auto'}}>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12,marginBottom:8}}>
        <div>
          <div className="section-title">🎓 Training Hub</div>
          <div style={{color:'#666',fontSize:13,marginTop:2}}>{completed} of {DATA.trainingModules.length} modules complete</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{color:'var(--gold)',fontWeight:800,fontSize:22}}>{Math.round(pct())}%</div>
          <div style={{fontSize:11,color:'#666'}}>Overall Progress</div>
        </div>
      </div>
      <div style={{marginBottom:20}}><ProgressBar pct={pct()}/></div>

      {/* Category filter pills */}
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:24}}>
        {allCats.map(c=>{
          const cc = catColor[c] || 'var(--gold)';
          const active = filterCat===c;
          return (
            <button key={c} onClick={()=>setFilterCat(c)}
              style={{
                padding:'6px 14px',borderRadius:20,fontSize:12,fontWeight:700,cursor:'pointer',
                background: active?(c==='All'?'var(--gold)':`${cc}22`):'rgba(255,255,255,0.05)',
                border: active?`1px solid ${c==='All'?'var(--gold)':cc}`:'1px solid rgba(255,255,255,0.1)',
                color: active?(c==='All'?'#000':cc):'#888',
                transition:'all 0.2s'
              }}
            >{c}</button>
          );
        })}
      </div>

      {/* Module cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:14}}>
        {shown.map(m=>{
          const p=prog(m);
          const cc=catColor[m.cat]||'#F5A623';
          return (
            <div key={m.id} className="card"
              style={{cursor:'pointer',position:'relative',borderTop:`2px solid ${cc}33`,transition:'border-color 0.2s'}}
              onClick={()=>{setSelected(m);setView('lesson')}}
              onMouseEnter={e=>e.currentTarget.style.borderTopColor=cc}
              onMouseLeave={e=>e.currentTarget.style.borderTopColor=`${cc}33`}
            >
              {p.completed && <div style={{position:'absolute',top:12,right:12}}><Badge type="g" text="✓"/></div>}
              <div style={{fontSize:10,fontWeight:700,color:cc,textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>{m.cat}</div>
              <div style={{fontWeight:800,fontSize:15,marginBottom:4,color:'#eee',paddingRight:p.completed?28:0}}>{m.title}</div>
              <div style={{color:'#666',fontSize:12,marginBottom:10}}>
                <span>⏱ {m.dur}</span>
                <span style={{margin:'0 8px'}}>·</span>
                <span>📝 {m.quiz.length} questions</span>
              </div>
              <p style={{fontSize:13,color:'#999',lineHeight:1.6,marginBottom:p.completed?10:0}}>{m.desc}</p>
              {p.completed && (
                <div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'#22c55e'}}>
                  <span>✅ Score: {Math.round(p.score)}%</span>
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div style={{marginTop:28,padding:14,background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.07)',borderRadius:10,fontSize:12,color:'#666',lineHeight:1.6}}>
        ⚖️ All training content is derived from publicly available clinical literature and information. Always defer to your Stryker onboarding materials, manager guidance, and official Stryker training for product specifications and compliance requirements.
      </div>
    </div>
  );
}
